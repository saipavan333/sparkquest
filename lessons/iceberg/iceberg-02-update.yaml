id: iceberg-02-update
track: iceberg
order: 2
title: "Row-Level UPDATE"
difficulty: 4
concepts: ["iceberg", "UPDATE", "row-level", "copy-on-write"]
needs_spark: true
needs_iceberg: true
brief: |
  Plain Parquet files can't be changed in place — to fix one value you'd have to
  rewrite files yourself. Iceberg lets you simply run **`UPDATE` / `DELETE` in SQL**,
  just like a database, and it takes care of safely rewriting the files underneath.

  ```
   UPDATE local.db.pos SET qty = 999 WHERE ticker = 'AAPL'

   AAPL = 100  ─►  AAPL = 999     (GOOG is left untouched)
   GOOG =  50  ─►  GOOG =  50
  ```

  (Worth knowing for interviews: Iceberg can apply these changes in two styles —
  rewrite the files now for fast reads later, or jot down the changes quickly and
  merge them in at read time. You pick based on whether the table is read-heavy or
  updated often.)

  **Mission:** Create `local.db.pos`, insert AAPL@100 and GOOG@50, then **UPDATE**
  AAPL's `qty` to `999`. Read the result into `out`.
starter_code: |
  spark.sql("CREATE TABLE local.db.pos (ticker STRING, qty BIGINT) USING iceberg")
  spark.sql("INSERT INTO local.db.pos VALUES ('AAPL', 100), ('GOOG', 50)")
  # TODO: UPDATE AAPL's qty to 999, then read the table into `out`
  ...
  out = ...
  out.show()
solution_code: |
  spark.sql("CREATE TABLE local.db.pos (ticker STRING, qty BIGINT) USING iceberg")
  spark.sql("INSERT INTO local.db.pos VALUES ('AAPL', 100), ('GOOG', 50)")
  spark.sql("UPDATE local.db.pos SET qty = 999 WHERE ticker = 'AAPL'")
  out = spark.table("local.db.pos")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 999}
      - {"ticker": "GOOG", "qty": 50}
    message: "AAPL's qty should be updated to 999; GOOG unchanged"
hints:
  - "UPDATE local.db.pos SET qty = 999 WHERE ticker = 'AAPL'"
  - "Iceberg performs the row-level update; read back with spark.table(...)."
