id: iceberg-01-create
track: iceberg
order: 1
title: "Your First Iceberg Table"
difficulty: 3
concepts: ["iceberg", "table format", "SQL"]
needs_spark: true
needs_iceberg: true
brief: |
  **Apache Iceberg** is another way to turn files on storage into a proper, safe table
  — the same idea as Delta ([delta-01](../delta/delta-01-create.yaml)), just a
  different popular option. Its big selling point is that **many tools** (Spark,
  Flink, Trino, and more) can all read and write the *same* Iceberg tables, so you're
  not locked into one engine.

  - Iceberg tables live under a **catalog** and are named in three parts:
    `catalog.database.table`. Here the catalog is called `local`, so a table is
    `local.db.trades`.
  - You create and use them with plain SQL: `CREATE TABLE … USING iceberg`, then the
    normal `INSERT` and `SELECT`.

  (A `local` Iceberg catalog is already set up for you. This lesson runs in the cloud
  build, which can fetch the Iceberg add-on.)

  **Mission:** Create an Iceberg table `local.db.trades (ticker STRING, qty
  BIGINT)`, insert two rows, then read it back into `out`.
starter_code: |
  # TODO: CREATE the Iceberg table, INSERT two rows, then read it into `out`
  spark.sql("CREATE TABLE local.db.trades (ticker STRING, qty BIGINT) USING iceberg")
  ...
  out = ...
  out.show()
solution_code: |
  spark.sql("CREATE TABLE local.db.trades (ticker STRING, qty BIGINT) USING iceberg")
  spark.sql("INSERT INTO local.db.trades VALUES ('AAPL', 100), ('GOOG', 50)")
  out = spark.table("local.db.trades")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "out should read back the rows inserted into the Iceberg table"
hints:
  - "Create with USING iceberg, then INSERT INTO local.db.trades VALUES (...)."
  - "Read it with spark.table(\"local.db.trades\")."
