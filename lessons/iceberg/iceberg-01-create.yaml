id: iceberg-01-create
track: iceberg
order: 1
title: "Your First Iceberg Table"
difficulty: 3
concepts: ["iceberg", "table format", "SQL"]
needs_spark: true
needs_iceberg: true
brief: |
  **What & why.** **Apache Iceberg** is an open **table format** (like Delta) that
  brings ACID transactions, **snapshots**, hidden partitioning, and **engine-agnostic**
  metadata to data lakes. Its edge over Delta: the same tables are queryable by
  Spark, Flink, Trino, and others, and it supports **partition evolution**. Instead
  of "files in a directory", a **catalog** points at a metadata tree
  (table metadata → manifest list → manifests → data files) — see
  [Handbook ch.14](../../docs/handbook/14-apache-iceberg.md).

  **The essentials:**
  - Tables live under a **catalog**: `catalog.namespace.table` — here `local.db.<t>`.
  - Created with SQL `CREATE TABLE … USING iceberg`; then normal `INSERT`/`SELECT`.
  - Every write creates a new **snapshot** (the basis of time travel,
    [iceberg-04](iceberg-04-time-travel.yaml)).

  An Iceberg catalog named `local` is already configured for you.
  *(Runs in CI/Docker, which can fetch the Iceberg JAR.)*

  **Mission:** Create an Iceberg table `local.db.trades (ticker STRING, qty
  BIGINT)`, insert two rows, then read it back into `out`.
starter_code: |
  # TODO: CREATE the Iceberg table, INSERT two rows, then read it into `out`
  spark.sql("CREATE TABLE local.db.trades (ticker STRING, qty BIGINT) USING iceberg")
  ...
  out = ...
  out.show()
solution_code: |
  spark.sql("CREATE TABLE local.db.trades (ticker STRING, qty BIGINT) USING iceberg")
  spark.sql("INSERT INTO local.db.trades VALUES ('AAPL', 100), ('GOOG', 50)")
  out = spark.table("local.db.trades")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "out should read back the rows inserted into the Iceberg table"
hints:
  - "Create with USING iceberg, then INSERT INTO local.db.trades VALUES (...)."
  - "Read it with spark.table(\"local.db.trades\")."
