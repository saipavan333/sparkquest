id: iceberg-05-hidden-partitioning
track: iceberg
order: 5
title: "Hidden Partitioning"
difficulty: 4
concepts: ["iceberg", "hidden partitioning", "partition transform", "bucket"]
needs_spark: true
needs_iceberg: true
brief: |
  Iceberg's standout feature. Normally, to make a query fast you have to split the
  table by a column **and remember to filter on that exact column** — and people
  forget, so the speed-up is lost. Iceberg lets you split by a **rule applied to a
  column** (like "bucket by ticker" or "by day of the timestamp"), and it quietly
  remembers the rule. You then just filter on the **normal** column and Iceberg works
  out which parts to read for you — hence "hidden".

  - You set it up once: `PARTITIONED BY (bucket(4, ticker))`.
  - You query naturally: `WHERE ticker = 'AAPL'` — no special partition column to
    remember, and Iceberg still skips the parts it doesn't need.

  (Bonus: you can even change the splitting rule later without rewriting the old data
  — something Delta and old-style tables can't do.)

  **Mission:** Create `local.db.ev (ticker STRING, amount BIGINT)` **partitioned by
  `bucket(4, ticker)`**, insert three rows, then select just the AAPL rows into
  `out` by filtering on the **raw** `ticker` column.
starter_code: |
  spark.sql(
      "CREATE TABLE local.db.ev (ticker STRING, amount BIGINT) "
      "USING iceberg PARTITIONED BY (bucket(4, ticker))"
  )
  spark.sql("INSERT INTO local.db.ev VALUES ('AAPL', 100), ('GOOG', 50), ('AAPL', 70)")
  # TODO: select only AAPL rows by filtering on the raw ticker column -> `out`
  out = ...
  out.show()
solution_code: |
  spark.sql(
      "CREATE TABLE local.db.ev (ticker STRING, amount BIGINT) "
      "USING iceberg PARTITIONED BY (bucket(4, ticker))"
  )
  spark.sql("INSERT INTO local.db.ev VALUES ('AAPL', 100), ('GOOG', 50), ('AAPL', 70)")
  out = spark.sql("SELECT * FROM local.db.ev WHERE ticker = 'AAPL'")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "amount": 100}
      - {"ticker": "AAPL", "amount": 70}
    message: "out should be the AAPL rows, pruned via the hidden bucket partition"
hints:
  - "PARTITIONED BY (bucket(4, ticker)) partitions by a transform, not a raw column."
  - "Query with WHERE ticker = 'AAPL' — Iceberg derives the partition for you."
