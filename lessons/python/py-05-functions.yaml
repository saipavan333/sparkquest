id: py-05-functions
track: python
order: 5
title: "A Profit Function"
difficulty: 2
concepts: ["functions", "return values"]
needs_spark: false
brief: |
  **What & why.** A *function* packages logic behind a name so you can reuse it and
  test it in isolation. This matters enormously in data engineering: Spark UDFs,
  transformations, and whole pipeline stages are all just functions — and writing
  them as **pure functions** (output depends only on inputs, no hidden state) is
  what makes them unit-testable (see [Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).

  **The essentials:**
  - `def name(params):` defines it; **`return`** sends a value back. A function with
    no `return` yields `None`.
  - Arguments bind by position or by name (`pnl(buy=100, ...)`); you can give
    defaults (`def f(x, rate=0.1):`).
  - Keep functions small and single-purpose — easy to reason about, easy to test.

  **Mission:** Write a function named `pnl(buy, sell, qty)` that returns the
  profit-and-loss of a trade: `(sell - buy) * qty`.

  Examples: `pnl(100, 110, 10) == 100` and `pnl(50, 40, 5) == -50`
starter_code: |
  # TODO: define pnl(buy, sell, qty) returning (sell - buy) * qty
  def pnl(buy, sell, qty):
      ...
solution_code: |
  def pnl(buy, sell, qty):
      return (sell - buy) * qty
checks:
  - type: callable_returns
    name: pnl
    args: [100, 110, 10]
    expected: 100
    message: "pnl(100, 110, 10) should return 100"
  - type: callable_returns
    name: pnl
    args: [50, 40, 5]
    expected: -50
    message: "pnl(50, 40, 5) should return -50 (a loss)"
hints:
  - "Use the return keyword to send a value back."
  - "return (sell - buy) * qty"
