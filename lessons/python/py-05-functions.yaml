id: py-05-functions
track: python
order: 5
title: "A Profit Function"
difficulty: 2
concepts: ["functions", "return values"]
needs_spark: false
brief: |
  A **function** is a reusable block of code with a name. You write the steps once,
  give them a name, and then "call" that name whenever you want those steps to run —
  like a recipe you can follow again and again instead of re-writing it each time.

  - You create one with the word `def`, then list its **inputs** (called
    *parameters*) in brackets, and use **`return`** to hand a result back:
    `def add(a, b): return a + b`.
  - You **call** it by writing its name with values: `add(2, 3)` gives back `5`.
  - The values you pass in (`2` and `3`) are called *arguments*. You can also pass
    them by name: `add(a=2, b=3)`.
  - If a function doesn't `return` anything, you get Python's "nothing" value, `None`.

  Keeping each function small and focused on one job makes your code easy to read,
  reuse, and check.

  **Mission:** Write a function named `pnl(buy, sell, qty)` that returns the
  profit-and-loss of a trade: `(sell - buy) * qty`.

  Examples: `pnl(100, 110, 10) == 100` and `pnl(50, 40, 5) == -50`
starter_code: |
  # TODO: define pnl(buy, sell, qty) returning (sell - buy) * qty
  def pnl(buy, sell, qty):
      ...
solution_code: |
  def pnl(buy, sell, qty):
      return (sell - buy) * qty
checks:
  - type: callable_returns
    name: pnl
    args: [100, 110, 10]
    expected: 100
    message: "pnl(100, 110, 10) should return 100"
  - type: callable_returns
    name: pnl
    args: [50, 40, 5]
    expected: -50
    message: "pnl(50, 40, 5) should return -50 (a loss)"
hints:
  - "Use the return keyword to send a value back."
  - "return (sell - buy) * qty"
