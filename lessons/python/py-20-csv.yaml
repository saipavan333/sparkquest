id: py-20-csv
track: python
order: 20
title: "CSV parsing"
difficulty: 2
concepts: ["csv", "DictReader", "parsing"]
brief: |
  **CSV** ("comma-separated values") is the most common — and most fiddly — way data
  is shared as a plain text file before it reaches Spark. Python's built-in `csv`
  tool reads it correctly, even tricky cases like a comma *inside* a quoted value
  (`"Apple, Inc."`) that a simple split on commas would get wrong.

  - `csv.reader(...)` gives you each row as a **list**; `csv.DictReader(...)` uses
    the first row (the header) to give you each row as a **dictionary**, labelled by
    column name — usually the handier choice.
  - To read from a piece of text (rather than a file), wrap it with `io.StringIO(...)`.
  - Important: every value comes back as **text**, even numbers — `"100"`, not `100`.
    So you convert them to real numbers yourself afterwards.

  (Tip: don't split CSV yourself with `text.split(",")` — let the `csv` tool handle
  the awkward cases.)

  **Mission:** Parse the CSV in `raw` with `csv.DictReader` into a list of dicts
  named `rows`.

  Expected: `[{"ticker": "AAPL", "qty": "100"}, {"ticker": "GOOG", "qty": "50"}]`
  (note the values are strings).
starter_code: |
  import csv, io

  raw = "ticker,qty\nAAPL,100\nGOOG,50"
  # TODO: parse with csv.DictReader into a list of dicts named `rows`
  rows = ...
  print(rows)
solution_code: |
  import csv, io

  raw = "ticker,qty\nAAPL,100\nGOOG,50"
  rows = list(csv.DictReader(io.StringIO(raw)))
  print(rows)
checks:
  - type: var_equals
    name: rows
    expected:
      - {"ticker": "AAPL", "qty": "100"}
      - {"ticker": "GOOG", "qty": "50"}
    message: "rows should be a list of dicts keyed by the header (values are strings)"
hints:
  - "Wrap the string: io.StringIO(raw) gives DictReader something to read."
  - "list(csv.DictReader(...)) materialises the rows; values stay strings until you cast."
