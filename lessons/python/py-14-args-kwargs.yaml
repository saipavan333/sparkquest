id: py-14-args-kwargs
track: python
order: 14
title: "*args, **kwargs & lambda"
difficulty: 3
concepts: ["args", "varargs", "lambda"]
needs_spark: false
brief: |
  **What & why.** Two features you'll see all over framework APIs:
  - **`*args`** collects extra positional arguments into a **tuple**; **`**kwargs`**
    collects extra keyword arguments into a **dict**. Together they let a function
    accept *any* signature — which is exactly how decorator wrappers
    ([py-10](py-10-decorators.yaml)) forward calls, and how config-driven APIs stay
    flexible.
  - **`lambda`** makes a tiny **anonymous** function inline: `lambda x: x * x`. Great
    for one-off keys/callbacks (`sorted(rows, key=lambda r: r.qty)`).

  **Gotcha.** Keep lambdas tiny — if it needs a name or more than one expression,
  use `def`. And in **PySpark**, a Python `lambda` in an RDD/UDF runs in a slow
  Python worker and is opaque to Catalyst; prefer built-in column functions.

  **Mission:**
  1. Write `total(*nums)` that returns the sum of all arguments passed.
  2. Write a `lambda` named `sq` that squares its input.

  Examples: `total(1, 2, 3, 4) == 10` and `sq(5) == 25`.
starter_code: |
  def total(*nums):
      # TODO: return the sum of all arguments
      ...

  # TODO: sq = a lambda that squares its input
  sq = ...
solution_code: |
  def total(*nums):
      return sum(nums)

  sq = lambda x: x * x
checks:
  - type: callable_returns
    name: total
    args: [1, 2, 3, 4]
    expected: 10
    message: "total(1, 2, 3, 4) should return 10"
  - type: callable_returns
    name: sq
    args: [5]
    expected: 25
    message: "sq(5) should return 25"
hints:
  - "*nums collects all positional args into a tuple; sum(nums) adds them."
  - "sq = lambda x: x * x"
