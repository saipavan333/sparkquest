id: py-16-json
track: python
order: 16
title: "JSON"
difficulty: 3
concepts: ["json", "parsing", "serialisation"]
needs_spark: false
brief: |
  **JSON** is the most common way data is passed between systems — web services,
  message queues, config files, log lines. It's just text written in a particular
  layout, and Python can turn it into the lists and dictionaries you already know
  (and back again).

  - `json.loads(text)` reads a JSON **string** and gives you back a Python value,
    usually a **dictionary**. (Think "load string".)
  - `json.dumps(value)` goes the other way: a Python value becomes a JSON **string**.
    (Think "dump to string".)
  - The pieces match up neatly: a JSON object becomes a dict, a JSON list becomes a
    Python list, and `null` becomes `None`.

  (In real life, some incoming records are broken, so you'd wrap `json.loads` in a
  `try/except` and set the bad ones aside instead of letting one crash the whole job.)

  **Mission:** Parse the JSON string `raw` into a dict `rec`, then pull out
  `ticker` and `qty`.

  Expected: `ticker == "AAPL"`, `qty == 100`.
starter_code: |
  import json

  raw = '{"ticker": "AAPL", "qty": 100}'
  # TODO: parse raw into rec, then read ticker and qty
  rec = ...
  ticker = ...
  qty = ...
  print(rec, ticker, qty)
solution_code: |
  import json

  raw = '{"ticker": "AAPL", "qty": 100}'
  rec = json.loads(raw)
  ticker = rec["ticker"]
  qty = rec["qty"]
  print(rec, ticker, qty)
checks:
  - type: var_type
    name: rec
    type_name: dict
    message: "rec should be a dict parsed from the JSON string"
  - type: var_equals
    name: ticker
    expected: "AAPL"
    message: "ticker should be read from the parsed JSON"
  - type: var_equals
    name: qty
    expected: 100
    message: "qty should be read from the parsed JSON"
hints:
  - "json.loads(raw) returns a dict."
  - "Index it like any dict: rec[\"ticker\"], rec[\"qty\"]."
