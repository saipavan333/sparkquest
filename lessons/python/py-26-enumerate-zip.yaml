id: py-26-enumerate-zip
track: python
order: 3
title: "enumerate & zip"
difficulty: 2
concepts: ["enumerate", "zip", "iteration", "parallel sequences"]
brief: |
  Two small helpers that make loops much nicer to write.

  **`enumerate`** gives you both the position number *and* the item as you loop, so
  you don't have to keep track of a counter yourself:

  ```python
  for i, ticker in enumerate(tickers):
      print(i, ticker)          # i is 0, then 1, then 2...
  ```

  **`zip`** lets you go through **two lists side by side**, pairing them up by
  position — first with first, second with second, and so on:

  ```python
  for ticker, price in zip(tickers, prices):
      ...
  ```

  A handy move: `dict(zip(keys, values))` turns two lists into a lookup table (a
  dictionary). One thing to watch — `zip` stops as soon as the shorter list runs
  out, so make sure your two lists line up.

  **Mission:** Given parallel `tickers` and `prices`, build `book` — a dict mapping
  each ticker to its price — using `zip`.

  Expected: `{"AAPL": 189.5, "GOOG": 142.1, "MSFT": 415.6}`.
starter_code: |
  tickers = ["AAPL", "GOOG", "MSFT"]
  prices = [189.5, 142.1, 415.6]
  # TODO: pair them into a dict `book` using zip
  book = ...
  print(book)
solution_code: |
  tickers = ["AAPL", "GOOG", "MSFT"]
  prices = [189.5, 142.1, 415.6]
  book = dict(zip(tickers, prices))
  print(book)
checks:
