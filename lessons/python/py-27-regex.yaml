id: py-27-regex
track: python
order: 16
title: "Regular Expressions (re)"
difficulty: 3
concepts: ["regex", "re", "pattern matching", "extraction"]
brief: |
  A **regular expression** (or "regex") is a way to describe a *pattern* in text, so
  you can find or pull out the bits you want — like grabbing every price, or every
  product code, from a messy line of a log file. It's a small but powerful language
  of its own.

  Using Python's built-in `re` tool:
  - Write the pattern as a **raw string** — that just means putting an `r` in front,
    like `r"\d+"`, so Python leaves the backslashes alone.
  - **`re.findall(pattern, text)`** finds *all* the matches and gives them back as a
    list. (`re.sub` replaces matches; `re.search` finds just the first one.)
  - A pattern is built from small pieces: `\d` means "a digit", `[A-Z]` means "any
    capital letter", `+` means "one or more of the thing just before it", and `{2,}`
    means "two or more".

  So `r"[A-Z]{2,}"` reads as "two or more capital letters in a row" — a neat way to
  pick out ticker symbols. (Tip: for tidy formats like JSON or CSV, use their proper
  readers instead; regex is best for messy, free-form text.)

  **Mission:** From the log line `text`, extract:
  1. `tickers` — all runs of 2+ uppercase letters (`[A-Z]{2,}`).
  2. `prices` — all decimal numbers (`\d+\.\d+`), as strings.

  Expected: `tickers == ["AAPL", "GOOG"]`, `prices == ["189.5", "142.1"]`.
starter_code: |
  import re

  text = "Trade AAPL at 189.5, then GOOG at 142.1"
  # TODO: findall uppercase tickers and decimal prices
  tickers = ...
  prices = ...
  print(tickers, prices)
solution_code: |
  import re

  text = "Trade AAPL at 189.5, then GOOG at 142.1"
  tickers = re.findall(r"[A-Z]{2,}", text)
  prices = re.findall(r"\d+\.\d+", text)
  print(tickers, prices)
checks:
  - type: var_equals
    name: tickers
    expected: ["AAPL", "GOOG"]
    message: "tickers should be the uppercase symbols matched by [A-Z]{2,}"
  - type: var_equals
    name: prices
    expected: ["189.5", "142.1"]
    message: "prices should be the decimal numbers matched by \\d+\\.\\d+ (as strings)"
hints:
  - "re.findall(r\"[A-Z]{2,}\", text) returns every run of 2+ capitals."
  - "re.findall(r\"\\d+\\.\\d+\", text) matches decimals; results are strings."
  - "Use raw strings (r\"...\") so backslashes reach the regex engine intact."
