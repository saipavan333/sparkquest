id: py-15-datetime
track: python
order: 15
title: "Dates & Times"
difficulty: 3
concepts: ["datetime", "strptime", "parsing"]
needs_spark: false
brief: |
  **What & why.** Almost every pipeline is time-aware — partition by date, window by
  hour, compute "days since". `datetime.strptime` parses a string into a real
  `datetime` you can compare, subtract (`d2 - d1` gives a `timedelta`), and pull
  parts from. Getting time right is a recurring source of production bugs.

  **The essentials:**
  - **Parse**: `strptime(text, fmt)`; **format**: `dt.strftime(fmt)`. The codes:
    `%Y` 4-digit year, `%m` month, `%d` day, `%H:%M:%S` time.
  - Extract parts with `.year`, `.month`, `.day`, `.hour`.
  - The same `%Y-%m-%d` pattern is what Spark's `to_date`/`to_timestamp` use.

  **Gotcha (interview-relevant).** **Timezones.** A naive `datetime` has no tz;
  mixing naive and aware times, or ignoring UTC, causes off-by-hours bugs. Store and
  compute in **UTC**, convert only for display. Event-time vs processing-time is the
  streaming version of this ([Handbook ch.3](../../docs/handbook/03-streaming-internals.md)).

  **Mission:** Parse `"2026-01-15"` with `strptime` into `d`, then store its `year`
  and `month`.

  Expected: `year == 2026`, `month == 1`.
starter_code: |
  from datetime import datetime

  # TODO: parse "2026-01-15" into d, then read year and month
  d = ...
  year = ...
  month = ...
  print(d, year, month)
solution_code: |
  from datetime import datetime

  d = datetime.strptime("2026-01-15", "%Y-%m-%d")
  year = d.year
  month = d.month
  print(d, year, month)
checks:
  - type: var_equals
    name: year
    expected: 2026
    message: "year should be 2026"
  - type: var_equals
    name: month
    expected: 1
    message: "month should be 1"
hints:
  - "datetime.strptime(text, \"%Y-%m-%d\") parses the string."
  - "Access parts with d.year and d.month."
