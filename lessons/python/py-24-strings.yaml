id: py-24-strings
track: python
order: 2
title: "Strings & Slicing"
difficulty: 1
concepts: ["strings", "indexing", "slicing", "string methods", "f-strings"]
brief: |
  Text shows up everywhere in data work — names, dates, file paths — so being
  comfortable with it pays off every day. A **string** is simply text in quotes.

  Two ideas are worth getting:
  - **Picking out parts.** Positions start at `0`, so `s[0]` is the first character
    and `s[-1]` is the last. A **slice** grabs a range: `s[0:3]` is the first three
    characters (the second number stops *just before* it). The same trick works on
    lists.
  - **Built-in actions.** `.upper()` / `.lower()` change the case, `.strip()`
    removes spaces from the ends, and `.split(",")` breaks text into a list. An
    **f-string** like `f"{name}: {price}"` drops values into a sentence.

  One thing to remember: a string can't be changed once it's made — you always get
  a **new** string back, never a changed one. (Programmers call this being
  **immutable**, which just means "can't be changed".) So `.upper()` hands you a new
  string and you have to save it — `s = s.upper()`. Calling it without saving does
  nothing.

  **Mission:** From `raw = "  aapl,google,msft  "`:
  1. `clean` — trimmed and uppercased.
  2. `first` — the first ticker only (split on `,`, take index 0).
  3. `label` — an f-string `"Tickers: 3"` using the count of tickers.

  Expected: `clean == "AAPL,GOOGLE,MSFT"`, `first == "AAPL"`, `label == "Tickers: 3"`.
starter_code: |
  raw = "  aapl,google,msft  "
  # TODO: clean (strip + upper), first ticker (split, index 0), label (f-string)
  clean = ...
  first = ...
  label = ...
  print(clean, first, label)
solution_code: |
  raw = "  aapl,google,msft  "
  clean = raw.strip().upper()
  parts = clean.split(",")
  first = parts[0]
  label = f"Tickers: {len(parts)}"
  print(clean, first, label)
checks:
  - type: var_equals
    name: clean
    expected: "AAPL,GOOGLE,MSFT"
    message: "clean should be trimmed of spaces and uppercased"
  - type: var_equals
    name: first
    expected: "AAPL"
    message: "first should be the first ticker after splitting on ','"
  - type: var_equals
    name: label
    expected: "Tickers: 3"
    message: "label should be an f-string with the ticker count"
hints:
  - "Chain raw.strip().upper() — strip first to drop the surrounding spaces."
  - "split(\",\") returns a list; index [0] is the first element."
  - "f\"Tickers: {len(parts)}\" embeds the count into the string."
