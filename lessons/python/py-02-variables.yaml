id: py-02-variables
track: python
order: 2
title: "Position Sizing"
difficulty: 1
concepts: ["variables", "arithmetic"]
needs_spark: false
brief: |
  A **variable** is just a name you give to a value so you can use it again later —
  like putting a label on a box. You create one with `=`, for example
  `price = 189.50`.

  A few simple things to know:
  - You don't have to say what kind of value it is — Python figures that out for
    you. (This "Python sorts out the types itself" behaviour has a name:
    **dynamically typed**.) `100` is a whole number (called an **int**); `189.50`
    has a decimal point (called a **float**).
  - You do maths with the usual symbols: `+`, `-`, `*` (multiply), `/` (divide).
  - Small surprise: `/` always gives a decimal answer, so `190 / 2` is `95.0`, not
    `95`. That's why the total below comes out as `18950.0`.

  **Mission:** A stock trades at `189.50` and you buy `100` shares. Compute the
  total cost and store it in a variable named `cost`.

  Expected: `cost == 18950.0`
starter_code: |
  price = 189.50
  quantity = 100
  # TODO: compute total cost into a variable named `cost`
  cost = ...
  print(cost)
solution_code: |
  price = 189.50
  quantity = 100
  cost = price * quantity
  print(cost)
checks:
  - type: var_close
    name: cost
    expected: 18950.0
    tol: 0.001
    message: "cost should equal price * quantity (18950.0)"
    fail_detail: "Multiply price by quantity and assign the result to `cost`."
hints:
  - "Multiplication uses the * operator."
  - "cost = price * quantity"
