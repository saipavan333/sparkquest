id: py-01-hello
track: python
order: 1
title: "Hello, Trader"
difficulty: 1
concepts: ["print", "strings"]
needs_spark: false
brief: |
  **What & why.** Welcome to **SparkQuest**! Every pipeline starts with code that
  *does* something and tells you what happened — and `print(...)` is how you make a
  program speak. It writes text to **stdout**, the standard output stream; in data
  engineering that same stream carries logs, debug output, and the results your
  graders (and dashboards) read.

  **The essentials:**
  - A **string** is text wrapped in quotes — `"..."` or `'...'` (both work).
  - **f-strings** interpolate values: `f"price is {x}"` — the workhorse for log
    messages and you'll use them constantly.
  - `print()` adds a newline each call; it converts non-strings for you
    (`print(42)` works).

  **Mission:** Print a greeting that contains the word `Hello`.
starter_code: |
  # Print a greeting that includes the word "Hello"
solution_code: |
  print("Hello, Trader! Ready to learn Spark?")
checks:
  - type: stdout_contains
    value: "Hello"
    message: "Your output should contain the word 'Hello'"
    fail_detail: "Nothing matched. Did you call print() with text containing Hello?"
hints:
  - "Use print(\"your text here\") — the quotes are required."
  - "Make sure the exact word Hello (capital H) appears in the text."
