id: py-01-hello
track: python
order: 1
title: "Hello, Trader"
difficulty: 1
concepts: ["print", "strings"]
needs_spark: false
brief: |
  Welcome to **SparkQuest**! Every program needs a way to show its results, and in
  Python that job belongs to `print(...)`. It displays whatever you put in the
  brackets on the screen, so you'll use it all the time to see what your code is
  doing. (Programmers call this screen output the *standard output*, often shortened
  to **stdout** — but you can just think "the screen".)

  A few simple things to know:
  - **Text goes inside quotes** — `"hello"` or `'hello'` both work. A piece of text
    like this is called a **string**.
  - To **drop a value into your text**, put an `f` in front and use `{ }`:
    `f"price is {x}"` shows the value of `x` inside the sentence.
  - `print` works on numbers too — `print(42)` is fine.

  **Mission:** Print a greeting that contains the word `Hello`.
starter_code: |
  # Print a greeting that includes the word "Hello"
solution_code: |
  print("Hello, Trader! Ready to learn Spark?")
checks:
  - type: stdout_contains
    value: "Hello"
    message: "Your output should contain the word 'Hello'"
    fail_detail: "Nothing matched. Did you call print() with text containing Hello?"
hints:
  - "Use print(\"your text here\") — the quotes are required."
  - "Make sure the exact word Hello (capital H) appears in the text."
