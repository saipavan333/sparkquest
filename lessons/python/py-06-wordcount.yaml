id: py-06-wordcount
track: python
order: 6
title: "Count the Tickers (MapReduce in Miniature)"
difficulty: 3
concepts: ["dictionaries", "counting", "mapreduce-intuition"]
needs_spark: false
brief: |
  Counting how many times each item appears is one of the most common jobs in all of
  data work — so common it's the classic first big-data example, the "word count".

  You'll use a **dictionary** to keep a tally: each key is an item, and its value is
  how many times you've seen it so far.

  ```
   items:   AAPL  GOOG  AAPL  MSFT  AAPL  GOOG
                         │ tally each one as you go
                         ▼
   counts:  { AAPL: 3,  GOOG: 2,  MSFT: 1 }
  ``` The whole thing fits in one line:
  `counts[t] = counts.get(t, 0) + 1`.
  - `counts.get(t, 0)` looks up the item's current count, and gives back `0` if you
    haven't seen it yet — so the first time starts cleanly at zero.
  - You add `1` and store the new total back under that key.

  This simple "label each item, then add up per label" idea is exactly how Spark
  counts things across many machines later on.

  **Mission:** Given a list of `tickers`, build a dictionary named `counts`
  mapping each ticker to how many times it appears.

  Expected: `{"AAPL": 3, "GOOG": 2, "MSFT": 1}`
starter_code: |
  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  # TODO: build `counts` mapping each ticker -> frequency
  counts = {}
  print(counts)
solution_code: |
  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  counts = {}
  for t in tickers:
      counts[t] = counts.get(t, 0) + 1
  print(counts)
checks:
  - type: var_equals
    name: counts
    expected: {"AAPL": 3, "GOOG": 2, "MSFT": 1}
    message: "`counts` should map each ticker to its frequency"
    fail_detail: "For each ticker, increment its running count in the dict."
hints:
  - "dict.get(key, 0) returns 0 when the key is missing — handy for counting."
  - "counts[t] = counts.get(t, 0) + 1"
