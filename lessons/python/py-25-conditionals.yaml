id: py-25-conditionals
track: python
order: 2
title: "Conditionals: if / elif / else"
difficulty: 1
concepts: ["if", "elif", "else", "comparison operators", "boolean logic"]
brief: |
  Programs constantly need to make decisions — "if this is true, do that; otherwise
  do something else." `if` / `elif` / `else` is how you write that. Python checks
  each test in order and runs the **first** one that turns out true:

  ```
  if amount >= 1000:
      band = "large"
  elif amount >= 100:     # "elif" is short for "else, if"
      band = "medium"
  else:
      band = "small"
  ```

  The pieces:
  - **Compare** values with `==` (equal to), `!=` (not equal), and `<`, `<=`, `>`,
    `>=`.
  - **Combine** tests with `and`, `or`, and `not`.
  - The **indented** lines under each branch are what runs. In Python, indentation
    (the spaces at the start of a line) is how you show which lines belong together.

  The same decision drawn as a flow — Python takes the first path that fits:

  ```
   amount >= 1000 ? ──yes──► "large"
        | no
   amount >= 100 ?  ──yes──► "medium"
        | no
        v
      "small"
  ```

  (Later you'll meet Spark's `when().otherwise()` — it's the same idea, for tables.)

  **Mission:** Write `band(amount)` returning `"large"` if `amount >= 1000`,
  `"medium"` if `amount >= 100`, otherwise `"small"`.

  Examples: `band(1500) == "large"`, `band(250) == "medium"`, `band(50) == "small"`.
starter_code: |
  def band(amount):
      # TODO: return "large" (>=1000), "medium" (>=100), else "small"
      ...
solution_code: |
  def band(amount):
      if amount >= 1000:
          return "large"
      elif amount >= 100:
          return "medium"
      else:
          return "small"
checks:
  - type: callable_returns
    name: band
    args: [1500]
    expected: "large"
    message: "band(1500) should be 'large'"
  - type: callable_returns
    name: band
    args: [250]
    expected: "medium"
    message: "band(250) should be 'medium'"
  - type: callable_returns
    name: band
    args: [50]
    expected: "small"
    message: "band(50) should be 'small'"
hints:
  - "Order matters: test the highest threshold (>= 1000) first."
  - "Use elif for the middle band, else for everything left over."
  - "Each branch returns, so the first match wins."
