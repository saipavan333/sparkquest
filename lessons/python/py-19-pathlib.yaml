id: py-19-pathlib
track: python
order: 19
title: "Files & pathlib"
difficulty: 2
concepts: ["pathlib", "Path", "filesystem"]
brief: |
  **`pathlib`** is the modern way to work with file and folder paths in Python.
  Instead of gluing bits of text together with slashes (which is easy to get wrong,
  and differs between Windows and Mac/Linux), you work with a tidy `Path` object that
  knows it's a path.

  - **Build a path** with the `/` symbol: `Path("/data") / "raw" / "trades.csv"`.
    Python puts in the right separators for you, on any operating system.
  - **Pull pieces out** of a path: `.name` is the file name (`trades.csv`), `.stem`
    is the name without its extension (`trades`), `.suffix` is the extension
    (`.csv`), and `.parent` is the folder it sits in (`/data/raw`).
  - Handy extras: `.exists()` checks whether it's actually there, and `.glob("*.csv")`
    finds all the matching files in a folder.

  **Mission:** From the path `/data/raw/trades.csv`, extract its `stem`, `suffix`,
  and `parent` (the parent as a string).

  Expected: `stem == "trades"`, `suffix == ".csv"`, `parent == "/data/raw"`.
starter_code: |
  from pathlib import Path

  p = Path("/data/raw/trades.csv")
  # TODO: extract stem, suffix, and parent (as a string)
  stem = ...
  suffix = ...
  parent = ...
  print(stem, suffix, parent)
solution_code: |
  from pathlib import Path

  p = Path("/data/raw/trades.csv")
  stem = p.stem
  suffix = p.suffix
  parent = str(p.parent)
  print(stem, suffix, parent)
checks:
  - type: var_equals
    name: stem
    expected: "trades"
    message: "stem should be the filename without its extension"
  - type: var_equals
    name: suffix
    expected: ".csv"
    message: "suffix should be the file extension, including the dot"
  - type: var_equals
    name: parent
    expected: "/data/raw"
    message: "parent should be the containing directory as a string"
hints:
  - "p.stem is the name without extension; p.suffix includes the dot."
  - "p.parent is a Path — wrap it in str(...) for the expected string."
