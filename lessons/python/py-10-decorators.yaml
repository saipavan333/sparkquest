id: py-10-decorators
track: python
order: 10
title: "Decorators"
difficulty: 4
concepts: ["decorators", "closures", "higher-order functions"]
needs_spark: false
brief: |
  A **decorator** is a way to add behaviour to a function — like timing it, logging
  it, or changing its result — **without changing the function's own code**. You
  write the extra behaviour once, then attach it to any function with an `@name` line
  written just above it.

  Here's the idea, slowly:
  - A decorator is simply a function that takes another function and gives back a
    new, "wrapped" version of it.
  - Writing `@double` above `def add(...)` is a shortcut for `add = double(add)` — it
    passes `add` through `double` and keeps the wrapped result under the name `add`.
  - The wrapper usually accepts `(*args, **kwargs)` so it works no matter what
    arguments the original function takes.

  You've actually used a decorator already — `@dataclass` (coming up soon) is one.
  They look like magic at first, but that's all there is to it.

  **Mission:** Write a decorator `double` that **doubles** whatever a function
  returns, then apply it to `add(a, b)`.

  Examples: `add(2, 3) == 10` (because 2 + 3 = 5, doubled) and `add(10, 5) == 30`
starter_code: |
  def double(fn):
      # TODO: return a wrapper that doubles fn's result
      ...

  @double
  def add(a, b):
      return a + b
solution_code: |
  def double(fn):
      def wrapper(*args, **kwargs):
          return fn(*args, **kwargs) * 2
      return wrapper

  @double
  def add(a, b):
      return a + b
checks:
  - type: callable_returns
    name: add
    args: [2, 3]
    expected: 10
    message: "add(2, 3) should be doubled to 10"
  - type: callable_returns
    name: add
    args: [10, 5]
    expected: 30
    message: "add(10, 5) should be doubled to 30"
hints:
  - "Define an inner wrapper(*args, **kwargs) and return it from double."
  - "Inside wrapper, return fn(*args, **kwargs) * 2"
