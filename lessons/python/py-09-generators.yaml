id: py-09-generators
track: python
order: 9
title: "Generators"
difficulty: 4
concepts: ["generators", "yield", "lazy evaluation"]
needs_spark: false
brief: |
  A **generator** is a function that hands back its values **one at a time, only when
  you ask for them** — instead of building a big list all at once. That means you can
  work through a huge file (or an endless stream of data) while keeping almost
  nothing in memory at any moment.

  ```
   a list builds everything at once:   [#][#][#][#][#][#]   (all held in memory)

   a generator hands them over one at a time, only when asked:
        [#] ─► use ─► [#] ─► use ─► [#] ─► ...
  ```

  The special word is **`yield`**. Using `yield` instead of `return` turns a function
  into a generator: each time you ask for the next value, it runs up to the next
  `yield`, hands that value back, and **pauses** right there until you ask again.

  - You normally use a generator in a `for` loop, or turn it into a real list with
    `list(...)`.
  - One catch: a generator can only be gone through **once**. After its values are
    used up, it's empty.

  This "don't build it all — hand it over piece by piece" idea is the same one Spark
  uses to process data far too big to fit in memory.

  **Mission:** Write a generator function `batches(items, size)` that yields
  successive chunks of `items`, each a list of length `size` (the last may be
  shorter). Then collect them into `result`.

  Expected: `result == [[1, 2], [3, 4], [5]]`
starter_code: |
  def batches(items, size):
      # TODO: yield successive chunks of length `size`
      ...

  result = [list(b) for b in batches([1, 2, 3, 4, 5], 2)]
  print(result)
solution_code: |
  def batches(items, size):
      for i in range(0, len(items), size):
          yield items[i:i + size]

  result = [list(b) for b in batches([1, 2, 3, 4, 5], 2)]
  print(result)
checks:
  - type: var_equals
    name: result
    expected: [[1, 2], [3, 4], [5]]
    message: "result should be the input split into chunks of 2"
hints:
  - "Step through indices: for i in range(0, len(items), size)"
  - "Yield a slice each step: yield items[i:i + size]"
