id: py-09-generators
track: python
order: 9
title: "Generators"
difficulty: 4
concepts: ["generators", "yield", "lazy evaluation"]
needs_spark: false
brief: |
  **What & why.** A **generator** produces values **lazily** with `yield` — one at a
  time, on demand — so you can stream through a 100 GB file (or an infinite
  sequence) using almost **no memory**. That's exactly Spark's philosophy in
  miniature: don't materialise everything, pull records through a pipeline as
  needed. Generators are also how you **batch** work (this lesson) to amortise
  per-chunk overhead — the same idea as `mapPartitions` and pandas UDFs in Spark.

  **The essentials:**
  - `yield` turns a function into a generator; calling it returns an iterator that
    runs the body up to each `yield`, then **pauses**.
  - It's **single-pass** — once consumed, it's exhausted (a classic bug: iterating
    a generator twice gives nothing the second time).
  - `next(gen)` pulls one value; a `for` loop or `list(gen)` drains it.

  **Mission:** Write a generator function `batches(items, size)` that yields
  successive chunks of `items`, each a list of length `size` (the last may be
  shorter). Then collect them into `result`.

  Expected: `result == [[1, 2], [3, 4], [5]]`
starter_code: |
  def batches(items, size):
      # TODO: yield successive chunks of length `size`
      ...

  result = [list(b) for b in batches([1, 2, 3, 4, 5], 2)]
  print(result)
solution_code: |
  def batches(items, size):
      for i in range(0, len(items), size):
          yield items[i:i + size]

  result = [list(b) for b in batches([1, 2, 3, 4, 5], 2)]
  print(result)
checks:
  - type: var_equals
    name: result
    expected: [[1, 2], [3, 4], [5]]
    message: "result should be the input split into chunks of 2"
hints:
  - "Step through indices: for i in range(0, len(items), size)"
  - "Yield a slice each step: yield items[i:i + size]"
