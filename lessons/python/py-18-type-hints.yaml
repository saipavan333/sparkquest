id: py-18-type-hints
track: python
order: 18
title: "Type Hints (typing)"
difficulty: 2
concepts: ["type hints", "typing", "annotations", "mypy"]
brief: |
  **Type hints** let you note what kind of value a function expects and what it gives
  back — for example, "this takes a list of numbers and returns a number". Python
  doesn't force these to be correct when the program runs; they're mainly there to
  **help people and tools**. Your editor can autocomplete and warn you, and checking
  tools can spot mistakes before the code is ever run.

  - You add them with a colon and an arrow: `def f(x: int, name: str) -> bool:`.
  - For a list of decimals you'd write `list[float]`; for "this might be missing" you
    write `Optional[float]` (which just means "a float, or `None`").
  - They're only notes — `f("3")` still runs even if you wrote `int`. Teams still use
    them, because catching a wrong type early is far cheaper than a failure later.

  **Mission:** Write `total_revenue(prices: list[float]) -> float` that returns the
  sum of `prices`, then call it on the sample list into `result`.
starter_code: |
  # TODO: annotate the parameter as list[float] and the return as float
  def total_revenue(prices):
      return sum(prices)

  result = total_revenue([10.0, 20.0, 5.0])
  print(result)
solution_code: |
  def total_revenue(prices: list[float]) -> float:
      return sum(prices)

  result = total_revenue([10.0, 20.0, 5.0])
  print(result)
checks:
  - type: var_close
    name: result
    expected: 35.0
    tol: 0.0001
    message: "result should be 35.0 (sum of the prices)"
  - type: custom
    message: "total_revenue should carry type hints for `prices` and the return"
    code: |
      fn = ns.get("total_revenue")
      ann = getattr(fn, "__annotations__", {})
      ok = ("prices" in ann) and ("return" in ann)
hints:
  - "Annotate the parameter: prices: list[float]."
  - "Annotate the return after the arrow: -> float."
  - "Hints don't change behaviour — sum(prices) still does the work."
