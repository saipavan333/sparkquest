id: py-18-type-hints
track: python
order: 18
title: "Type Hints (typing)"
difficulty: 2
concepts: ["type hints", "typing", "annotations", "mypy"]
brief: |
  **What & why.** Type hints annotate the *intended* types of parameters, returns,
  and variables. Python doesn't enforce them at runtime — they're for **humans and
  tools**: your IDE autocompletes and flags mismatches, and `mypy`/`pyright` catch
  whole classes of bugs *before* you ship. Data-engineering teams enforce them
  because a pipeline that passes a `str` where a `float` was expected fails at 3am,
  not in code review.

  **Syntax you'll use daily:**
  - `def f(x: int, name: str) -> bool: ...` — params and return type.
  - Containers: `list[float]`, `dict[str, int]`, `tuple[int, ...]` (3.9+ builtins).
  - `Optional[T]` (a.k.a. `T | None`) for "might be None".
  - Hints live on the function object in `__annotations__` — that's all they are.

  **Gotcha.** Hints are *not* validated at runtime; `f("3")` still runs. They
  document intent and power static checkers — they don't replace input validation.

  **Mission:** Write `total_revenue(prices: list[float]) -> float` that returns the
  sum of `prices`, then call it on the sample list into `result`.
starter_code: |
  # TODO: annotate the parameter as list[float] and the return as float
  def total_revenue(prices):
      return sum(prices)

  result = total_revenue([10.0, 20.0, 5.0])
  print(result)
solution_code: |
  def total_revenue(prices: list[float]) -> float:
      return sum(prices)

  result = total_revenue([10.0, 20.0, 5.0])
  print(result)
checks:
  - type: var_close
    name: result
    expected: 35.0
    tol: 0.0001
    message: "result should be 35.0 (sum of the prices)"
  - type: custom
    message: "total_revenue should carry type hints for `prices` and the return"
    code: |
      fn = ns.get("total_revenue")
      ann = getattr(fn, "__annotations__", {})
      ok = ("prices" in ann) and ("return" in ann)
hints:
  - "Annotate the parameter: prices: list[float]."
  - "Annotate the return after the arrow: -> float."
  - "Hints don't change behaviour — sum(prices) still does the work."
