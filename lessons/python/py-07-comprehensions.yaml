id: py-07-comprehensions
track: python
order: 7
title: "Comprehensions"
difficulty: 3
concepts: ["list comprehension", "dict comprehension", "filtering"]
needs_spark: false
brief: |
  A **comprehension** is a short way to build a new list (or dictionary) from an
  existing one, all in a single line — instead of writing a `for` loop that keeps
  adding to a list. Once you're used to them, they're easier to read, not harder.

  Read this left to right: "give me `x` for every `x` in the list, but only if it
  passes the test":
  - List: `[x for x in xs if x > 0]` — keep, and optionally change, items in one go.
  - Dict: `{k: v for k, v in pairs}` — build a lookup table from pairs of values.

  The `for t, r in data` part is **unpacking**: each item in `data` is a pair, and
  this splits it into `t` and `r` for you automatically.

  (Tip: keep them simple — if a comprehension gets long or nested, a plain loop is
  clearer.)

  **Mission:** From `data` (ticker, daily return) pairs:
  1. Build a list `winners` of the tickers whose return is **positive**.
  2. Build a dict `ret_map` mapping every ticker to its return.

  Expected: `winners == ["AAPL", "MSFT"]` and
  `ret_map == {"AAPL": 0.02, "GOOG": -0.01, "MSFT": 0.03, "JPM": -0.02}`
starter_code: |
  data = [("AAPL", 0.02), ("GOOG", -0.01), ("MSFT", 0.03), ("JPM", -0.02)]
  # TODO: winners (list comprehension) and ret_map (dict comprehension)
  winners = ...
  ret_map = ...
  print(winners, ret_map)
solution_code: |
  data = [("AAPL", 0.02), ("GOOG", -0.01), ("MSFT", 0.03), ("JPM", -0.02)]
  winners = [t for t, r in data if r > 0]
  ret_map = {t: r for t, r in data}
  print(winners, ret_map)
checks:
  - type: var_equals
    name: winners
    expected: ["AAPL", "MSFT"]
    message: "winners should list only the tickers with a positive return"
  - type: var_equals
    name: ret_map
    expected: {"AAPL": 0.02, "GOOG": -0.01, "MSFT": 0.03, "JPM": -0.02}
    message: "ret_map should map every ticker to its return"
hints:
  - "List comp with a filter: [t for t, r in data if r > 0]"
  - "Dict comp: {t: r for t, r in data}"
