id: py-13-sets-tuples
track: python
order: 13
title: "Sets, Tuples & Unpacking"
difficulty: 2
concepts: ["set", "tuple", "unpacking"]
needs_spark: false
brief: |
  Three small tools you'll use all the time:
  - **Sets** hold only **unique** items — no duplicates allowed. They're perfect for
    removing repeats, or quickly checking "have I already seen this one?" with
    `x in s`. You write one with curly braces: `{1, 2, 3}`.
  - **Tuples** are like lists but **can't be changed** once they're made (that
    "can't be changed" property is called *immutable*). You write them with round
    brackets: `(ticker, qty)`. Good for grouping a few values that belong together.
  - **Unpacking** splits a group of values into separate names in one line:
    `a, b = pair`. A handy version — `first, *rest = [1, 2, 3, 4]` — puts the first
    item in `first` and everything else in a list called `rest`.

  Small heads-up: `{}` on its own makes an empty **dictionary**, not a set — for an
  empty set, write `set()`.

  **Mission:**
  1. Deduplicate `tickers` into a set and store its size in `n_unique`.
  2. Unpack `[1, 2, 3, 4]` so `first` is the head and `rest` is the remaining list.

  Expected: `n_unique == 3`, `first == 1`, `rest == [2, 3, 4]`.
starter_code: |
  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "GOOG"]
  # TODO: n_unique = number of distinct tickers
  n_unique = ...
  # TODO: unpack head/tail of [1, 2, 3, 4]
  first, rest = ...
  print(n_unique, first, rest)
solution_code: |
  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "GOOG"]
  n_unique = len(set(tickers))
  first, *rest = [1, 2, 3, 4]
  print(n_unique, first, rest)
checks:
  - type: var_equals
    name: n_unique
    expected: 3
    message: "n_unique should be the count of distinct tickers"
  - type: var_equals
    name: first
    expected: 1
    message: "first should be the head of the list"
  - type: var_equals
    name: rest
    expected: [2, 3, 4]
    message: "rest should be the remaining items"
hints:
  - "set(tickers) drops duplicates; len(...) gives the count."
  - "Star-unpacking: first, *rest = [1, 2, 3, 4]"
