id: py-28-testing
track: python
order: 18
title: "Testing with assert"
difficulty: 2
concepts: ["testing", "assert", "pytest", "data quality"]
brief: |
  Code you haven't tested is code you can't fully trust — a quiet mistake can feed
  wrong numbers into reports for weeks before anyone notices. The simplest way to
  test is the **`assert`** statement. `assert something == expected` does nothing if
  it's true, but stops with an error if it's false — so a failed `assert` points
  straight at what went wrong.

  - A test is just a small function full of `assert` checks, for example
    `assert add(2, 3) == 5`.
  - **`pytest`** is the popular tool that finds and runs all your tests for you (any
    function whose name starts with `test_`) and shows a clear message when one fails.
  - For Spark specifically, a helper called `chispa` can compare two tables and tell
    you whether they match (more on testing in
    [Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).

  The habit to build: write your logic as small functions, then check each one with a
  few asserts on simple, made-up inputs.

  **Mission:** Implement `pnl(buy, sell, qty)` returning `(sell - buy) * qty`, then
  write `test_pnl()` that **asserts** two cases and `return`s `True` when both pass.
  Call it into `result`.

  Expected: `result == True` (both assertions hold).
starter_code: |
  def pnl(buy, sell, qty):
      # TODO: return the profit-and-loss
      ...

  def test_pnl():
      # TODO: assert pnl(100, 110, 10) == 100 and pnl(50, 40, 5) == -50, then return True
      ...

  result = test_pnl()
  print(result)
solution_code: |
  def pnl(buy, sell, qty):
      return (sell - buy) * qty

  def test_pnl():
      assert pnl(100, 110, 10) == 100, "expected a 100 profit"
      assert pnl(50, 40, 5) == -50, "expected a 50 loss"
      return True

  result = test_pnl()
  print(result)
checks:
  - type: var_equals
    name: result
    expected: true
    message: "result should be True — both assertions in test_pnl passed"
  - type: callable_returns
    name: pnl
    args: [100, 110, 10]
    expected: 100
    message: "pnl(100, 110, 10) should be 100"
hints:
  - "assert pnl(100, 110, 10) == 100 raises AssertionError if the value is wrong."
  - "If no assert fails, fall through to `return True`."
  - "A failing assert would stop the function before it returns True."
