id: py-12-collections
track: python
order: 12
title: "collections & itertools"
difficulty: 3
concepts: ["Counter", "standard library", "counting"]
needs_spark: false
brief: |
  Python comes with a large toolbox built in. The **`collections`** module holds a
  few ready-made helpers that save you from rebuilding common things by hand —
  especially **`Counter`**, which tallies how often each item appears in a single
  line.

  Two worth knowing:
  - **`Counter(items)`** counts everything for you, and `.most_common(1)` hands back
    the single most frequent item (as an `(item, count)` pair — so `[0][0]` gets just
    the item).
  - **`defaultdict`** is a dictionary that fills in a sensible starting value for a
    brand-new key on its own, so you never have to check "have I seen this key yet?".

  The takeaway: when a task feels common, Python probably already has a tool for it —
  reach for the toolbox instead of writing it from scratch.

  **Mission:** Use `Counter` to count the `tickers`, store it in `counts`, and put
  the single most-common ticker in `top`.

  Expected: `counts == {"AAPL": 3, "GOOG": 2, "MSFT": 1}` and `top == "AAPL"`
starter_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  # TODO: counts = a Counter of tickers; top = the most common ticker
  counts = ...
  top = ...
  print(counts, top)
solution_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  counts = Counter(tickers)
  top = counts.most_common(1)[0][0]
  print(counts, top)
checks:
  - type: var_equals
    name: counts
    expected: {"AAPL": 3, "GOOG": 2, "MSFT": 1}
    message: "counts should be the frequency of each ticker"
  - type: var_equals
    name: top
    expected: "AAPL"
    message: "top should be the single most common ticker"
hints:
  - "Counter(tickers) counts everything for you."
  - "counts.most_common(1) returns [(ticker, count)] — take [0][0]."
