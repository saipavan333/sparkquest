id: py-12-collections
track: python
order: 12
title: "collections & itertools"
difficulty: 3
concepts: ["Counter", "standard library", "counting"]
needs_spark: false
brief: |
  Python's standard library has batteries for data work. `collections.Counter`
  counts things in one line — the same job as a Spark `groupBy().count()`, locally.

  **Mission:** Use `Counter` to count the `tickers`, store it in `counts`, and put
  the single most-common ticker in `top`.

  Expected: `counts == {"AAPL": 3, "GOOG": 2, "MSFT": 1}` and `top == "AAPL"`
starter_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  # TODO: counts = a Counter of tickers; top = the most common ticker
  counts = ...
  top = ...
  print(counts, top)
solution_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  counts = Counter(tickers)
  top = counts.most_common(1)[0][0]
  print(counts, top)
checks:
  - type: var_equals
    name: counts
    expected: {"AAPL": 3, "GOOG": 2, "MSFT": 1}
    message: "counts should be the frequency of each ticker"
  - type: var_equals
    name: top
    expected: "AAPL"
    message: "top should be the single most common ticker"
hints:
  - "Counter(tickers) counts everything for you."
  - "counts.most_common(1) returns [(ticker, count)] — take [0][0]."
