id: py-12-collections
track: python
order: 12
title: "collections & itertools"
difficulty: 3
concepts: ["Counter", "standard library", "counting"]
needs_spark: false
brief: |
  **What & why.** Python's standard library is "batteries included" — and
  `collections` has the data-wrangling batteries. `Counter` counts things in one
  line (the local twin of Spark's `groupBy().count()`); reach for the right tool
  instead of re-implementing it.

  **The `collections` toolkit worth knowing:**
  - **`Counter`** — frequency map; `.most_common(n)` returns the top-n `(item,
    count)` pairs already sorted.
  - **`defaultdict(list)`** — a dict that auto-creates a default for missing keys
    (no more `if k not in d`), perfect for grouping rows by key.
  - **`namedtuple`** / **`deque`** (O(1) ends, great for sliding windows).
  - `itertools` complements it: `groupby`, `chain`, `islice` for lazy pipelines.

  **Mission:** Use `Counter` to count the `tickers`, store it in `counts`, and put
  the single most-common ticker in `top`.

  Expected: `counts == {"AAPL": 3, "GOOG": 2, "MSFT": 1}` and `top == "AAPL"`
starter_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  # TODO: counts = a Counter of tickers; top = the most common ticker
  counts = ...
  top = ...
  print(counts, top)
solution_code: |
  from collections import Counter

  tickers = ["AAPL", "GOOG", "AAPL", "MSFT", "AAPL", "GOOG"]
  counts = Counter(tickers)
  top = counts.most_common(1)[0][0]
  print(counts, top)
checks:
  - type: var_equals
    name: counts
    expected: {"AAPL": 3, "GOOG": 2, "MSFT": 1}
    message: "counts should be the frequency of each ticker"
  - type: var_equals
    name: top
    expected: "AAPL"
    message: "top should be the single most common ticker"
hints:
  - "Counter(tickers) counts everything for you."
  - "counts.most_common(1) returns [(ticker, count)] — take [0][0]."
