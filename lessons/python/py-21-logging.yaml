id: py-21-logging
track: python
order: 21
title: "Logging (over print)"
difficulty: 3
concepts: ["logging", "observability", "handlers"]
brief: |
  When you want to see what a program is doing, you *could* use `print` — but real
  programs use the **`logging`** tool instead. Think of it as `print` with extra
  powers: it labels each message with how important it is, can send messages to
  different places (the screen, a file, a monitoring system), and can be turned up or
  down without changing your code.

  - You get a logger by name — `logging.getLogger("pipeline")` — and tell it how
    chatty to be by setting a **level**.
  - **Levels** run from least to most serious: `DEBUG`, `INFO`, `WARNING`, `ERROR`,
    `CRITICAL`. If you set the level to `INFO`, you'll see `INFO` and anything more
    serious, but the noisy `DEBUG` messages stay hidden.
  - A **handler** is simply "where the messages go" — for example, to the screen or
    into a file.

  Why bother instead of `print`? You can turn the detail up while building and down
  in production, and send logs wherever you need — things plain `print` can't do.

  **Mission:** Send an `INFO` log `"processed 100 rows"` from a logger into the
  provided `buf` (via a `StreamHandler`), then read the captured text into
  `captured`.
starter_code: |
  import logging, io

  buf = io.StringIO()
  logger = logging.getLogger("pipeline_demo")
  logger.setLevel(logging.INFO)
  logger.handlers.clear()
  # TODO: add a StreamHandler writing to buf, log an INFO message, read buf into `captured`
  ...
  captured = ...
  print(captured)
solution_code: |
  import logging, io

  buf = io.StringIO()
  logger = logging.getLogger("pipeline_demo")
  logger.setLevel(logging.INFO)
  logger.handlers.clear()
  handler = logging.StreamHandler(buf)
  logger.addHandler(handler)
  logger.info("processed 100 rows")
  handler.flush()
  captured = buf.getvalue()
  print(captured)
checks:
  - type: custom
    message: "captured should contain the INFO message 'processed 100 rows'"
    code: |
      ok = "processed 100 rows" in (ns.get("captured") or "")
hints:
  - "handler = logging.StreamHandler(buf); logger.addHandler(handler)."
  - "logger.info(\"processed 100 rows\") emits the record; read it with buf.getvalue()."
  - "An INFO message shows because the logger's level is INFO (INFO >= INFO)."
