id: py-04-dicts
track: python
order: 4
title: "The Price Book"
difficulty: 2
concepts: ["dictionaries", "lookup"]
needs_spark: false
brief: |
  A **dictionary** stores pairs of things: a **key** and its **value** — like a
  contacts app where a name (the key) gives you a phone number (the value). Here
  we'll map a stock symbol to its price.

  - You write one with curly braces: `{"AAPL": 189.5, "GOOG": 142.1}`.
  - To look a value up, put its key in square brackets: `prices["GOOG"]` gives back
    `142.1`.
  - To add or change one: `prices["TSLA"] = 250.0`.

  Why they matter: finding a value by its key is **instant**, no matter how big the
  dictionary gets. That's why dictionaries are everywhere in data work — for fast
  lookups, counting things, and matching data together.

  Watch out: asking for a key that isn't there — `prices["MISSING"]` — causes an
  error (called a **KeyError**). If a key might be missing, use
  `prices.get("MISSING")` instead; it hands back `None` (Python's "nothing here"
  value) rather than crashing.

  **Mission:** Build a dictionary named `prices` with these entries, then look up
  Google's price into a variable named `goog`.

  - `AAPL` -> `189.5`
  - `GOOG` -> `142.1`
  - `MSFT` -> `415.6`

  Expected: `goog == 142.1`
starter_code: |
  # TODO: build the `prices` dictionary, then read GOOG into `goog`
  prices = {}
  goog = ...
  print(goog)
solution_code: |
  prices = {"AAPL": 189.5, "GOOG": 142.1, "MSFT": 415.6}
  goog = prices["GOOG"]
  print(goog)
