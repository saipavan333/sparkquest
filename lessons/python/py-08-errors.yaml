id: py-08-errors
track: python
order: 8
title: "Error Handling"
difficulty: 3
concepts: ["try/except", "exceptions", "robustness"]
needs_spark: false
brief: |
  Sometimes code hits a problem it can't handle — dividing by zero, a missing value,
  or text where a number was expected. By default Python **stops the whole program**
  and shows an error. (These errors have a name: *exceptions*.) `try` / `except`
  lets you catch the problem and carry on instead of crashing.

  ```
  try:
      result = a / b           # the risky part
  except ZeroDivisionError:    # if THAT particular error happens...
      result = None            # ...do this instead
  ```

  - Put the risky code under `try:`, and what to do if it goes wrong under `except:`.
  - Name the **specific** problem you expect (here, `ZeroDivisionError`) instead of
    catching everything — otherwise you might hide real bugs without noticing.

  In real data work, this is how you keep a job running when one bad row turns up:
  catch the problem, set that row aside, and keep going.

  **Mission:** Write a function `safe_divide(a, b)` that returns `a / b`, but
  returns `None` when `b` is `0` (catch the `ZeroDivisionError`).

  Examples: `safe_divide(10, 2) == 5.0` and `safe_divide(10, 0) is None`
starter_code: |
  def safe_divide(a, b):
      # TODO: return a / b, but None if b is 0
      ...
solution_code: |
  def safe_divide(a, b):
      try:
          return a / b
      except ZeroDivisionError:
          return None
checks:
  - type: callable_returns
    name: safe_divide
    args: [10, 2]
    expected: 5.0
    message: "safe_divide(10, 2) should return 5.0"
  - type: callable_returns
    name: safe_divide
    args: [10, 0]
    expected: null
    message: "safe_divide(10, 0) should return None, not crash"
hints:
  - "Wrap the division in try: ... except ZeroDivisionError: ..."
  - "Return None from the except block."
