id: py-08-errors
track: python
order: 8
title: "Error Handling"
difficulty: 3
concepts: ["try/except", "exceptions", "robustness"]
needs_spark: false
brief: |
  **What & why.** Real pipelines hit bad data — a malformed row, a divide-by-zero, a
  missing field. **`try`/`except`** lets your code handle the failure instead of
  crashing the whole job on one bad record. This is the foundation of the
  **quarantine pattern** (route bad rows aside, keep going — see
  [Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).

  **The essentials:**
  - `try:` the risky code, `except SomeError:` the recovery. Catch the **specific**
    exception (`ZeroDivisionError`, `KeyError`, `ValueError`), not a bare `except:`,
    so you don't swallow bugs you didn't intend to.
  - Optional `else:` (ran if no error) and `finally:` (always runs — cleanup).
  - You can inspect the error: `except ValueError as e:`.

  **Gotcha.** Catching too broadly (`except Exception`) hides real bugs and makes
  failures silent — the cardinal sin in data pipelines. Be specific.

  **Mission:** Write a function `safe_divide(a, b)` that returns `a / b`, but
  returns `None` when `b` is `0` (catch the `ZeroDivisionError`).

  Examples: `safe_divide(10, 2) == 5.0` and `safe_divide(10, 0) is None`
starter_code: |
  def safe_divide(a, b):
      # TODO: return a / b, but None if b is 0
      ...
solution_code: |
  def safe_divide(a, b):
      try:
          return a / b
      except ZeroDivisionError:
          return None
checks:
  - type: callable_returns
    name: safe_divide
    args: [10, 2]
    expected: 5.0
    message: "safe_divide(10, 2) should return 5.0"
  - type: callable_returns
    name: safe_divide
    args: [10, 0]
    expected: null
    message: "safe_divide(10, 0) should return None, not crash"
hints:
  - "Wrap the division in try: ... except ZeroDivisionError: ..."
  - "Return None from the except block."
