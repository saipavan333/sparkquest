id: py-11-dataclasses
track: python
order: 11
title: "Dataclasses & OOP"
difficulty: 3
concepts: ["dataclass", "classes", "methods"]
needs_spark: false
brief: |
  A **class** lets you bundle related pieces of data into your own kind of object —
  here, a `Trade` that holds a ticker, a quantity, and a price. Normally setting one
  up takes a lot of repetitive code; a **`@dataclass`** writes that boring part for
  you automatically.

  - You list the fields with their types, like `ticker: str` and `qty: int`, and the
    dataclass lets you create one straight away: `Trade("AAPL", 10, 190.0)`.
  - You can also add a **method** — a function that belongs to the object and can use
    the object's own data through `self`: `def notional(self): return self.qty *
    self.price`.
  - Bonus: two trades with the same field values count as equal, which is handy when
    you test your code.

  Dataclasses are a tidy way to model the "rows" and "records" that move through a
  data pipeline.

  **Mission:** Define a dataclass `Trade` with fields `ticker` (str), `qty` (int),
  and `price` (float), plus a method `notional(self)` returning `qty * price`.
  Then create `t = Trade("AAPL", 10, 190.0)` and store `value = t.notional()`.

  Expected: `value == 1900.0`
starter_code: |
  from dataclasses import dataclass

  @dataclass
  class Trade:
      # TODO: declare fields and a notional() method
      ...

  t = Trade("AAPL", 10, 190.0)
  value = t.notional()
  print(value)
solution_code: |
  from dataclasses import dataclass

  @dataclass
  class Trade:
      ticker: str
      qty: int
      price: float

      def notional(self):
          return self.qty * self.price

  t = Trade("AAPL", 10, 190.0)
  value = t.notional()
  print(value)
checks:
  - type: var_type
    name: t
    type_name: Trade
    message: "t should be an instance of your Trade dataclass"
  - type: var_close
    name: value
    expected: 1900.0
    tol: 0.001
    message: "value should equal qty * price (1900.0)"
hints:
  - "Declare fields with type hints under the class: ticker: str, etc."
  - "Add a regular method: def notional(self): return self.qty * self.price"
