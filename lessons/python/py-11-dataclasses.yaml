id: py-11-dataclasses
track: python
order: 11
title: "Dataclasses & OOP"
difficulty: 3
concepts: ["dataclass", "classes", "methods"]
needs_spark: false
brief: |
  **What & why.** `@dataclass` generates the boilerplate of a record type for you —
  `__init__`, `__repr__`, `__eq__` — from a few typed field declarations. It's the
  Pythonic way to model **rows, configs, and events** in a pipeline: readable,
  comparable, and self-documenting, without a wall of `self.x = x` assignments.

  **The essentials:**
  - Declare fields as **type-annotated class attributes**: `ticker: str`. The
    decorator turns them into constructor parameters (in order).
  - Add defaults (`qty: int = 0`), regular **methods** (`def notional(self): ...`),
    and `frozen=True` for an immutable value object.
  - `__eq__` compares by field values — two `Trade`s with the same fields are equal,
    which is exactly what you want for tests.

  **Mission:** Define a dataclass `Trade` with fields `ticker` (str), `qty` (int),
  and `price` (float), plus a method `notional(self)` returning `qty * price`.
  Then create `t = Trade("AAPL", 10, 190.0)` and store `value = t.notional()`.

  Expected: `value == 1900.0`
starter_code: |
  from dataclasses import dataclass

  @dataclass
  class Trade:
      # TODO: declare fields and a notional() method
      ...

  t = Trade("AAPL", 10, 190.0)
  value = t.notional()
  print(value)
solution_code: |
  from dataclasses import dataclass

  @dataclass
  class Trade:
      ticker: str
      qty: int
      price: float

      def notional(self):
          return self.qty * self.price

  t = Trade("AAPL", 10, 190.0)
  value = t.notional()
  print(value)
checks:
  - type: var_type
    name: t
    type_name: Trade
    message: "t should be an instance of your Trade dataclass"
  - type: var_close
    name: value
    expected: 1900.0
    tol: 0.001
    message: "value should equal qty * price (1900.0)"
hints:
  - "Declare fields with type hints under the class: ticker: str, etc."
  - "Add a regular method: def notional(self): return self.qty * self.price"
