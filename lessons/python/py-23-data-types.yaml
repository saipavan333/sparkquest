id: py-23-data-types
track: python
order: 2
title: "Python Data Types"
difficulty: 1
concepts: ["int", "float", "str", "bool", "None", "type conversion", "truthiness"]
brief: |
  Every value in Python has a **type**, and learning the basic ones is the real
  place to start. There are five you'll see again and again:
  - **int** — a whole number, like `100`.
  - **float** — a number with a decimal point, like `189.5`.
  - **str** — text in quotes, like `"AAPL"` (short for "string").
  - **bool** — either `True` or `False`.
  - **None** — a special "nothing here" value (Spark calls this `null`).

  The most useful everyday skill is **converting** between them. Data usually
  arrives as text, so you turn it into real numbers before doing maths:
  `int("100")` gives you the number `100`, and `float("189.5")` gives `189.5`.

  ```
    text             real number
    "100"   ──int()──►   100      (now you can do maths)
    "189.5" ──float()─►  189.5
  ``` You
  can check a value's type any time with `type(x)`.

  One more handy idea. A few values count as "false" when you test them in a
  decision (an `if`): `0`, empty text `""`, an empty list `[]`, and `None`.
  Programmers call these **falsy** values ("falsy" = "treated as false"). Everything
  else counts as "true" (**truthy**). This is why you often see `if value:` — it
  means "if there's actually something there".

  Heads-up: converting nonsense fails — `int("abc")` gives an error — so real
  programs check their input first (you'll learn how in the error-handling lesson).

  **Mission:** Convert `"100"` to an int `qty`, convert `"189.50"` to a float
  `price`, set `flag = bool(0)`, and capture the type **name** of `qty` in `kind`.

  Expected: `qty == 100`, `price == 189.5`, `flag == False`, `kind == "int"`.
starter_code: |
  # TODO: convert the strings to real numeric types and explore type/truthiness
  qty = ...          # int from "100"
  price = ...        # float from "189.50"
  flag = ...         # bool of 0
  kind = ...         # the type name of qty, e.g. type(qty).__name__
  print(qty, price, flag, kind)
solution_code: |
  qty = int("100")
  price = float("189.50")
  flag = bool(0)
  kind = type(qty).__name__
  print(qty, price, flag, kind)
checks:
  - type: var_equals
    name: qty
    expected: 100
    message: "qty should be the integer 100 (converted from a string)"
  - type: var_close
    name: price
    expected: 189.5
    tol: 0.001
    message: "price should be the float 189.5"
  - type: var_equals
    name: flag
    expected: false
    message: "bool(0) is False — zero is 'falsy'"
  - type: var_equals
    name: kind
    expected: "int"
    message: "kind should be 'int' — the type name of qty"
hints:
  - "int(\"100\") and float(\"189.50\") parse the strings into numbers."
  - "bool(0) is False; every non-zero number is truthy."
  - "type(qty).__name__ gives the type's name as a string."
