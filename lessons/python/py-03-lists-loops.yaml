id: py-03-lists-loops
track: python
order: 3
title: "Summing Returns"
difficulty: 2
concepts: ["lists", "loops", "accumulation"]
needs_spark: false
brief: |
  **What & why.** A *list* holds many values **in order**, and looping over a list
  to accumulate a result is the seed of every aggregation you'll later do in Spark
  (`groupBy().sum()` is this idea, distributed across a cluster).

  **The essentials:**
  - Lists are **ordered** and **mutable**: `xs.append(x)`, index with `xs[0]`,
    slice with `xs[1:3]`.
  - The accumulator pattern: start at a zero value, loop, and `total += r`.
  - **Prefer built-ins** when they exist — `sum(returns)` is faster and clearer than
    a manual loop. In Spark the same lesson applies: built-in functions beat
    hand-rolled UDFs.

  **Gotcha.** Adding floats accumulates tiny rounding error (`0.1 + 0.2 != 0.3`
  exactly) — that's why the check below uses a tolerance, not strict equality.

  **Mission:** Given a list of daily `returns`, add them all up and store the
  result in a variable named `total`.

  Expected: `total == 0.055`
starter_code: |
  returns = [0.02, -0.01, 0.03, 0.015]
  # TODO: sum every value in `returns` into `total`
  total = ...
  print(total)
solution_code: |
  returns = [0.02, -0.01, 0.03, 0.015]
  total = 0.0
  for r in returns:
      total += r
  print(total)
checks:
  - type: var_close
    name: total
    expected: 0.055
    tol: 0.0001
    message: "total should be the sum of all returns (0.055)"
    fail_detail: "Loop over the list and add each value, or use sum(returns)."
hints:
  - "You can loop: for r in returns: total += r"
  - "Or use Python's built-in: total = sum(returns)"
