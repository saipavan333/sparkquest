id: py-03-lists-loops
track: python
order: 3
title: "Summing Returns"
difficulty: 2
concepts: ["lists", "loops", "accumulation"]
needs_spark: false
brief: |
  A **list** is a collection of values kept in order — think of a shopping list,
  where the items have an order and can repeat. You write one with square brackets:
  `[0.02, -0.01, 0.03]`.

  Picture a list as labelled boxes in a row, each at a numbered position:

  ```
  position:   0      1       2
            ┌──────┬───────┬──────┐
            │ 0.02 │ -0.01 │ 0.03 │
            └──────┴───────┴──────┘
  ```

  A **loop** lets you do something with each item, one at a time. The most common
  pattern is adding things up as you go:
  - Start a running total at `0`.
  - Go through the list item by item (`for r in returns:`).
  - Add each item to the total. `total = total + r` works; `total += r` is a common
    shorthand for the same thing.

  This "go through everything and combine it" idea is the seed of all the data
  summaries you'll do later in Spark.

  Tip: Python has a built-in shortcut, `sum(returns)`, that adds up a list of
  numbers for you — usually nicer than writing the loop by hand.

  (One quirk: a computer stores decimals with a tiny rounding error, so a total
  might come out as `0.054999…` instead of exactly `0.055`. That's why the check
  below allows a tiny bit of wiggle room.)

  **Mission:** Given a list of daily `returns`, add them all up and store the
  result in a variable named `total`.

  Expected: `total == 0.055`
starter_code: |
  returns = [0.02, -0.01, 0.03, 0.015]
  # TODO: sum every value in `returns` into `total`
  total = ...
  print(total)
solution_code: |
  returns = [0.02, -0.01, 0.03, 0.015]
  total = 0.0
  for r in returns:
      total += r
  print(total)
checks:
  - type: var_close
    name: total
    expected: 0.055
    tol: 0.0001
    message: "total should be the sum of all returns (0.055)"
    fail_detail: "Loop over the list and add each value, or use sum(returns)."
hints:
  - "You can loop: for r in returns: total += r"
  - "Or use Python's built-in: total = sum(returns)"
