id: perf-05-partitioned-write
track: performance
order: 5
title: "Partitioned Writes & Pruning"
difficulty: 4
concepts: ["partitionBy", "partition pruning", "parquet"]
needs_spark: true
brief: |
  **What & why.** `partitionBy(col)` lays data out in **one folder per value**
  (`sector=Tech/`, `sector=Fin/`…). When a later query filters on that column,
  Spark skips every non-matching folder entirely — **partition pruning** — so it
  reads a fraction of the data. On a multi-TB table, filtering one day's partition
  instead of scanning the year is the difference between seconds and hours.

  **Choosing a partition column (the senior judgement):**
  - Partition by a **low-cardinality** column you frequently **filter** on (date,
    region, sector). Date is the classic.
  - **Avoid high-cardinality** columns (user_id) — millions of tiny folders is the
    **small-files problem**, which cripples the metastore and scan planning.
  - Partitioning is physical layout; it pairs with Parquet's **column pruning** and
    **predicate pushdown** ([Handbook ch.4](../../docs/handbook/04-file-formats-and-layout.md)).

  **Gotcha.** Pruning only kicks in when you filter on the **partition column**
  directly. Filtering on a derived expression can defeat it. (Iceberg's *hidden
  partitioning* fixes this — [Handbook ch.14](../../docs/handbook/14-apache-iceberg.md).)

  **Mission:** Write `df` to Parquet **partitioned by `sector`**, then read it back
  and filter to `sector == "Tech"`. Store the result in `tech`.

  Expected: the two Tech rows (AAPL, GOOG).
starter_code: |
  import os, tempfile

  df = spark.createDataFrame(
      [("AAPL", "Tech", 100), ("JPM", "Fin", 75), ("GOOG", "Tech", 50)],
      ["ticker", "sector", "qty"],
  )
  path = os.path.join(tempfile.mkdtemp(), "by_sector")
  # TODO: write partitioned by sector, then read back and keep only Tech -> tech
  tech = ...
  tech.show()
solution_code: |
  import os, tempfile

  df = spark.createDataFrame(
      [("AAPL", "Tech", 100), ("JPM", "Fin", 75), ("GOOG", "Tech", 50)],
      ["ticker", "sector", "qty"],
  )
  path = os.path.join(tempfile.mkdtemp(), "by_sector")
  df.write.mode("overwrite").partitionBy("sector").parquet(path)
  tech = spark.read.parquet(path).filter(F.col("sector") == "Tech")
  tech.show()
checks:
  - type: df_equals
    name: tech
    expected:
      - {"ticker": "AAPL", "sector": "Tech", "qty": 100}
      - {"ticker": "GOOG", "sector": "Tech", "qty": 50}
    message: "tech should be only the Tech-sector rows, read from the partitioned data"
hints:
  - "df.write.partitionBy(\"sector\").parquet(path) lays out per-sector folders."
  - "Filtering sector == 'Tech' after reading prunes to just that folder."
