id: perf-05-partitioned-write
track: performance
order: 5
title: "Partitioned Writes & Pruning"
difficulty: 4
concepts: ["partitionBy", "partition pruning", "parquet"]
needs_spark: true
brief: |
  `partitionBy("sector")` saves your data with **one folder per value** —
  `sector=Tech/`, `sector=Fin/`, and so on. Then, when a later query filters on that
  column, Spark only opens the matching folder and skips the rest. On a huge table,
  reading one day's folder instead of the whole year turns hours into seconds.

  ```
   df.write.partitionBy("sector")  ─►   sector=Tech/   sector=Fin/
   later: filter sector == "Tech"  ─►   reads Tech/ only
  ```

  A bit of judgement on **which** column to split by:
  - Pick a column with **few distinct values** that you often filter on — date is the
    classic choice.
  - **Avoid** a column with tons of distinct values (like user id) — you'd get
    millions of tiny folders, which actually slows everything down.

  **Mission:** Write `df` to Parquet **partitioned by `sector`**, then read it back
  and filter to `sector == "Tech"`. Store the result in `tech`.

  Expected: the two Tech rows (AAPL, GOOG).
starter_code: |
  import os, tempfile

  df = spark.createDataFrame(
      [("AAPL", "Tech", 100), ("JPM", "Fin", 75), ("GOOG", "Tech", 50)],
      ["ticker", "sector", "qty"],
  )
  path = os.path.join(tempfile.mkdtemp(), "by_sector")
  # TODO: write partitioned by sector, then read back and keep only Tech -> tech
  tech = ...
  tech.show()
solution_code: |
  import os, tempfile

  df = spark.createDataFrame(
      [("AAPL", "Tech", 100), ("JPM", "Fin", 75), ("GOOG", "Tech", 50)],
      ["ticker", "sector", "qty"],
  )
  path = os.path.join(tempfile.mkdtemp(), "by_sector")
  df.write.mode("overwrite").partitionBy("sector").parquet(path)
  tech = spark.read.parquet(path).filter(F.col("sector") == "Tech")
  tech.show()
checks:
  - type: df_equals
    name: tech
    expected:
      - {"ticker": "AAPL", "sector": "Tech", "qty": 100}
      - {"ticker": "GOOG", "sector": "Tech", "qty": 50}
    message: "tech should be only the Tech-sector rows, read from the partitioned data"
hints:
  - "df.write.partitionBy(\"sector\").parquet(path) lays out per-sector folders."
  - "Filtering sector == 'Tech' after reading prunes to just that folder."
