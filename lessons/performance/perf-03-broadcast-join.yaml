id: perf-03-broadcast-join
track: performance
order: 3
title: "Broadcast Joins"
difficulty: 4
concepts: ["broadcast", "join", "shuffle avoidance"]
needs_spark: true
brief: |
  Joining two big tables is slow because Spark has to move (shuffle) both of them
  across the network so matching keys end up together. But when **one side is small**
  (a little lookup table), there's a shortcut: send a **copy of the small table to
  every machine**, and each machine joins its slice of the big table locally. No
  moving the big table at all — often a huge speed-up. This is the most useful join
  trick to know.

  ```
                ┌─ machine 1 : its big-table slice  +  [copy of small table]
   small table ─┼─ machine 2 : its big-table slice  +  [copy of small table]
   (copied to   └─ machine 3 : its big-table slice  +  [copy of small table]
    everyone)
  ```

  - Wrap the small side in `F.broadcast(...)`: `big.join(F.broadcast(sectors),
    "ticker")`. (Spark also does this automatically when it can tell a side is small.)
  - Only do it for a genuinely **small** table — broadcasting a big one sends huge
    copies everywhere and can crash the driver.

  **Mission:** Join `big` with the small `sectors` lookup on `ticker`, broadcasting
  `sectors`. Store the result in `joined`.
starter_code: |
  big = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("GOOG", "Tech")], ["ticker", "sector"]
  )
  # TODO: broadcast-join big with sectors on ticker -> `joined`
  joined = ...
  joined.show()
solution_code: |
  big = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("GOOG", "Tech")], ["ticker", "sector"]
  )
  joined = big.join(F.broadcast(sectors), "ticker")
  joined.show()
checks:
  - type: df_equals
    name: joined
    expected:
      - {"ticker": "AAPL", "qty": 100, "sector": "Tech"}
      - {"ticker": "GOOG", "qty": 50, "sector": "Tech"}
      - {"ticker": "AAPL", "qty": 70, "sector": "Tech"}
    message: "joined should attach each trade's sector via a broadcast join"
hints:
  - "Wrap the small DataFrame: F.broadcast(sectors)"
  - "big.join(F.broadcast(sectors), \"ticker\")"
