id: perf-07-bucketing
track: performance
order: 7
title: "Bucketing (shuffle-free joins)"
difficulty: 4
concepts: ["bucketBy", "saveAsTable", "shuffle avoidance", "physical layout"]
needs_spark: true
brief: |
  **Bucketing** splits a table into a fixed number of "buckets" by a key when you
  save it, and remembers that arrangement. The payoff: if you later **join on that
  key**, the matching rows are already grouped together, so Spark can **skip the
  expensive shuffle**.

  How it differs from partitioning (a common interview contrast):
  - **Partitioning** makes one **folder per value** — great for *filtering* on a
    column with few distinct values (like date or region).
  - **Bucketing** makes a **fixed number of files**, spread by a hash of the key —
    great for *joining* on a column with lots of distinct values (like an id), where
    one-folder-per-value would explode into millions of folders.

  - You write it with `df.write.bucketBy(4, "key").saveAsTable(name)`. (Bucketing
    needs `saveAsTable` — it's a managed table, not a plain file write.)

  **Mission:** Write `df` **bucketed into 4 buckets by `ticker`** as a table (a unique
  `tbl` name is provided), then read it back into `out`.
starter_code: |
  import tempfile

  tbl = "bkt_" + tempfile.mkdtemp().split("_")[-1]
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70)], ["ticker", "qty"]
  )
  # TODO: write df bucketBy(4, "ticker").saveAsTable(tbl), then read it into `out`
  out = ...
  out.show()
solution_code: |
  import tempfile

  tbl = "bkt_" + tempfile.mkdtemp().split("_")[-1]
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70)], ["ticker", "qty"]
  )
  df.write.mode("overwrite").bucketBy(4, "ticker").saveAsTable(tbl)
  out = spark.table(tbl)
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "AAPL", "qty": 70}
      - {"ticker": "GOOG", "qty": 50}
    message: "out should round-trip all rows from the bucketed table"
hints:
  - "df.write.bucketBy(4, \"ticker\").saveAsTable(tbl) — bucketing needs saveAsTable."
  - "Read the managed table back with spark.table(tbl)."
  - "Two tables bucketed the same way join without a shuffle."
