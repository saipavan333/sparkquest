id: perf-01-repartition-coalesce
track: performance
order: 1
title: "Repartition vs Coalesce"
difficulty: 3
concepts: ["partitions", "repartition", "coalesce", "shuffle"]
needs_spark: true
brief: |
  Spark splits your data into chunks called **partitions**, and works on them in
  parallel — one chunk per worker at a time. The number of chunks matters: too
  **few** and most of your machines sit idle; too **many** and Spark wastes time
  managing tiny scraps of work. A good size is roughly 100–200 MB per chunk.

  Two tools change the chunk count (knowing the difference is a classic interview
  question):
  - `repartition(n)` — reshuffles the data into exactly `n` evenly-sized chunks. It
    can make **more or fewer**, but it moves data around (a shuffle), so it's not
    cheap.
  - `coalesce(n)` — just **merges** neighbouring chunks together without moving data.
    It can only make **fewer**, but it's much cheaper.

  Rule of thumb: to **shrink** the count, use `coalesce`; to **grow** it or even it
  out, use `repartition`.

  **Mission:** Take `df`, `repartition` it into **4** partitions, then `coalesce`
  to **2**. Store the final partition count in `n` (use `.rdd.getNumPartitions()`).

  Expected: `n == 2`
starter_code: |
  df = spark.range(100)
  # TODO: repartition to 4, then coalesce to 2; read the partition count into n
  n = ...
  print(n)
solution_code: |
  df = spark.range(100)
  result = df.repartition(4).coalesce(2)
  n = result.rdd.getNumPartitions()
  print(n)
checks:
  - type: var_equals
    name: n
    expected: 2
    message: "after coalesce(2) the DataFrame should have 2 partitions"
hints:
  - "Chain it: df.repartition(4).coalesce(2)"
  - "Read the count with result.rdd.getNumPartitions()."
