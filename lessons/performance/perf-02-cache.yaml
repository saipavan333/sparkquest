id: perf-02-cache
track: performance
order: 2
title: "Caching & Persistence"
difficulty: 3
concepts: ["cache", "persist", "reuse"]
needs_spark: true
brief: |
  **What & why.** Spark is **lazy**: every action re-executes the whole lineage
  from the last shuffle/source. If you reuse a DataFrame (loop over it, branch it,
  run several reports off it), you pay that cost *every time*. `cache()` /
  `persist()` keep the computed result around so subsequent actions are cheap.

  **The mechanics that trip people up:**
  - `cache()` is **lazy** — it only *marks* the DataFrame; the data isn't stored
    until the **first action** materialises it. That's why this lesson runs a
    `count()` after caching.
  - `cache()` = `persist(MEMORY_AND_DISK)` for DataFrames (spills to disk if it
    doesn't fit); `persist(level)` lets you pick `MEMORY_ONLY`, `DISK_ONLY`,
    `MEMORY_AND_DISK`, `_2` (replicated), etc.
  - Release it with `unpersist()` when done — cached blocks compete with execution
    memory ([Handbook ch.1 §8](../../docs/handbook/01-spark-architecture-and-execution.md)).

  **Gotcha.** Don't cache everything — caching something used **once** just wastes
  memory and can evict useful blocks. Cache only what you genuinely **reuse**.

  **Mission:** Build the aggregate `agg`, **cache** it, then trigger one action so
  the cache materialises.
starter_code: |
  df = spark.range(1000).select((F.col("id") % 3).alias("k"))
  agg = df.groupBy("k").count()
  # TODO: cache agg, then run an action (e.g. .count()) to materialise it
  ...
  agg.show()
solution_code: |
  df = spark.range(1000).select((F.col("id") % 3).alias("k"))
  agg = df.groupBy("k").count()
  agg.cache()
  agg.count()  # action that materialises the cache
  agg.show()
checks:
  - type: custom
    message: "agg should be cached (persisted in memory or on disk)"
    code: |
      d = ns.get("agg")
      sl = d.storageLevel if d is not None else None
      ok = bool(sl and (sl.useMemory or sl.useDisk))
    fail_detail: "Call agg.cache() and then an action like agg.count()."
hints:
  - "agg.cache() marks it for caching (lazily)."
  - "Run agg.count() (or any action) once to actually populate the cache."
