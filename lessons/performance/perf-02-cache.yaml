id: perf-02-cache
track: performance
order: 2
title: "Caching & Persistence"
difficulty: 3
concepts: ["cache", "persist", "reuse"]
needs_spark: true
brief: |
  Spark is **lazy** — it doesn't keep results around; every time you ask for an
  answer, it recomputes the whole chain of steps from the start. That's wasteful if
  you use the same result several times (in a loop, or for a few different reports).
  `cache()` tells Spark "hold on to this result so you don't have to redo it".

  - `cache()` is itself lazy — it only *marks* the data to be kept. The data is
    actually stored the **first time you trigger work** on it, which is why this
    lesson runs a `count()` right after caching (to fill the cache).
  - When you're done with it, `unpersist()` frees the memory.

  One piece of judgement: don't cache everything. Caching something you only use
  once just wastes memory — cache only what you genuinely reuse.

  **Mission:** Build the aggregate `agg`, **cache** it, then trigger one action so
  the cache materialises.
starter_code: |
  df = spark.range(1000).select((F.col("id") % 3).alias("k"))
  agg = df.groupBy("k").count()
  # TODO: cache agg, then run an action (e.g. .count()) to materialise it
  ...
  agg.show()
solution_code: |
  df = spark.range(1000).select((F.col("id") % 3).alias("k"))
  agg = df.groupBy("k").count()
  agg.cache()
  agg.count()  # action that materialises the cache
  agg.show()
checks:
  - type: custom
    message: "agg should be cached (persisted in memory or on disk)"
    code: |
      d = ns.get("agg")
      sl = d.storageLevel if d is not None else None
      ok = bool(sl and (sl.useMemory or sl.useDisk))
    fail_detail: "Call agg.cache() and then an action like agg.count()."
hints:
  - "agg.cache() marks it for caching (lazily)."
  - "Run agg.count() (or any action) once to actually populate the cache."
