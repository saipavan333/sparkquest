id: perf-04-skew-salting
track: performance
order: 4
title: "Data Skew & Salting"
difficulty: 5
concepts: ["data skew", "salting", "key distribution"]
needs_spark: true
brief: |
  **Skew** is the classic reason a Spark job gets to 95% and then seems to hang. When
  one key holds most of the rows (one giant customer, lots of missing/`NULL` keys),
  all those rows land on a **single** machine — so one worker grinds away for ages
  while the rest sit idle, having already finished.

  ```
   even work:  [██] [██] [██] [██]      ← all machines finish together
   skewed:     [██████████████] [▪] [▪] ← one machine has it all (the slow one)
  ```

  **Salting** fixes it by splitting the hot key into several fake sub-keys (like
  `HOT_0`, `HOT_1`, `HOT_2`), so its rows spread across several machines instead of
  piling onto one. You do the work per sub-key, then combine the pieces.

  (Spark can also smooth out skew automatically — that setting is on by default — but
  it's important to recognise skew and know salting as the manual fix.)

  **Mission:** Every row has the same hot `key` ("HOT"). Add a `salted_key` that
  appends `_` plus `id % 3`, turning one key into **3** buckets. Then store the
  number of distinct salted keys in `n_buckets`.

  Expected: `n_buckets == 3`
starter_code: |
  df = spark.range(6).select(F.lit("HOT").alias("key"), F.col("id"))
  # TODO: salted_key = key + "_" + (id % 3); count distinct salted keys -> n_buckets
  salted = ...
  n_buckets = ...
  print(n_buckets)
solution_code: |
  df = spark.range(6).select(F.lit("HOT").alias("key"), F.col("id"))
  salted = df.withColumn(
      "salted_key",
      F.concat(F.col("key"), F.lit("_"), (F.col("id") % 3).cast("string")),
  )
  n_buckets = salted.select("salted_key").distinct().count()
  print(n_buckets)
checks:
  - type: var_equals
    name: n_buckets
    expected: 3
    message: "salting id % 3 should produce 3 distinct sub-keys"
hints:
  - "Build the salt with F.concat(key, F.lit(\"_\"), (id % 3).cast(\"string\"))."
  - "Count buckets with salted.select(\"salted_key\").distinct().count()."
