id: perf-04-skew-salting
track: performance
order: 4
title: "Data Skew & Salting"
difficulty: 5
concepts: ["data skew", "salting", "key distribution"]
needs_spark: true
brief: |
  **What & why.** **Skew** is the #1 cause of a Spark job that's 95% done and then
  hangs forever. When one key (a "celebrity" user, a `NULL` foreign key, one mega
  merchant) holds most of the rows, the shuffle sends them all to **one** task —
  that straggler runs for an hour while every other core sits idle. You'll see it
  in the Spark UI as one task with `max` duration / shuffle-read 100× the median.

  **Salting** breaks the hot key into `N` synthetic sub-keys (`key_0 … key_{N-1}`)
  so its rows spread across `N` partitions and `N` tasks. When you join, you
  replicate the *other* side across all `N` salts so matches still happen; then you
  aggregate away the salt.

  **The fuller toolkit (name all three in interviews):**
  - **Let AQE handle it** — `spark.sql.adaptive.skewJoin.enabled` splits skewed
    partitions automatically (often enough; free).
  - **Salting** — this lesson's technique, for when you need manual control.
  - **Broadcast** the other side — if it's small, skew on the join key stops
    mattering. Also handle `NULL` keys separately. (Deep dive:
  [Handbook ch.9 §6](../../docs/handbook/09-joins-shuffle-aqe.md).)

  **Mission:** Every row has the same hot `key` ("HOT"). Add a `salted_key` that
  appends `_` plus `id % 3`, turning one key into **3** buckets. Then store the
  number of distinct salted keys in `n_buckets`.

  Expected: `n_buckets == 3`
starter_code: |
  df = spark.range(6).select(F.lit("HOT").alias("key"), F.col("id"))
  # TODO: salted_key = key + "_" + (id % 3); count distinct salted keys -> n_buckets
  salted = ...
  n_buckets = ...
  print(n_buckets)
solution_code: |
  df = spark.range(6).select(F.lit("HOT").alias("key"), F.col("id"))
  salted = df.withColumn(
      "salted_key",
      F.concat(F.col("key"), F.lit("_"), (F.col("id") % 3).cast("string")),
  )
  n_buckets = salted.select("salted_key").distinct().count()
  print(n_buckets)
checks:
  - type: var_equals
    name: n_buckets
    expected: 3
    message: "salting id % 3 should produce 3 distinct sub-keys"
hints:
  - "Build the salt with F.concat(key, F.lit(\"_\"), (id % 3).cast(\"string\"))."
  - "Count buckets with salted.select(\"salted_key\").distinct().count()."
