id: st-07-parse-kafka-value
track: streaming
order: 7
title: "Parsing a Kafka value (from_json)"
difficulty: 3
concepts: ["kafka", "from_json", "schema", "value parsing", "structured streaming"]
needs_spark: true
brief: |
  **Kafka** is the most popular system for streams of events. When you read from it,
  each record's real content arrives squashed into a single `value` column as raw
  text. So the first thing every Kafka pipeline does is **unpack that text into
  proper columns**: read the `value` as a string, then use **`from_json`** with a
  schema to split it into real fields.

  (We practise it here on a normal table so the result is predictable, but it's the
  exact step you'd run right after reading from Kafka.)

  **Mission:** The `value` column holds JSON strings. Parse them with `from_json`
  into typed columns `ticker` (STRING) and `qty` (LONG), selecting both into `out`.
starter_code: |
  data = [
      ('{"ticker": "AAPL", "qty": 100}',),
      ('{"ticker": "GOOG", "qty": 50}',),
  ]
  df = spark.createDataFrame(data, ["value"])
  schema = "ticker STRING, qty LONG"
  # TODO: parse the JSON in `value` into columns ticker and qty -> `out`
  out = ...
  out.show()
solution_code: |
  data = [
      ('{"ticker": "AAPL", "qty": 100}',),
      ('{"ticker": "GOOG", "qty": 50}',),
  ]
  df = spark.createDataFrame(data, ["value"])
  schema = "ticker STRING, qty LONG"
  out = df.select(F.from_json(F.col("value").cast("string"), schema).alias("d")).select("d.*")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "out should have typed ticker/qty columns parsed from the JSON value"
hints:
  - "F.from_json(col, schema) turns a JSON string column into a struct."
  - "Give it the schema string \"ticker STRING, qty LONG\"."
  - "Alias the struct, then .select(\"d.*\") to flatten it into columns."
