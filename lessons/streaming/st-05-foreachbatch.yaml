brief: |
  `foreachBatch` hands you each micro-batch as a normal DataFrame, so you can do
  *anything* — upsert to a database, write to several targets, or call an API. It's
  the escape hatch that makes Structured Streaming production-ready.

  **Mission:** Stream `data/sample/stream_events` and use `foreachBatch` to record
  each batch's row count into the `processed` list. After the query finishes, store
  the grand total in `total`.

  Expected: `total == 8` (all events seen exactly once).
