      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  processed = []

  def handle(batch_df, batch_id):
      # TODO: append this batch's row count to `processed`
      ...

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: writeStream with foreachBatch(handle), availableNow; then total = sum(processed)
  total = ...
  print(total)
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  processed = []

  def handle(batch_df, batch_id):
      processed.append(batch_df.count())

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  query = (
      stream.writeStream
      .foreachBatch(handle)
      .trigger(availableNow=True)
      .start()
  )
  query.awaitTermination()
  total = sum(processed)
  print(total)
checks:
  - type: var_equals
    name: total
    expected: 8
    message: "total rows processed across all batches should be 8"
hints:
  - "Inside handle, do processed.append(batch_df.count())."
  - "Attach it with .writeStream.foreachBatch(handle), then sum(processed) after awaitTermination()."
