id: st-05-foreachbatch
track: streaming
order: 5
title: "Custom Sinks with foreachBatch"
difficulty: 4
concepts: ["foreachBatch", "custom sink", "micro-batch"]
needs_spark: true
brief: |
  **What & why.** `foreachBatch(fn)` hands you each micro-batch as an ordinary
  **batch DataFrame** (plus a `batch_id`), so inside it you can do *anything* the
  batch API allows — **upsert to Delta/JDBC**, write to **multiple sinks**, or call
  an external service. It's the escape hatch that makes Structured Streaming
  production-ready, because the built-in sinks can't express upserts.

  **The essentials:**
  - Signature: `def fn(batch_df, batch_id): ...` — `batch_df` is a normal DataFrame.
  - The headline pattern is **`foreachBatch` + Delta `MERGE`** for idempotent CDC
    upserts ([Handbook ch.13 §6](../../docs/handbook/13-kafka-and-streaming-io.md)).
  - It's **at-least-once** at the batch level (a batch can re-run on recovery) — use
    the `batch_id` or an idempotent write (MERGE) to stay exactly-once.

  **Testing tip.** Because the body is a plain DataFrame transform, you can unit-test
  it directly — no streaming harness needed.

  **Mission:** Stream `data/sample/stream_events` and use `foreachBatch` to record
  each batch's row count into the `processed` list. After the query finishes, store
  the grand total in `total`.

  Expected: `total == 8` (all events seen exactly once).
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  processed = []

  def handle(batch_df, batch_id):
      # TODO: append this batch's row count to `processed`
      ...

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: writeStream with foreachBatch(handle), availableNow; then total = sum(processed)
  total = ...
  print(total)
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  processed = []

  def handle(batch_df, batch_id):
      processed.append(batch_df.count())

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  query = (
      stream.writeStream
      .foreachBatch(handle)
      .trigger(availableNow=True)
      .start()
  )
  query.awaitTermination()
  total = sum(processed)
  print(total)
checks:
  - type: var_equals
    name: total
    expected: 8
    message: "total rows processed across all batches should be 8"
hints:
  - "Inside handle, do processed.append(batch_df.count())."
  - "Attach it with .writeStream.foreachBatch(handle), then sum(processed) after awaitTermination()."
