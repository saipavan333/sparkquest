id: st-05-foreachbatch
track: streaming
order: 5
title: "Custom Sinks with foreachBatch"
difficulty: 4
concepts: ["foreachBatch", "custom sink", "micro-batch"]
needs_spark: true
brief: |
  Spark processes a stream in small chunks called **micro-batches**. `foreachBatch`
  hands you **each chunk as an ordinary (batch) DataFrame**, so inside it you can do
  anything you'd do with a normal DataFrame — write it to a database, save it to
  several places at once, or call an outside service. It's the escape hatch that lets
  streaming do things the built-in outputs can't.

  - You write a small function `def handle(batch_df, batch_id): ...`, where `batch_df`
    is just a regular DataFrame for that chunk, and attach it with
    `.writeStream.foreachBatch(handle)`.
  - The most famous use is `foreachBatch` + a Delta `MERGE` to upsert changes into a
    table ([Handbook ch.13](../../docs/handbook/13-kafka-and-streaming-io.md)).

  Handy bonus: because the inside is a plain DataFrame, you can test that function on
  its own, with no streaming needed.

  **Mission:** Stream `data/sample/stream_events` and use `foreachBatch` to record
  each batch's row count into the `processed` list. After the query finishes, store
  the grand total in `total`.

  Expected: `total == 8` (all events seen exactly once).
