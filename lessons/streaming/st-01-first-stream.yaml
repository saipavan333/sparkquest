id: st-01-first-stream
track: streaming
order: 1
title: "Your First Stream"
difficulty: 3
concepts: ["readStream", "writeStream", "memory sink", "availableNow"]
needs_spark: true
brief: |
  **What & why.** Structured Streaming lets you write a streaming job with the
  **same DataFrame API** you already know — Spark turns it into an incremental query
  and handles the "keep it running" part. The core mental model: **a stream is an
  unbounded table** that grows as data arrives, and your query runs continuously
  over the new rows ([Handbook ch.3](../../docs/handbook/03-streaming-internals.md)).

  **The essentials:**
  - `spark.readStream` (vs `read`) opens a source; `writeStream` (vs `write`) starts
    a continuous query. Most sources need an explicit **schema** (no inference).
  - `.trigger(availableNow=True)` processes all currently-available data then
    **stops** — which makes streaming **deterministic and testable** (exactly how
    SparkQuest grades streams; see [Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).
  - The **memory** sink lands results in a queryable table — great for demos/tests.
  - `.start()` returns a query handle; `.awaitTermination()` waits for it to finish.

  We have a folder of JSON event files at `data/sample/stream_events`. You'll read
  it as a stream and land every event into an in-memory table you can query.

  **Mission:**
  1. Read the folder as a stream using the provided `schema`.
  2. Write it to the **memory** sink with query name `events_raw`,
     `outputMode("append")`, and `trigger(availableNow=True)` (process all
     available data, then stop — perfect for testing).
  3. After `awaitTermination()`, load the table into `out = spark.table("events_raw")`.

  Expected: 8 rows, columns `ticker`, `amount`, `ts`.
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  # TODO: read the stream, write to the memory sink, then load `out`
  out = ...
  out.show()
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  events = spark.readStream.schema(schema).json("data/sample/stream_events")
  query = (
      events.writeStream
      .format("memory")
      .queryName("events_raw")
      .outputMode("append")
      .trigger(availableNow=True)
      .start()
  )
  query.awaitTermination()
  out = spark.table("events_raw")
  out.show()
checks:
  - type: df_columns
    name: out
    expected: ["ticker", "amount", "ts"]
    message: "out should have columns ticker, amount, ts"
  - type: df_row_count
    name: out
    expected: 8
    message: "out should contain all 8 streamed events"
    fail_detail: "Make sure you call .start() AND query.awaitTermination() before reading the table."
hints:
  - "spark.readStream.schema(schema).json(path) opens a file stream."
  - "Use .trigger(availableNow=True) so the query drains all files then stops."
  - "Read results back with spark.table(\"events_raw\")."
