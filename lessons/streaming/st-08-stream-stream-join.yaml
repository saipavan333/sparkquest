id: st-08-stream-stream-join
track: streaming
order: 8
title: "Stream–Stream Joins (watermarked)"
difficulty: 5
concepts: ["stream-stream join", "watermark", "state", "event time"]
needs_spark: true
brief: |
  **What & why.** Joining two *live* streams — e.g. ad **impressions** with later
  **clicks** — is the hardest streaming join and a frequent senior interview topic.
  Unlike a stream-static join ([st-06](st-06-stream-static-join.yaml)), each side
  must **buffer** rows in state to wait for a match on the other side. Left
  unbounded, that state grows forever — so **both** streams need a **watermark**
  plus a **time-range condition**, which together tell Spark when it's safe to stop
  waiting (and evict old state).

  **The essentials:**
  - `withWatermark("ts", ...)` on **both** streams (required for append output).
  - The join condition includes the equi-key **and** a time bound, e.g.
    `right.ts BETWEEN left.ts AND left.ts + interval 10 minutes` — this bounds state.
  - Inner stream-stream joins emit a match once both rows have arrived and the
    watermark guarantees no earlier match remains.

  **Mission:** Read `data/sample/stream_events` as **two** watermarked streams
  (`left`, `right`), inner-join them on `ticker` within a 10-minute event-time
  window, and land the matched pairs in a memory table. Load it into `out`
  (it should have rows and a `ticker` column).
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  left = (spark.readStream.schema(schema).json("data/sample/stream_events")
          .withWatermark("ts", "10 minutes").alias("l"))
  right = (spark.readStream.schema(schema).json("data/sample/stream_events")
           .withWatermark("ts", "10 minutes").alias("r"))
  # TODO: inner-join on ticker within a 10-min window; write to memory; load `out`
  out = ...
  out.show()
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  left = (spark.readStream.schema(schema).json("data/sample/stream_events")
          .withWatermark("ts", "10 minutes").alias("l"))
  right = (spark.readStream.schema(schema).json("data/sample/stream_events")
           .withWatermark("ts", "10 minutes").alias("r"))
  joined = left.join(
      right,
      F.expr(
          "l.ticker = r.ticker AND "
          "r.ts BETWEEN l.ts AND l.ts + interval 10 minutes"
      ),
  ).select(F.col("l.ticker").alias("ticker"), F.col("l.ts").alias("lts"))
  query = (
      joined.writeStream.format("memory").queryName("ss_join")
      .outputMode("append").trigger(availableNow=True).start()
  )
  query.awaitTermination()
  out = spark.table("ss_join")
  out.show()
checks:
  - type: custom
    message: "out should contain matched pairs with a ticker column and at least one row"
    code: |
      df = ns.get("out")
      ok = df is not None and ("ticker" in df.columns) and df.count() > 0
    fail_detail: "Watermark both streams, join on ticker within a time window, append to memory."
hints:
  - "Both sides need withWatermark(\"ts\", ...) for an append-mode stream-stream join."
  - "Add a time bound: r.ts BETWEEN l.ts AND l.ts + interval 10 minutes."
  - "Write with outputMode(\"append\") and trigger(availableNow=True)."
