id: st-06-stream-static-join
track: streaming
order: 6
title: "Stream–Static Joins"
difficulty: 4
concepts: ["stream-static join", "enrichment", "aggregation"]
needs_spark: true
brief: |
  The most common streaming join: take a live stream and **add details from a fixed
  lookup table** — for example, attach each event's `sector` from a small sectors
  table. Joining a stream to an ordinary (non-streaming) table is simple, needs no
  watermark, and remembers nothing between events — each event is just looked up and
  enriched as it flows through.

  - `stream.join(sectors, "ticker")` works exactly like a normal join; the lookup
    table is re-read each chunk, so updates to it get picked up.

  (Joining two *live* streams together is a harder, separate case — that one needs
  watermarks on both sides; see [st-08](st-08-stream-stream-join.yaml).)

  **Mission:** Join the event stream to the static `sectors` table on `ticker`,
  then count events **per sector** (complete mode). Land it in a memory table and
  load `out`.

  Sectors: AAPL & GOOG are `Tech`, MSFT is `Software`. Expected: Tech 6, Software 2.
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("GOOG", "Tech"), ("MSFT", "Software")],
      ["ticker", "sector"],
  )
  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: join stream to sectors on ticker, count per sector, complete mode -> `out`
  out = ...
  out.show()
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("GOOG", "Tech"), ("MSFT", "Software")],
      ["ticker", "sector"],
  )
  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  enriched = stream.join(sectors, "ticker")
  counts = enriched.groupBy("sector").count()
  query = (
      counts.writeStream
      .format("memory")
      .queryName("sector_counts")
      .outputMode("complete")
      .trigger(availableNow=True)
      .start()
  )
  query.awaitTermination()
  out = spark.table("sector_counts")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"sector": "Tech", "count": 6}
      - {"sector": "Software", "count": 2}
    message: "events should be counted per joined sector (Tech 6, Software 2)"
hints:
  - "stream.join(sectors, \"ticker\") enriches each event with its sector."
  - "Then groupBy(\"sector\").count() with outputMode(\"complete\")."
