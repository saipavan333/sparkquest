id: st-09-sliding-window
track: streaming
order: 3
title: "Sliding Windows"
difficulty: 4
concepts: ["sliding window", "overlapping windows", "window", "watermark"]
needs_spark: true
brief: |
  A plain time window ([st-03](st-03-windowed-watermark.yaml)) chops time into
  back-to-back blocks (0–10, 10–20, …). A **sliding** window instead **overlaps** —
  it starts a fresh window more often than the window's length, so each event can
  fall into more than one. That's how you get "moving" metrics, like a 10-minute
  rolling count that refreshes every 5 minutes.

  ```
   window 1: |————10 min————|
   window 2:      |————10 min————|   (starts 5 min later, overlaps window 1)
   window 3:           |————10 min————|
  ```

  - The only new thing is a second time value: `F.window("ts", "10 minutes",
    "5 minutes")` means "10-minute windows, a new one every 5 minutes".
  - As with any time window, you still set a **watermark** so old windows can close.

  **Mission:** Stream `data/sample/stream_events`, watermark `ts` by `1 minute`, and
  count events per `ticker` in **10-minute** windows **sliding every 5 minutes**.
  Write to a memory table (`complete` mode) and load `out` (it should have a
  `window` and a `count` column).
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: watermark, group by a 10-min window sliding every 5 min + ticker, count -> out
  out = ...
  out.show(truncate=False)
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  windowed = (
      stream.withWatermark("ts", "1 minute")
      .groupBy(F.window("ts", "10 minutes", "5 minutes"), "ticker")
      .count()
  )
  query = (
      windowed.writeStream.format("memory").queryName("sliding_counts")
      .outputMode("complete").trigger(availableNow=True).start()
  )
  query.awaitTermination()
  out = spark.table("sliding_counts")
  out.show(truncate=False)
checks:
  - type: custom
    message: "out should have a window column, a count column, and at least one row"
    code: |
      df = ns.get("out")
      cols = df.columns if df is not None else []
      ok = ("window" in cols) and ("count" in cols) and df.count() > 0
    fail_detail: "Use F.window(\"ts\", \"10 minutes\", \"5 minutes\") with a watermark."
hints:
  - "The third argument to F.window is the slide interval: F.window(\"ts\", \"10 minutes\", \"5 minutes\")."
  - "A slide smaller than the window makes the windows overlap."
