  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: watermark, group by a 10-min window sliding every 5 min + ticker, count -> out
  out = ...
  out.show(truncate=False)
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  windowed = (
      stream.withWatermark("ts", "1 minute")
      .groupBy(F.window("ts", "10 minutes", "5 minutes"), "ticker")
      .count()
  )
  query = (
      windowed.writeStream.format("memory").queryName("sliding_counts")
      .outputMode("complete").trigger(availableNow=True).start()
  )
  query.awaitTermination()
  out = spark.table("sliding_counts")
  out.show(truncate=False)
checks:
  - type: custom
    message: "out should have a window column, a count column, and at least one row"
    code: |
      df = ns.get("out")
      cols = df.columns if df is not None else []
      ok = ("window" in cols) and ("count" in cols) and df.count() > 0
    fail_detail: "Use F.window(\"ts\", \"10 minutes\", \"5 minutes\") with a watermark."
hints:
  - "The third argument to F.window is the slide interval: F.window(\"ts\", \"10 minutes\", \"5 minutes\")."
  - "A slide smaller than the window makes the windows overlap."
