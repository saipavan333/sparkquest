id: st-09-sliding-window
track: streaming
order: 3
title: "Sliding Windows"
difficulty: 4
concepts: ["sliding window", "overlapping windows", "window", "watermark"]
needs_spark: true
brief: |
  **What & why.** A **tumbling** window ([st-03](st-03-windowed-watermark.yaml)) is
  fixed and non-overlapping. A **sliding** window adds a **slide interval** smaller
  than the window, so windows **overlap** — every event falls into multiple windows.
  That's how you compute **moving metrics**: "5-minute rolling count updated every
  minute", "1-hour trailing average refreshed every 10 minutes".

  **The one new argument:**
  - `F.window("ts", "10 minutes", "5 minutes")` → **size** 10 min, **slide** 5 min.
    An event at 12:07 lands in both the 12:00–12:10 and 12:05–12:15 windows.
  - Omit the slide (`F.window("ts", "10 minutes")`) and it's a tumbling window
    (size == slide).
  - Still needs a **watermark** to bound and finalise state, exactly like tumbling.

  **Gotcha.** Overlap multiplies work: a 60-min window sliding every 1 min puts each
  event in **60** windows — more state and compute. Size the slide to the freshness
  you actually need.

  **Mission:** Stream `data/sample/stream_events`, watermark `ts` by `1 minute`, and
  count events per `ticker` in **10-minute** windows **sliding every 5 minutes**.
  Write to a memory table (`complete` mode) and load `out` (it should have a
  `window` and a `count` column).
