id: st-03-windowed-watermark
track: streaming
order: 3
title: "Event-Time Windows & Watermarks"
difficulty: 4
concepts: ["event time", "window", "withWatermark", "late data"]
needs_spark: true
brief: |
  **What & why.** The capstone of streaming, and the concept interviews probe
  hardest. Aggregate by **event time** (when something *happened*) rather than
  **processing time** (when it *arrived*) — because events arrive late and out of
  order, and correct analytics must bucket them by when they occurred.

  **The two pieces:**
  - **Windows** — `F.window("ts", "10 minutes")` groups events into time buckets
    (tumbling = non-overlapping; add a slide for sliding windows).
  - **Watermark** — `withWatermark("ts", "1 minute")` tells Spark "don't expect data
    older than (max event time − 1 min)". This is the **trade-off knob**: it bounds
    how long window **state** is kept (so memory doesn't grow forever) and decides
    how late is *too* late — events past the watermark are **dropped**.

  **Interview soundbite:** "Event time + watermark gives correct, bounded-state
  aggregation over late, out-of-order data" ([Handbook ch.3 §2–3](../../docs/handbook/03-streaming-internals.md)).

  **Mission:** Stream `data/sample/stream_events` and count events per `ticker`
  within **10-minute** tumbling windows over the event-time column `ts`. Declare a
  watermark of `1 minute` on `ts`. Write to a memory table `windowed_counts` with
  `outputMode("complete")`, then load `out = spark.table("windowed_counts")`.

  Your `out` should contain a `window` column and a `count` column.
starter_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  # TODO: watermark on ts, group by 10-minute window + ticker, count -> `out`
  out = ...
  out.show(truncate=False)
solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])

  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  windowed = (
      stream.withWatermark("ts", "1 minute")
      .groupBy(F.window("ts", "10 minutes"), "ticker")
      .count()
  )
  query = (
      windowed.writeStream
      .format("memory")
      .queryName("windowed_counts")
      .outputMode("complete")
      .trigger(availableNow=True)
      .start()
  )
  query.awaitTermination()
  out = spark.table("windowed_counts")
  out.show(truncate=False)
checks:
  - type: custom
    message: "out should have a window column, a count column, and at least one row"
    code: |
      df = ns.get("out")
      cols = df.columns if df is not None else []
      ok = ("window" in cols) and ("count" in cols) and df.count() > 0
    fail_detail: "Use F.window(\"ts\", \"10 minutes\") inside groupBy, and set a watermark with withWatermark."
hints:
  - "Set the watermark first: stream.withWatermark(\"ts\", \"1 minute\")."
  - "Group by F.window(\"ts\", \"10 minutes\") together with \"ticker\", then count()."
