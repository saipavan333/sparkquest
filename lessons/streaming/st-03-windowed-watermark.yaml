id: st-03-windowed-watermark
track: streaming
order: 3
title: "Event-Time Windows & Watermarks"
difficulty: 4
concepts: ["event time", "window", "withWatermark", "late data"]
needs_spark: true
brief: |
  This is the big idea in streaming. You usually want to group events by **when they
  actually happened** ("event time"), not when they reached your system — because
  events often arrive late or out of order, and a correct report must put them in the
  right time bucket.

  Two pieces work together:
  - **Windows** — `F.window("ts", "10 minutes")` chops time into buckets (here,
    10-minute blocks) and groups events into them.
  - **Watermark** — `withWatermark("ts", "1 minute")` tells Spark "stop waiting for
    stragglers more than a minute late". This matters because Spark has to *remember*
    each open bucket to add late events; the watermark lets it eventually close old
    buckets and free that memory (very-late events are dropped).

  In short: event-time windows + a watermark give you correct counts over late,
  out-of-order data, without remembering everything forever.

  **Mission:** Stream `data/sample/stream_events` and count events per `ticker`
  within **10-minute** tumbling windows over the event-time column `ts`. Declare a
  watermark of `1 minute` on `ts`. Write to a memory table `windowed_counts` with
  `outputMode("complete")`, then load `out = spark.table("windowed_counts")`.

  Your `out` should contain a `window` column and a `count` column.
