id: delta-03-time-travel
track: delta
order: 3
title: "Time Travel"
difficulty: 4
concepts: ["time travel", "versioning", "transaction log"]
needs_spark: true
needs_delta: true
brief: |
  **What & why.** Because every commit is recorded in the transaction log, Delta
  lets you query the table **as of** any past version or timestamp — **time
  travel**. It's invaluable for audits ("what did this report read last quarter?"),
  reproducibility (pin an ML training set to a version), and recovery (roll back a
  bad write with `RESTORE`).

  **The essentials:**
  - Read by version: `.option("versionAsOf", 0)`; by time:
    `.option("timestampAsOf", "2026-06-01")`. SQL: `... VERSION AS OF 0`.
  - Inspect history with `DeltaTable.forPath(...).history()`.
  - Old versions are retained until **`VACUUM`** physically deletes files past the
    retention window (default 7 days) — after which travel to those versions fails.

  **Interview tie-in.** Same capability in Iceberg via snapshots
  ([iceberg-04](../iceberg/iceberg-04-time-travel.yaml)); the mechanism differs (log
  vs snapshot tree) but the idea is identical.

  **Mission:** Write version 0 (AAPL @ 100), then overwrite with version 1
  (AAPL @ 200). Read the table back **as of version 0** into `old`.

  Expected: the original AAPL @ 100.
starter_code: |
  import os, tempfile

  path = os.path.join(tempfile.mkdtemp(), "prices")
  spark.createDataFrame([("AAPL", 100)], ["ticker", "price"]) \
      .write.format("delta").mode("overwrite").save(path)   # version 0
  spark.createDataFrame([("AAPL", 200)], ["ticker", "price"]) \
      .write.format("delta").mode("overwrite").save(path)   # version 1

  # TODO: read the table AS OF version 0 into `old`
  old = ...
  old.show()
solution_code: |
  import os, tempfile

  path = os.path.join(tempfile.mkdtemp(), "prices")
  spark.createDataFrame([("AAPL", 100)], ["ticker", "price"]) \
      .write.format("delta").mode("overwrite").save(path)   # version 0
  spark.createDataFrame([("AAPL", 200)], ["ticker", "price"]) \
      .write.format("delta").mode("overwrite").save(path)   # version 1

  old = spark.read.format("delta").option("versionAsOf", 0).load(path)
  old.show()
checks:
  - type: df_equals
    name: old
    expected:
      - {"ticker": "AAPL", "price": 100}
    message: "old should show the table as it was at version 0 (price 100)"
hints:
  - "Use .option(\"versionAsOf\", 0) when reading the Delta table."
  - "Each overwrite creates a new version; version 0 is the first write."
