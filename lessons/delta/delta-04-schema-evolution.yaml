id: delta-04-schema-evolution
track: delta
order: 4
title: "Schema Evolution"
difficulty: 4
concepts: ["schema evolution", "mergeSchema", "append"]
needs_spark: true
needs_delta: true
brief: |
  **What & why.** Upstream schemas drift — a new field appears. By default Delta
  **enforces** schema on write (rejecting mismatches, which protects you from silent
  corruption), but when you *intend* to add a column you opt into **schema
  evolution** with `mergeSchema`: Delta widens the table and backfills existing rows
  with `null` for the new column instead of failing the job.

  **The essentials:**
  - `.option("mergeSchema", "true")` on an append adds new columns; existing rows get
    `null`.
  - **Enforcement is the default and a feature** — it's a data-quality guardrail
    ([Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)); evolution
    is the deliberate exception.
  - Overwrites can fully replace the schema with `overwriteSchema`.

  **Contrast.** Delta tracks columns by name; **Iceberg** tracks by **field id**, so
  renames/reorders are safe there ([Handbook ch.14 §4](../../docs/handbook/14-apache-iceberg.md)).

  **Mission:** A table has `ticker, qty`. Append a row that *also* has a `sector`
  column, using `mergeSchema`. Then read the whole table into `result`.

  Expected: AAPL (sector null) and GOOG (sector "Tech").
starter_code: |
  import os, tempfile

  path = os.path.join(tempfile.mkdtemp(), "evolving")
  spark.createDataFrame([("AAPL", 100)], ["ticker", "qty"]) \
      .write.format("delta").mode("overwrite").save(path)

  new = spark.createDataFrame([("GOOG", 50, "Tech")], ["ticker", "qty", "sector"])
  # TODO: append `new` with schema evolution (mergeSchema), then read into result
  result = ...
  result.show()
solution_code: |
  import os, tempfile

  path = os.path.join(tempfile.mkdtemp(), "evolving")
  spark.createDataFrame([("AAPL", 100)], ["ticker", "qty"]) \
      .write.format("delta").mode("overwrite").save(path)

  new = spark.createDataFrame([("GOOG", 50, "Tech")], ["ticker", "qty", "sector"])
  new.write.format("delta").mode("append").option("mergeSchema", "true").save(path)
  result = spark.read.format("delta").load(path)
  result.show()
checks:
  - type: df_equals
    name: result
    expected:
      - {"ticker": "AAPL", "qty": 100, "sector": null}
      - {"ticker": "GOOG", "qty": 50, "sector": "Tech"}
    message: "the new sector column should appear, null for the pre-existing AAPL row"
hints:
  - "Append with .option(\"mergeSchema\", \"true\") to allow the new column."
  - "Older rows automatically get null for the added column."
