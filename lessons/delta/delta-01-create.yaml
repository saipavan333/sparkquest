id: delta-01-create
track: delta
order: 1
title: "Your First Delta Table"
difficulty: 3
concepts: ["delta", "ACID", "write", "read"]
needs_spark: true
needs_delta: true
brief: |
  Plain Parquet files are great for *reading*, but they can't safely be *changed* —
  there's no way to update a row or undo a half-finished write. **Delta Lake** fixes
  that by adding a **logbook** next to the files (a folder called `_delta_log`) that
  records every change. With that logbook, a folder of files starts behaving like a
  proper database table: safe updates, no half-written messes, and a full history you
  can rewind.

  - You read and write it just like before, but with `format("delta")` instead of
    `parquet`.
  - A Delta table is really "Parquet files **plus** that logbook of changes".
  - The logbook is what makes the next three lessons possible — updating rows, going
    back in time, and changing the columns — none of which plain Parquet can do.

  (A Delta-ready `spark` and a `DeltaTable` helper are set up for you. This lesson
  runs in the cloud build, which can fetch the Delta add-on.)

  **Mission:** Write `df` as a Delta table at `path`, then read it back into
  `loaded`.
starter_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  # TODO: write df as Delta (overwrite) to path, then read it back into loaded
  loaded = ...
  loaded.show()
solution_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  df.write.format("delta").mode("overwrite").save(path)
  loaded = spark.read.format("delta").load(path)
  loaded.show()
checks:
  - type: df_equals
    name: loaded
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "loaded should round-trip the rows back from the Delta table"
hints:
  - "df.write.format(\"delta\").mode(\"overwrite\").save(path)"
  - "spark.read.format(\"delta\").load(path) reads it back."
