id: sp-37-math
track: pyspark
order: 11
title: "Math & Rounding Functions"
difficulty: 2
concepts: ["round", "abs", "ceil", "floor", "math functions"]
needs_spark: true
brief: |
  Sometimes you need to tidy up numbers — round prices, drop a minus sign, or round
  to a whole number. Spark's `F` toolbox has all of these, ready to use on a whole
  column at once.

  - **Round:** `F.round(col, 2)` keeps 2 decimal places.
  - **Round to a whole number:** `F.ceil(col)` always rounds **up**, `F.floor(col)`
    always rounds **down**.
  - **Drop the sign:** `F.abs(col)` turns `-2.3` into `2.3` (the "size" of a number,
    ignoring whether it's positive or negative).

  (Heads-up: computers store decimals with a microscopic rounding error, so two
  numbers that look identical can differ far past the decimal point. For money,
  round on purpose rather than trusting decimals to match exactly.)

  **Mission:** From `df`, build `out` with `ticker`, `achg` = the **absolute**
  `change`, `cp` = `ceil(price)`, and `fp` = `floor(price)`.

  Expected: AAPL → achg 2.3, cp 190, fp 189; GOOG → achg 1.8, cp 143, fp 142.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", 189.567, -2.3), ("GOOG", 142.1, 1.8)],
      ["ticker", "price", "change"],
  )
  # TODO: achg = abs(change), cp = ceil(price), fp = floor(price) -> `out`
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", 189.567, -2.3), ("GOOG", 142.1, 1.8)],
      ["ticker", "price", "change"],
  )
  out = df.select(
      "ticker",
      F.abs("change").alias("achg"),
      F.ceil("price").alias("cp"),
      F.floor("price").alias("fp"),
  )
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "achg": 2.3, "cp": 190, "fp": 189}
      - {"ticker": "GOOG", "achg": 1.8, "cp": 143, "fp": 142}
    message: "achg = |change|, cp = ceil(price), fp = floor(price)"
hints:
  - "F.abs(\"change\") gives the magnitude; F.ceil / F.floor round to whole numbers."
  - "ceil/floor return a bigint; F.round(col, n) would keep decimals."
