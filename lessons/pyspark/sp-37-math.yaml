id: sp-37-math
track: pyspark
order: 11
title: "Math & Rounding Functions"
difficulty: 2
concepts: ["round", "abs", "ceil", "floor", "math functions"]
needs_spark: true
brief: |
  **What & why.** Numeric clean-up — rounding money to cents, taking magnitudes,
  bucketing to whole units — is everyday work, and Spark ships **built-in** math
  functions in `F` so it stays in the JVM (fast, vectorised) instead of a Python UDF.

  **The toolkit:**
  - **Rounding:** `F.round(col, n)` (half-up to `n` decimals), `F.bround` (banker's
    rounding), `F.ceil` / `F.floor` (up/down to a whole number — returned as a
    **bigint**).
  - **Magnitude / sign:** `F.abs`, `F.signum`.
  - **Power / roots / logs:** `F.pow`, `F.sqrt`, `F.exp`, `F.log`.
  - **Modulo:** the `%` operator on columns (`F.col("x") % 3`).

  **Gotcha (interview-relevant).** `float`/`double` carry tiny binary rounding
  error, so two "equal" decimals can differ in the 15th place. For **money**, store
  `DecimalType` and round explicitly — never trust raw float equality.

  **Mission:** From `df`, build `out` with `ticker`, `achg` = the **absolute**
  `change`, `cp` = `ceil(price)`, and `fp` = `floor(price)`.

  Expected: AAPL → achg 2.3, cp 190, fp 189; GOOG → achg 1.8, cp 143, fp 142.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", 189.567, -2.3), ("GOOG", 142.1, 1.8)],
      ["ticker", "price", "change"],
  )
  # TODO: achg = abs(change), cp = ceil(price), fp = floor(price) -> `out`
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", 189.567, -2.3), ("GOOG", 142.1, 1.8)],
      ["ticker", "price", "change"],
  )
  out = df.select(
      "ticker",
      F.abs("change").alias("achg"),
      F.ceil("price").alias("cp"),
      F.floor("price").alias("fp"),
  )
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "achg": 2.3, "cp": 190, "fp": 189}
      - {"ticker": "GOOG", "achg": 1.8, "cp": 143, "fp": 142}
    message: "achg = |change|, cp = ceil(price), fp = floor(price)"
hints:
  - "F.abs(\"change\") gives the magnitude; F.ceil / F.floor round to whole numbers."
  - "ceil/floor return a bigint; F.round(col, n) would keep decimals."
