id: sp-06-spark-sql
track: pyspark
order: 6
title: "Spark SQL"
difficulty: 3
concepts: ["createOrReplaceTempView", "spark.sql", "SQL"]
needs_spark: true
brief: |
  **What & why.** Prefer SQL? Spark speaks it fluently. Register a DataFrame as a
  **temporary view**, then query it with `spark.sql(...)`. Crucially, **SQL and the
  DataFrame API compile to the *exact same* Catalyst plan** — there's no performance
  difference, so choose whichever reads clearer for the task (often SQL for complex
  multi-join analytics, the DataFrame API for programmatic pipelines).

  **The essentials:**
  - `df.createOrReplaceTempView("name")` makes it queryable; it lives for the
    session and isn't persisted.
  - `createOrReplaceGlobalTempView` shares across sessions (under `global_temp`).
  - You can freely mix: query with `spark.sql(...)`, then keep chaining DataFrame
    ops on the result.

  **Mission:** Register `trades` as a view named `trades`, then use SQL to compute
  the **average price per ticker**, aliased as `avg_price`. Store the resulting
  DataFrame in `result`.

  Expected: AAPL 195.0, GOOG 142.0.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 190), ("AAPL", 200), ("GOOG", 142)],
      ["ticker", "price"],
  )
  # TODO: register a temp view, then query average price per ticker -> `result`
  result = ...
  result.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 190), ("AAPL", 200), ("GOOG", 142)],
      ["ticker", "price"],
  )
  trades.createOrReplaceTempView("trades")
  result = spark.sql(
      "SELECT ticker, AVG(price) AS avg_price FROM trades GROUP BY ticker"
  )
  result.show()
checks:
  - type: df_equals
    name: result
    expected:
      - {"ticker": "AAPL", "avg_price": 195.0}
      - {"ticker": "GOOG", "avg_price": 142.0}
    message: "result should hold the average price per ticker"
    fail_detail: "Register the view, then SELECT ticker, AVG(price) AS avg_price ... GROUP BY ticker."
hints:
  - "trades.createOrReplaceTempView(\"trades\") makes it queryable."
  - "Alias the aggregate in SQL with: AVG(price) AS avg_price"
