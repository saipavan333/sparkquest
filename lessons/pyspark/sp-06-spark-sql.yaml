id: sp-06-spark-sql
track: pyspark
order: 6
title: "Spark SQL"
difficulty: 3
concepts: ["createOrReplaceTempView", "spark.sql", "SQL"]
needs_spark: true
brief: |
  If you already know SQL (the `SELECT ... FROM ... WHERE` language used with
  databases), good news: Spark speaks it too. You give a DataFrame a name, then write
  ordinary SQL against that name.

  - `df.createOrReplaceTempView("trades")` gives the table a temporary name you can
    query (it lasts for your session — nothing is saved to disk).
  - Then `spark.sql("SELECT ... FROM trades")` runs the query and returns a new
    DataFrame.

  An important reassurance: doing something in SQL and doing it with the DataFrame
  steps (`groupBy`, `agg`, …) run **exactly the same way** underneath — same speed.
  Use whichever is clearer for the job, and you can freely mix the two.

  **Mission:** Register `trades` as a view named `trades`, then use SQL to compute
  the **average price per ticker**, aliased as `avg_price`. Store the resulting
  DataFrame in `result`.

  Expected: AAPL 195.0, GOOG 142.0.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 190), ("AAPL", 200), ("GOOG", 142)],
      ["ticker", "price"],
  )
  # TODO: register a temp view, then query average price per ticker -> `result`
  result = ...
  result.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 190), ("AAPL", 200), ("GOOG", 142)],
      ["ticker", "price"],
  )
  trades.createOrReplaceTempView("trades")
  result = spark.sql(
      "SELECT ticker, AVG(price) AS avg_price FROM trades GROUP BY ticker"
  )
  result.show()
checks:
  - type: df_equals
    name: result
    expected:
      - {"ticker": "AAPL", "avg_price": 195.0}
      - {"ticker": "GOOG", "avg_price": 142.0}
    message: "result should hold the average price per ticker"
    fail_detail: "Register the view, then SELECT ticker, AVG(price) AS avg_price ... GROUP BY ticker."
hints:
  - "trades.createOrReplaceTempView(\"trades\") makes it queryable."
  - "Alias the aggregate in SQL with: AVG(price) AS avg_price"
