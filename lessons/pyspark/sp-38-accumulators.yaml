id: sp-38-accumulators
track: pyspark
order: 31
title: "RDDs: accumulators (metrics)"
difficulty: 3
concepts: ["accumulator", "shared variables", "RDD", "metrics"]
needs_spark: true
brief: |
  An **accumulator** is a shared counter that all the machines can **add to**, and
  that you read back at the end on the driver (your main program). It's the easy way
  to gather a side number across the whole cluster — like "how many bad rows did we
  see?" — without a second pass over the data.

  - Create it on the driver: `bad = sc.accumulator(0)`.
  - Each machine adds to it inside the work: `bad.add(1)`.
  - Read the final total back on the driver with `bad.value`.

  Use accumulators for **metrics and debugging only**, not for numbers your result
  depends on — if Spark retries a piece of work, an accumulator can occasionally be
  added to more than once. For real totals, use a normal aggregation.

  **Mission:** Using an **accumulator** and `rdd.foreach`, count how many amounts in
  `amounts` are **negative**, storing the total in `n_bad`.

  Expected: `n_bad == 2` (the `-5` and `-2`).
starter_code: |
  sc = spark.sparkContext
  amounts = sc.parallelize([100, -5, 30, -2, 80])
  bad = sc.accumulator(0)
  # TODO: use rdd.foreach to add 1 to `bad` for each negative amount, then read it
  ...
  n_bad = ...
  print(n_bad)
solution_code: |
  sc = spark.sparkContext
  amounts = sc.parallelize([100, -5, 30, -2, 80])
  bad = sc.accumulator(0)
  amounts.foreach(lambda x: bad.add(1) if x < 0 else None)
  n_bad = bad.value
  print(n_bad)
checks:
  - type: var_equals
    name: n_bad
    expected: 2
    message: "n_bad should be 2 — the count of negative amounts"
hints:
  - "amounts.foreach(lambda x: bad.add(1) if x < 0 else None) adds 1 per negative."
  - "foreach is an action, so the accumulator is counted exactly once."
  - "Read the total on the driver with bad.value."
