id: sp-10-string-funcs
track: pyspark
order: 10
title: "String Functions"
difficulty: 3
concepts: ["upper", "concat_ws", "string functions"]
needs_spark: true
brief: |
  **What & why.** Cleaning and reshaping text is half of data engineering — raw
  feeds arrive with inconsistent case, stray whitespace, and packed fields. Spark
  ships dozens of **built-in** string functions in `F`, and using them (instead of
  a Python UDF) keeps the work in the JVM where Catalyst can optimize it.

  **The toolkit worth memorising:**
  - Case/clean: `upper`, `lower`, `trim`/`ltrim`/`rtrim`, `lpad`/`rpad`.
  - Combine/cut: `concat_ws(sep, ...)` (null-safe join), `substring`, `split`
    (→ array), `length`.
  - Pattern: `regexp_replace`, `regexp_extract`, `like`/`rlike`.

  **Gotcha.** Most string functions return `null` on a `null` input (it propagates);
  `concat_ws` is the friendly exception — it skips nulls rather than nulling the
  whole result.

  **Mission:** From `df`, add `symbol` = the **uppercased** ticker, and `label` =
  `symbol` and `name` joined by a single space. Store it in `labeled`.
starter_code: |
  df = spark.createDataFrame(
      [("aapl", "Apple"), ("goog", "Google")],
      ["ticker", "name"],
  )
  # TODO: add symbol = upper(ticker) and label = "SYMBOL Name"
  labeled = ...
  labeled.show()
solution_code: |
  df = spark.createDataFrame(
      [("aapl", "Apple"), ("goog", "Google")],
      ["ticker", "name"],
  )
  labeled = (
      df.withColumn("symbol", F.upper("ticker"))
      .withColumn("label", F.concat_ws(" ", F.col("symbol"), F.col("name")))
  )
  labeled.show()
checks:
  - type: df_equals
    name: labeled
    expected:
      - {"ticker": "aapl", "name": "Apple", "symbol": "AAPL", "label": "AAPL Apple"}
      - {"ticker": "goog", "name": "Google", "symbol": "GOOG", "label": "GOOG Google"}
    message: "symbol should be uppercase; label should join symbol and name with a space"
hints:
  - "F.upper(\"ticker\") uppercases the column."
  - "F.concat_ws(\" \", col1, col2) joins with a separator."
