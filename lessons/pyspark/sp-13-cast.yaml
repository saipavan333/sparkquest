id: sp-13-cast
track: pyspark
order: 13
title: "Casting Types"
difficulty: 3
concepts: ["cast", "type conversion"]
needs_spark: true
brief: |
  Data often arrives as **text** even when it's really numbers — `"100"`, `"189.5"`.
  Before you can do maths or sort it properly, you convert it to the right type, and
  `.cast(...)` does that. (Why it matters: while it's still *text*, `"100"` counts as
  *less than* `"9"`, because text is compared letter by letter — clearly wrong for
  numbers!)

  ```
   "189.5"  ──.cast("double")──►  189.5    (now a real number you can add and sort)
  ```

  - `F.col("price_str").cast("double")` turns a text column into decimal numbers.
  - Careful: if a value can't be converted (like `"abc"` into a number), Spark turns
    it into `null` instead of raising an error — so it's worth checking for nulls
    afterwards to catch bad input.
  - Even better, state the types up front with a schema ([sp-08](sp-08-schema.yaml)).

  **Mission:** `price_str` is text. Cast it to a **double** column named `price`,
  keeping `ticker`. Store the result in `casted`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", "190.5"), ("GOOG", "142.0")],
      ["ticker", "price_str"],
  )
  # TODO: cast price_str to double as `price`; keep ticker -> `casted`
  casted = ...
  casted.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", "190.5"), ("GOOG", "142.0")],
      ["ticker", "price_str"],
  )
  casted = df.select("ticker", F.col("price_str").cast("double").alias("price"))
  casted.show()
checks:
  - type: df_equals
    name: casted
    expected:
      - {"ticker": "AAPL", "price": 190.5}
      - {"ticker": "GOOG", "price": 142.0}
    message: "price should be a numeric double cast from the string"
hints:
  - "F.col(\"price_str\").cast(\"double\") converts the type."
  - "Use .alias(\"price\") to name the new column."
