id: sp-13-cast
track: pyspark
order: 13
title: "Casting Types"
difficulty: 3
concepts: ["cast", "type conversion"]
needs_spark: true
brief: |
  **What & why.** Raw feeds (CSV, JSON, Kafka) often arrive as **strings** — prices,
  quantities, dates all as text. `.cast(type)` converts a column to the right type
  so arithmetic, comparisons, and sorting behave correctly (`"100" < "9"` is true as
  *strings*!). Casting is the bridge between messy ingest and clean computation.

  **The essentials:**
  - `F.col("x").cast("double")` (or `.cast(T.DoubleType())`) — string⇄number,
    number⇄string, string⇄date.
  - **Invalid casts become `null`**, not errors — `"abc".cast("double")` → `null`.
    That's a silent data-quality risk: count the nulls after casting to catch bad
    input ([Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).
  - Better still, declare types up front with an explicit **schema**
    ([sp-08](sp-08-schema.yaml)) so you never guess.

  **Mission:** `price_str` is text. Cast it to a **double** column named `price`,
  keeping `ticker`. Store the result in `casted`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", "190.5"), ("GOOG", "142.0")],
      ["ticker", "price_str"],
  )
  # TODO: cast price_str to double as `price`; keep ticker -> `casted`
  casted = ...
  casted.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", "190.5"), ("GOOG", "142.0")],
      ["ticker", "price_str"],
  )
  casted = df.select("ticker", F.col("price_str").cast("double").alias("price"))
  casted.show()
checks:
  - type: df_equals
    name: casted
    expected:
      - {"ticker": "AAPL", "price": 190.5}
      - {"ticker": "GOOG", "price": 142.0}
    message: "price should be a numeric double cast from the string"
hints:
  - "F.col(\"price_str\").cast(\"double\") converts the type."
  - "Use .alias(\"price\") to name the new column."
