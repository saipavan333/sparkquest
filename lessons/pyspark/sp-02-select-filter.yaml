id: sp-02-select-filter
track: pyspark
order: 2
title: "Select & Filter"
difficulty: 2
concepts: ["select", "filter", "where"]
needs_spark: true
brief: |
  **What & why.** The two workhorses: **`select`** picks/derives columns (projection),
  **`filter`** (alias **`where`**) keeps matching rows (selection). Together they're
  most of what a pipeline does. Both return a *new* immutable DataFrame and run
  nothing until an action.

  **The essentials:**
  - Reference columns three ways: `"qty"`, `df.qty`, or `F.col("qty")`. Use `F.col`
    for expressions (`F.col("qty") > 50`).
  - Combine predicates with `&` / `|` and **parenthesise each** —
    `df.filter((F.col("qty") > 50) & (F.col("sector") == "Tech"))`.

  **Why it's fast:** Catalyst pushes filters down to the scan (**predicate
  pushdown**) and reads only the selected columns (**column pruning**) — so on
  Parquet you touch a fraction of the data ([Handbook ch.1 §6](../../docs/handbook/01-spark-architecture-and-execution.md)).
  Filtering early shrinks every downstream shuffle.

  **Mission:** From `trades`, keep only rows where `qty` is greater than `50`,
  and select the `ticker` and `qty` columns, into a DataFrame named `big`.

  Expected rows: AAPL/100 and JPM/75.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("MSFT", 30), ("JPM", 75)],
      ["ticker", "qty"],
  )
  # TODO: filter qty > 50 and select ticker, qty into `big`
  big = ...
  big.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("MSFT", 30), ("JPM", 75)],
      ["ticker", "qty"],
  )
  big = trades.filter(trades.qty > 50).select("ticker", "qty")
  big.show()
checks:
  - type: df_equals
    name: big
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "JPM", "qty": 75}
    message: "big should contain only the trades with qty > 50"
    fail_detail: "Filter with trades.qty > 50, then select the two columns."
hints:
  - "trades.filter(trades.qty > 50) keeps matching rows."
  - "Chain .select(\"ticker\", \"qty\") to pick columns."
