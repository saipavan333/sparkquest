id: sp-02-select-filter
track: pyspark
order: 2
title: "Select & Filter"
difficulty: 2
concepts: ["select", "filter", "where"]
needs_spark: true
brief: |
  The two everyday moves on a table:
  - **`select`** picks the **columns** you want (and can build new ones).
  - **`filter`** (also spelled **`where`**) keeps the **rows** you want.

  ```
   ┌────────┬─────┬────────┐                 ┌────────┬─────┐
   │ ticker │ qty │ sector │  keep rows      │ ticker │ qty │
   │ AAPL   │ 100 │ Tech   │  with qty > 50  │ AAPL   │ 100 │
   │ GOOG   │  50 │ Tech   │  & pick 2 cols  │ JPM    │  75 │
   │ JPM    │  75 │ Fin    │  ─────────────► └────────┴─────┘
   └────────┴─────┴────────┘
  ```

  - You can name a column three ways: `"qty"`, `df.qty`, or `F.col("qty")`. Use
    `F.col("qty")` when writing a condition, like `F.col("qty") > 50`.
  - Combine conditions with `&` (and) / `|` (or), wrapping each one in brackets:
    `df.filter((F.col("qty") > 50) & (F.col("sector") == "Tech"))`.

  Filtering early is also a speed trick — the less data you carry forward, the faster
  everything after it runs.

  **Mission:** From `trades`, keep only rows where `qty` is greater than `50`,
  and select the `ticker` and `qty` columns, into a DataFrame named `big`.

  Expected rows: AAPL/100 and JPM/75.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("MSFT", 30), ("JPM", 75)],
      ["ticker", "qty"],
  )
  # TODO: filter qty > 50 and select ticker, qty into `big`
  big = ...
  big.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("MSFT", 30), ("JPM", 75)],
      ["ticker", "qty"],
  )
  big = trades.filter(trades.qty > 50).select("ticker", "qty")
  big.show()
checks:
  - type: df_equals
    name: big
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "JPM", "qty": 75}
    message: "big should contain only the trades with qty > 50"
    fail_detail: "Filter with trades.qty > 50, then select the two columns."
hints:
  - "trades.filter(trades.qty > 50) keeps matching rows."
  - "Chain .select(\"ticker\", \"qty\") to pick columns."
