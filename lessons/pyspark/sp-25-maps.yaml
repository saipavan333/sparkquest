id: sp-25-maps
track: pyspark
order: 25
title: "Map Columns"
difficulty: 4
concepts: ["MapType", "map access", "semi-structured"]
needs_spark: true
brief: |
  **What & why.** A **map** column holds **key→value pairs per row** with arbitrary,
  per-row keys — think a flexible JSON object or a bag of tags/attributes. Use it
  when the set of keys varies row to row (a **struct** is the right choice when the
  fields are fixed and known).

  **The essentials:**
  - Read by key: `F.col("meta")["sector"]` or `F.col("meta.sector")`; a missing key
    yields `null`.
  - Build/inspect: `F.create_map(...)`, `F.map_keys`, `F.map_values`,
    `F.explode` (a map explodes to `key`,`value` rows).

  **Interview angle: map vs struct.** Map = dynamic keys, all values share **one
  type**, no schema enforcement on keys. Struct = fixed, named, individually-typed
  fields with schema validation. Reach for struct when you can — you get type
  safety and column pruning.

  **Mission:** Each row has a `meta` map. Pull the `sector` value into a top-level
  column `sector` (keeping `ticker`). Store the result in `out`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", {"sector": "Tech"}), ("GOOG", {"sector": "Tech"}), ("JPM", {"sector": "Fin"})],
      ["ticker", "meta"],
  )
  # TODO: extract meta["sector"] into a `sector` column -> out
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", {"sector": "Tech"}), ("GOOG", {"sector": "Tech"}), ("JPM", {"sector": "Fin"})],
      ["ticker", "meta"],
  )
  out = df.select("ticker", F.col("meta")["sector"].alias("sector"))
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "sector": "Tech"}
      - {"ticker": "GOOG", "sector": "Tech"}
      - {"ticker": "JPM", "sector": "Fin"}
    message: "sector should be read by key from the meta map"
hints:
  - "Access a map value by key: F.col(\"meta\")[\"sector\"]."
  - "Alias it to a clean top-level column name."
