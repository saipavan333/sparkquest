id: sp-25-maps
track: pyspark
order: 25
title: "Map Columns"
difficulty: 4
concepts: ["MapType", "map access", "semi-structured"]
needs_spark: true
brief: |
  A **map** column holds **key→value pairs inside a single cell** — like a little
  dictionary ([py-04](../python/py-04-dicts.yaml)) tucked into each row. It's handy
  when the set of keys can differ from row to row (for example, a bag of tags).

  - Read a value by its key: `F.col("meta")["sector"]`. If the key isn't there, you
    get `null`.

  ```
   ┌────────┬───────────────────┐         ┌────────┬────────┐
   │ ticker │ meta              │ pull    │ ticker │ sector │
   │ AAPL   │ {sector: "Tech"}  │ "sector"│ AAPL   │ Tech   │
   │ JPM    │ {sector: "Fin"}   │  ─────► │ JPM    │ Fin    │
   └────────┴───────────────────┘         └────────┴────────┘
  ```

  Map vs **struct** ([sp-20](sp-20-structs.yaml)): use a **map** when the keys vary
  and all values are the same type; use a **struct** when the fields are fixed and
  known (it's safer and a bit faster).

  **Mission:** Each row has a `meta` map. Pull the `sector` value into a top-level
  column `sector` (keeping `ticker`). Store the result in `out`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", {"sector": "Tech"}), ("GOOG", {"sector": "Tech"}), ("JPM", {"sector": "Fin"})],
      ["ticker", "meta"],
  )
  # TODO: extract meta["sector"] into a `sector` column -> out
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", {"sector": "Tech"}), ("GOOG", {"sector": "Tech"}), ("JPM", {"sector": "Fin"})],
      ["ticker", "meta"],
  )
  out = df.select("ticker", F.col("meta")["sector"].alias("sector"))
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "sector": "Tech"}
      - {"ticker": "GOOG", "sector": "Tech"}
      - {"ticker": "JPM", "sector": "Fin"}
    message: "sector should be read by key from the meta map"
hints:
  - "Access a map value by key: F.col(\"meta\")[\"sector\"]."
  - "Alias it to a clean top-level column name."
