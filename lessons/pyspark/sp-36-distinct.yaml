id: sp-36-distinct
track: pyspark
order: 2
title: "Distinct & dropDuplicates"
difficulty: 2
concepts: ["distinct", "dropDuplicates", "deduplication"]
needs_spark: true
brief: |
  Removing duplicate rows is a routine cleaning step. There are two tools, and the
  difference between them is worth knowing:

  - **`df.distinct()`** — keeps **whole rows** that are unique (every column has to
    match for two rows to count as the same).
  - **`df.dropDuplicates(["ticker"])`** — keeps one row per **chosen column(s)**.
    This is how you say "just one row per ticker", even if the other columns differ.

  ```
   ┌────────┐   df.distinct()   ┌────────┐
   │ AAPL   │                   │ AAPL   │
   │ GOOG   │   drop repeats    │ GOOG   │
   │ AAPL   │   ─────────────►  │ MSFT   │
   │ MSFT   │                   └────────┘
   │ GOOG   │
   └────────┘
  ```

  Tip: to keep a *specific* row per key (say, the newest), sort first with `orderBy`,
  then `dropDuplicates(["ticker"])`. Like grouping, removing duplicates makes Spark
  compare rows across machines (a shuffle), so do it early when you can.

  **Streaming tie-in.** The streaming version, `dropDuplicates` + a **watermark**,
  bounds the state it must remember ([st-04](../streaming/st-04-streaming-dedup.yaml)).

  **Mission:** From `trades`, get the **distinct tickers** into `uniq` (one row per
  ticker).

  Expected (any order): AAPL, GOOG, MSFT.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL",), ("GOOG",), ("AAPL",), ("MSFT",), ("GOOG",)], ["ticker"]
  )
  # TODO: keep each ticker once -> `uniq`
  uniq = ...
  uniq.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL",), ("GOOG",), ("AAPL",), ("MSFT",), ("GOOG",)], ["ticker"]
  )
  uniq = trades.distinct()
  uniq.show()
checks:
  - type: df_equals
    name: uniq
    expected:
      - {"ticker": "AAPL"}
      - {"ticker": "GOOG"}
      - {"ticker": "MSFT"}
    message: "uniq should contain each ticker exactly once"
hints:
  - "trades.distinct() drops duplicate rows."
  - "Equivalent here: trades.dropDuplicates([\"ticker\"])."
