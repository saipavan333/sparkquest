id: sp-36-distinct
track: pyspark
order: 2
title: "Distinct & dropDuplicates"
difficulty: 2
concepts: ["distinct", "dropDuplicates", "deduplication"]
needs_spark: true
brief: |
  **What & why.** Removing duplicates is a routine cleaning step — and a wide
  transformation (it **shuffles** to compare rows across partitions). Two tools,
  with an important difference:

  - **`df.distinct()`** — keep unique **whole rows** (all columns must match).
  - **`df.dropDuplicates(["ticker"])`** — keep the first row per **subset** of
    columns; the other columns come along for the ride. More flexible — it's how you
    "keep one row per key".

  **The essentials:**
  - `distinct()` == `dropDuplicates()` with no subset (all columns).
  - With a subset, *which* row survives is arbitrary unless you `orderBy` first
    (e.g. keep the latest by sorting on a timestamp, then dedup).
  - Both cost a shuffle — dedup **early** so less data flows downstream, and beware
    that a wide `distinct` on high-cardinality data is expensive.

  **Streaming tie-in.** The streaming version, `dropDuplicates` + a **watermark**,
  bounds the state it must remember ([st-04](../streaming/st-04-streaming-dedup.yaml)).

  **Mission:** From `trades`, get the **distinct tickers** into `uniq` (one row per
  ticker).

  Expected (any order): AAPL, GOOG, MSFT.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL",), ("GOOG",), ("AAPL",), ("MSFT",), ("GOOG",)], ["ticker"]
  )
  # TODO: keep each ticker once -> `uniq`
  uniq = ...
  uniq.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL",), ("GOOG",), ("AAPL",), ("MSFT",), ("GOOG",)], ["ticker"]
  )
  uniq = trades.distinct()
  uniq.show()
checks:
  - type: df_equals
    name: uniq
    expected:
      - {"ticker": "AAPL"}
      - {"ticker": "GOOG"}
      - {"ticker": "MSFT"}
    message: "uniq should contain each ticker exactly once"
hints:
  - "trades.distinct() drops duplicate rows."
  - "Equivalent here: trades.dropDuplicates([\"ticker\"])."
