id: sp-11-date-funcs
track: pyspark
order: 11
title: "Date & Time Functions"
difficulty: 4
concepts: ["to_date", "datediff", "year"]
needs_spark: true
brief: |
  **What & why.** Time drives pipelines — you partition by date, window by hour,
  and compute holding periods. Parse strings to real date/timestamp types first
  (`to_date`/`to_timestamp`), then compute on them; comparing raw strings is a
  classic bug.

  **The toolkit:**
  - Parse: `to_date(col[, fmt])`, `to_timestamp(...)`. Default format is
    `yyyy-MM-dd` (the same codes as Python's `strptime` — [py-15](../python/py-15-datetime.yaml)).
  - Extract: `year`, `month`, `dayofmonth`, `hour`, `date_format(col, "yyyy-MM")`.
  - Arithmetic: `datediff(end, start)` (whole days), `date_add`/`date_sub`,
    `months_between`, `current_date`.

  **Gotcha (interview-relevant): timezones.** `to_timestamp` interprets in the
  session timezone; mismatches cause off-by-hours errors. Standardize on **UTC** —
  the batch cousin of streaming's event-time handling
  ([Handbook ch.3](../../docs/handbook/03-streaming-internals.md)).

  **Mission:** From `df` (string `buy`/`sell` dates), build `dated` with columns
  `ticker`, `held` (days between sell and buy via `datediff`), and `yr` (the year
  of the buy date).

  Expected: AAPL held 14 / yr 2026, GOOG held 9 / yr 2026.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", "2026-01-01", "2026-01-15"), ("GOOG", "2026-02-01", "2026-02-10")],
      ["ticker", "buy", "sell"],
  )
  # TODO: select ticker, held (datediff), yr (year of buy) into `dated`
  dated = ...
  dated.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", "2026-01-01", "2026-01-15"), ("GOOG", "2026-02-01", "2026-02-10")],
      ["ticker", "buy", "sell"],
  )
  dated = df.select(
      "ticker",
      F.datediff(F.to_date("sell"), F.to_date("buy")).alias("held"),
      F.year(F.to_date("buy")).alias("yr"),
  )
  dated.show()
checks:
  - type: df_equals
    name: dated
    expected:
      - {"ticker": "AAPL", "held": 14, "yr": 2026}
      - {"ticker": "GOOG", "held": 9, "yr": 2026}
    message: "held should be the day count; yr should be the buy year"
hints:
  - "Parse with F.to_date(\"buy\") (default format yyyy-MM-dd)."
  - "F.datediff(end, start) returns whole days; F.year(date) returns the year."
