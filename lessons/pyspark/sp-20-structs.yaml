id: sp-20-structs
track: pyspark
order: 20
title: "Nested Structs"
difficulty: 4
concepts: ["struct", "nested data", "dot access"]
needs_spark: true
brief: |
  A **struct** is a column whose value is itself a little group of named fields — a
  mini-row tucked inside a single cell. You meet these a lot with JSON, where one
  field holds an object like `{"price": 190, "qty": 100}`.

  ```
   ┌────────┬──────────────────────┐          ┌────────┬───────┬─────┐
   │ ticker │ trade                │ flatten  │ ticker │ price │ qty │
   │ AAPL   │ {price:190, qty:100} │  ──────► │ AAPL   │  190  │ 100 │
   └────────┴──────────────────────┘          └────────┴───────┴─────┘
  ```

  - Reach inside a struct with a **dot**: `F.col("trade.price")` grabs the inner
    `price`. Add `.alias("price")` to give it a clean top-level name.
  - `df.select("trade.*")` pulls out *all* the inner fields at once.

  (Pulling fields out of a struct is cheap — it's just renaming, no data is moved.
  That's different from `explode` ([sp-14](sp-14-explode.yaml)), which makes new rows.)

  The types module is available as `T`.

  **Mission:** Each row has a nested `trade` struct of `price` and `qty`. Flatten it
  into top-level `price` and `qty` columns (keeping `ticker`). Store it in `flat`.
starter_code: |
  schema = T.StructType([
      T.StructField("ticker", T.StringType()),
      T.StructField("trade", T.StructType([
          T.StructField("price", T.DoubleType()),
          T.StructField("qty", T.LongType()),
      ])),
  ])
  df = spark.createDataFrame([("AAPL", (190.0, 100)), ("GOOG", (142.0, 50))], schema)
  # TODO: pull trade.price and trade.qty up to top-level columns -> flat
  flat = ...
  flat.show()
solution_code: |
  schema = T.StructType([
      T.StructField("ticker", T.StringType()),
      T.StructField("trade", T.StructType([
          T.StructField("price", T.DoubleType()),
          T.StructField("qty", T.LongType()),
      ])),
  ])
  df = spark.createDataFrame([("AAPL", (190.0, 100)), ("GOOG", (142.0, 50))], schema)
  flat = df.select(
      "ticker",
      F.col("trade.price").alias("price"),
      F.col("trade.qty").alias("qty"),
  )
  flat.show()
checks:
  - type: df_equals
    name: flat
    expected:
      - {"ticker": "AAPL", "price": 190.0, "qty": 100}
      - {"ticker": "GOOG", "price": 142.0, "qty": 50}
    message: "flat should lift price and qty out of the nested struct"
hints:
  - "Reach into a struct with dot notation: F.col(\"trade.price\")."
  - "Alias each to a clean top-level name."
