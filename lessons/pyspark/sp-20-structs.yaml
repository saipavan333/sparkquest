id: sp-20-structs
track: pyspark
order: 20
title: "Nested Structs"
difficulty: 4
concepts: ["struct", "nested data", "dot access"]
needs_spark: true
brief: |
  **What & why.** Semi-structured data (JSON, Avro, Kafka payloads) nests fields
  inside a **struct** — a column whose value is itself a row of named subfields.
  This is exactly what `from_json` produces, so flattening structs is the routine
  next step in any ingestion pipeline.

  **The essentials:**
  - Reach in with **dot notation**: `F.col("trade.price")`; alias to lift it to a
    clean top-level name.
  - `df.select("trade.*")` flattens *all* subfields at once.
  - Build one with `F.struct("a", "b")`; structs nest arbitrarily (struct of arrays
    of structs).

  **Interview angle.** Struct access is **free** — it's metadata, not a shuffle or
  scan of new data — whereas `explode`-ing an array multiplies rows. Know the
  difference: structs widen, arrays lengthen.

  The types module is available as `T`.

  **Mission:** Each row has a nested `trade` struct of `price` and `qty`. Flatten it
  into top-level `price` and `qty` columns (keeping `ticker`). Store it in `flat`.
starter_code: |
  schema = T.StructType([
      T.StructField("ticker", T.StringType()),
      T.StructField("trade", T.StructType([
          T.StructField("price", T.DoubleType()),
          T.StructField("qty", T.LongType()),
      ])),
  ])
  df = spark.createDataFrame([("AAPL", (190.0, 100)), ("GOOG", (142.0, 50))], schema)
  # TODO: pull trade.price and trade.qty up to top-level columns -> flat
  flat = ...
  flat.show()
solution_code: |
  schema = T.StructType([
      T.StructField("ticker", T.StringType()),
      T.StructField("trade", T.StructType([
          T.StructField("price", T.DoubleType()),
          T.StructField("qty", T.LongType()),
      ])),
  ])
  df = spark.createDataFrame([("AAPL", (190.0, 100)), ("GOOG", (142.0, 50))], schema)
  flat = df.select(
      "ticker",
      F.col("trade.price").alias("price"),
      F.col("trade.qty").alias("qty"),
  )
  flat.show()
checks:
  - type: df_equals
    name: flat
    expected:
      - {"ticker": "AAPL", "price": 190.0, "qty": 100}
      - {"ticker": "GOOG", "price": 142.0, "qty": 50}
    message: "flat should lift price and qty out of the nested struct"
hints:
  - "Reach into a struct with dot notation: F.col(\"trade.price\")."
  - "Alias each to a clean top-level name."
