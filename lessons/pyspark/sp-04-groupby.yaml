id: sp-04-groupby
track: pyspark
order: 4
title: "Group & Aggregate"
difficulty: 3
concepts: ["groupBy", "aggregation", "sum", "alias"]
needs_spark: true
brief: |
  **Aggregating** means squashing many rows into a summary — totals, averages, counts.
  `groupBy("ticker").agg(...)` gathers all the rows that share a value, then combines
  each group into a single summary row.

  ```
   ┌────────┬─────┐                       ┌────────┬───────┐
   │ ticker │ qty │   group by ticker,    │ ticker │ total │
   │ AAPL   │ 100 │   then add up qty      │ AAPL   │  170  │
   │ AAPL   │  70 │   ──────────────────►  │ GOOG   │   70  │
   │ GOOG   │  70 │                        │ MSFT   │   30  │
   │ MSFT   │  30 │                        └────────┴───────┘
   └────────┴─────┘
  ```

  - Always give the result a clean name with `.alias(...)`:
    `.agg(F.sum("qty").alias("total"))` — otherwise you get an ugly name like
    `sum(qty)`.
  - To gather each group's rows together, Spark has to move data between machines.
    That move is called a **shuffle** — it's the main thing that makes big jobs slow,
    so grouping isn't free.

  **Mission:** From `trades`, compute the **total quantity per ticker**. Name the
  aggregated column `total` and store the result in `totals`.

  Expected: AAPL 170, GOOG 70, MSFT 30.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70), ("MSFT", 30), ("GOOG", 20)],
      ["ticker", "qty"],
  )
  # TODO: total qty per ticker, aggregated column named `total` -> `totals`
  totals = ...
  totals.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 50), ("AAPL", 70), ("MSFT", 30), ("GOOG", 20)],
      ["ticker", "qty"],
  )
  totals = trades.groupBy("ticker").agg(F.sum("qty").alias("total"))
  totals.show()
checks:
  - type: df_equals
    name: totals
    expected:
      - {"ticker": "AAPL", "total": 170}
      - {"ticker": "GOOG", "total": 70}
      - {"ticker": "MSFT", "total": 30}
    message: "totals should hold the summed quantity per ticker"
    fail_detail: "Use groupBy(\"ticker\").agg(F.sum(\"qty\").alias(\"total\"))."
hints:
  - "Group first: trades.groupBy(\"ticker\")"
  - "Then aggregate: .agg(F.sum(\"qty\").alias(\"total\"))"
