id: sp-15-pivot
track: pyspark
order: 15
title: "Pivot Tables"
difficulty: 4
concepts: ["pivot", "groupBy", "reshaping"]
needs_spark: true
brief: |
  **Pivoting** turns the *values* in a column into new *columns* — the shape you want
  for a summary grid (one row per thing, one column per category).
  `groupBy("ticker").pivot("side").sum("qty")` reads as: one row per ticker, a column
  for each `side` (BUY/SELL), each cell filled with the summed `qty`.

  ```
   ┌────────┬──────┬─────┐             ┌────────┬─────┬──────┐
   │ ticker │ side │ qty │   spread    │ ticker │ BUY │ SELL │
   │ AAPL   │ BUY  │ 100 │   side into  │ AAPL   │ 100 │  40  │
   │ AAPL   │ SELL │  40 │   columns ─► │ GOOG   │  50 │ null │
   │ GOOG   │ BUY  │  50 │             └────────┴─────┴──────┘
   └────────┴──────┴─────┘   (GOOG never sold → empty cell is null)
  ```

  - A combination with no data (GOOG + SELL) shows up as `null`.
  - Tip: naming the categories up front — `.pivot("side", ["BUY", "SELL"])` — is a
    little faster, since otherwise Spark scans the data first to find them.

  **Mission:** Pivot `trades` so each `side` (BUY/SELL) becomes a column holding
  the **summed** `qty` per `ticker`. Store the result in `pvt`.

  GOOG never sold, so its SELL cell is null.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", "BUY", 100), ("AAPL", "SELL", 40), ("GOOG", "BUY", 50)],
      ["ticker", "side", "qty"],
  )
  # TODO: pivot side into columns, summing qty per ticker -> `pvt`
  pvt = ...
  pvt.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", "BUY", 100), ("AAPL", "SELL", 40), ("GOOG", "BUY", 50)],
      ["ticker", "side", "qty"],
  )
  pvt = trades.groupBy("ticker").pivot("side").sum("qty")
  pvt.show()
checks:
  - type: df_equals
    name: pvt
    expected:
      - {"ticker": "AAPL", "BUY": 100, "SELL": 40}
      - {"ticker": "GOOG", "BUY": 50, "SELL": null}
    message: "each side should become a column of summed qty; missing combos are null"
hints:
  - "groupBy(\"ticker\").pivot(\"side\").sum(\"qty\")"
  - "Pivot column names come from the distinct values of `side`."
