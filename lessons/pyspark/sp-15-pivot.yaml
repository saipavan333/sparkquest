id: sp-15-pivot
track: pyspark
order: 15
title: "Pivot Tables"
difficulty: 4
concepts: ["pivot", "groupBy", "reshaping"]
needs_spark: true
brief: |
  **What & why.** Pivoting turns **row values into columns** — the shape reports and
  ML feature tables want (one row per entity, one column per category).
  `groupBy(keys).pivot(col).agg(...)` does it in one expression: group by the row
  key, spread the distinct values of `col` across columns, aggregate the cell.

  **The essentials:**
  - Missing key/category combinations come out as **`null`** (no data for that cell).
  - **Performance:** Spark must learn the distinct pivot values, which costs an
    extra pass. Pass them explicitly — `.pivot("side", ["BUY", "SELL"])` — to skip
    that pass and guard against unexpected categories.
  - The inverse (columns → rows) is an **unpivot** via `stack(...)`/`selectExpr`.

  **Mission:** Pivot `trades` so each `side` (BUY/SELL) becomes a column holding
  the **summed** `qty` per `ticker`. Store the result in `pvt`.

  GOOG never sold, so its SELL cell is null.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", "BUY", 100), ("AAPL", "SELL", 40), ("GOOG", "BUY", 50)],
      ["ticker", "side", "qty"],
  )
  # TODO: pivot side into columns, summing qty per ticker -> `pvt`
  pvt = ...
  pvt.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", "BUY", 100), ("AAPL", "SELL", 40), ("GOOG", "BUY", 50)],
      ["ticker", "side", "qty"],
  )
  pvt = trades.groupBy("ticker").pivot("side").sum("qty")
  pvt.show()
checks:
  - type: df_equals
    name: pvt
    expected:
      - {"ticker": "AAPL", "BUY": 100, "SELL": 40}
      - {"ticker": "GOOG", "BUY": 50, "SELL": null}
    message: "each side should become a column of summed qty; missing combos are null"
hints:
  - "groupBy(\"ticker\").pivot(\"side\").sum(\"qty\")"
  - "Pivot column names come from the distinct values of `side`."
