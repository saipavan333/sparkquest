id: sp-03-withcolumn
track: pyspark
order: 3
title: "Derive a Column"
difficulty: 3
concepts: ["withColumn", "expressions", "columns"]
needs_spark: true
brief: |
  Often you want to add a **new column** worked out from existing ones — for example,
  a `total` that's `price * qty`. `withColumn("total", ...)` does that, giving you a
  new table with the extra column (and if the name already exists, it replaces it).

  ```
   ┌────────┬───────┬─────┐              ┌────────┬───────┬─────┬───────┐
   │ ticker │ price │ qty │  add column  │ ticker │ price │ qty │ total │
   │ AAPL   │  190  │ 100 │  total =     │ AAPL   │  190  │ 100 │ 19000 │
   │ GOOG   │  142  │  50 │  price*qty ► │ GOOG   │  142  │  50 │  7100 │
   └────────┴───────┴─────┘              └────────┴───────┴─────┴───────┘
  ```

  - `F` is a toolbox of ready-made column functions (already imported). You build
    the new value from it: `F.col("price") * F.col("qty")`, `F.upper(...)`, and so on.
    `F.col("price")` just means "the price column".
  - Prefer these built-in functions to writing your own — they're faster (more on
    that in [sp-19](sp-19-udf.yaml)).

  **Mission:** Add a column named `total` equal to `price * qty` to the `orders`
  DataFrame. Store the result in `priced`.
starter_code: |
  orders = spark.createDataFrame(
      [("AAPL", 190, 100), ("GOOG", 142, 50)],
      ["ticker", "price", "qty"],
  )
  # TODO: add a column `total` = price * qty -> `priced`
  priced = ...
  priced.show()
solution_code: |
  orders = spark.createDataFrame(
      [("AAPL", 190, 100), ("GOOG", 142, 50)],
      ["ticker", "price", "qty"],
  )
  priced = orders.withColumn("total", F.col("price") * F.col("qty"))
  priced.show()
checks:
  - type: df_equals
    name: priced
    expected:
      - {"ticker": "AAPL", "price": 190, "qty": 100, "total": 19000}
      - {"ticker": "GOOG", "price": 142, "qty": 50, "total": 7100}
    message: "priced should keep all columns plus total = price * qty"
    fail_detail: "Use withColumn(\"total\", F.col(\"price\") * F.col(\"qty\"))."
hints:
  - "Reference columns with F.col(\"price\")."
  - "orders.withColumn(\"total\", F.col(\"price\") * F.col(\"qty\"))"
