id: sp-03-withcolumn
track: pyspark
order: 3
title: "Derive a Column"
difficulty: 3
concepts: ["withColumn", "expressions", "columns"]
needs_spark: true
brief: |
  **What & why.** Real pipelines enrich data by computing new columns.
  `withColumn(name, expr)` returns a new DataFrame with an added (or, if the name
  exists, **replaced**) column. The expression is a **column expression** built from
  `F.col(...)` and functions — evaluated by Catalyst across the cluster, not row by
  row in Python.

  **The essentials:**
  - `F` is `pyspark.sql.functions` (already imported). Build expressions like
    `F.col("price") * F.col("qty")`, `F.upper(...)`, `F.when(...).otherwise(...)`.
  - Prefer these **built-in column functions** over Python UDFs — they stay in the
    JVM and Catalyst can optimize them ([sp-19](sp-19-udf.yaml) shows the UDF cost).

  **Gotcha (interview-relevant).** Chaining **many** `withColumn` calls builds a
  deep plan and can be slow to analyze; for lots of new columns, do them in one
  `select`/`withColumns(...)` instead.

  **Mission:** Add a column named `total` equal to `price * qty` to the `orders`
  DataFrame. Store the result in `priced`.
starter_code: |
  orders = spark.createDataFrame(
      [("AAPL", 190, 100), ("GOOG", 142, 50)],
      ["ticker", "price", "qty"],
  )
  # TODO: add a column `total` = price * qty -> `priced`
  priced = ...
  priced.show()
solution_code: |
  orders = spark.createDataFrame(
      [("AAPL", 190, 100), ("GOOG", 142, 50)],
      ["ticker", "price", "qty"],
  )
  priced = orders.withColumn("total", F.col("price") * F.col("qty"))
  priced.show()
checks:
  - type: df_equals
    name: priced
    expected:
      - {"ticker": "AAPL", "price": 190, "qty": 100, "total": 19000}
      - {"ticker": "GOOG", "price": 142, "qty": 50, "total": 7100}
    message: "priced should keep all columns plus total = price * qty"
    fail_detail: "Use withColumn(\"total\", F.col(\"price\") * F.col(\"qty\"))."
hints:
  - "Reference columns with F.col(\"price\")."
  - "orders.withColumn(\"total\", F.col(\"price\") * F.col(\"qty\"))"
