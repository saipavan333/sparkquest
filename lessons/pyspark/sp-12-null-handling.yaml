id: sp-12-null-handling
track: pyspark
order: 12
title: "Null Handling"
difficulty: 3
concepts: ["na.fill", "na.drop", "nulls"]
needs_spark: true
brief: |
  Missing values (Python's `None`, shown as `null` in a table) turn up constantly in
  real data, and they spread quietly: `null + 5` is still `null`, and a single
  missing value can throw off a total or break a join. So deal with them on purpose.

  - **Fill them in:** `df.na.fill({"qty": 0})` replaces missing `qty` values with 0.
  - **Drop them:** `df.na.drop()` removes any row that has a missing value;
    `df.na.drop(subset=["qty"])` only checks the `qty` column.
  - **Take the first value that exists:** `F.coalesce(a, b)` gives `a` if it's there,
    otherwise `b` — handy for setting defaults.
  - **Check for missing:** use `F.col("x").isNull()` / `isNotNull()`.

  Whether to fill, drop, or set bad rows aside is a real decision — make it
  deliberately rather than letting nulls sneak through.

  **Mission:** The `qty` for GOOG is missing (`None`). Replace every null `qty`
  with `0`, storing the result in `filled`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", 30)],
      ["ticker", "qty"],
  )
  # TODO: fill null qty with 0 -> `filled`
  filled = ...
  filled.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", 30)],
      ["ticker", "qty"],
  )
  filled = df.na.fill({"qty": 0})
  filled.show()
checks:
  - type: df_equals
    name: filled
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 0}
      - {"ticker": "MSFT", "qty": 30}
    message: "the missing GOOG qty should become 0"
hints:
  - "df.na.fill({\"qty\": 0}) replaces nulls in that column."
  - "You can also pass a single value to fill all numeric columns."
