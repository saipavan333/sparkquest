id: sp-12-null-handling
track: pyspark
order: 12
title: "Null Handling"
difficulty: 3
concepts: ["na.fill", "na.drop", "nulls"]
needs_spark: true
brief: |
  **What & why.** Missing data is everywhere, and nulls **propagate** silently:
  `null + 5` is `null`, `null == null` is **not** true, and unhandled nulls quietly
  skew aggregates and break joins. Handle them *deliberately*.

  **The toolkit:**
  - `df.na.fill({"qty": 0})` — replace nulls per column (or a single value for all).
  - `df.na.drop()` — drop rows with any null; `df.na.drop(subset=["qty"])` targets
    columns; `how="all"` only drops all-null rows.
  - `F.coalesce(a, b, c)` — first non-null wins (great for fallback/default columns).
  - Test with `F.col("x").isNull()` / `isNotNull()` — never `== None`.

  **Interview angle.** `null` join keys never match yet all hash to one partition →
  skew; and counting nulls is a core **data-quality** check
  ([Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)). Decide
  fill-vs-drop-vs-quarantine on purpose, not by accident.

  **Mission:** The `qty` for GOOG is missing (`None`). Replace every null `qty`
  with `0`, storing the result in `filled`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", 30)],
      ["ticker", "qty"],
  )
  # TODO: fill null qty with 0 -> `filled`
  filled = ...
  filled.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", 30)],
      ["ticker", "qty"],
  )
  filled = df.na.fill({"qty": 0})
  filled.show()
checks:
  - type: df_equals
    name: filled
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 0}
      - {"ticker": "MSFT", "qty": 30}
    message: "the missing GOOG qty should become 0"
hints:
  - "df.na.fill({\"qty\": 0}) replaces nulls in that column."
  - "You can also pass a single value to fill all numeric columns."
