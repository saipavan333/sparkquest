id: sp-29-rdd-basics
track: pyspark
order: 29
title: "RDDs: parallelize, map, filter"
difficulty: 2
concepts: ["RDD", "sparkContext", "map", "filter", "collect"]
needs_spark: true
brief: |
  Beneath every DataFrame sits an older, lower-level thing called an **RDD** — just a
  big collection of items spread across machines that you can work on in parallel.
  You'll rarely use it directly (DataFrames are easier and faster), but it's worth
  meeting once, and interviewers like to ask about it. You reach it through
  `spark.sparkContext`, usually shortened to `sc`.

  Just like DataFrames, RDD steps such as `map` (change each item) and `filter` (keep
  some items) are **lazy** — nothing actually runs until an **action** like
  `collect()` gathers the results back to you.

  **Mission:** From the integers 1..6, square each number, keep only the squares
  **greater than 10**, and `collect()` them — sorted ascending — into `result`.
starter_code: |
  sc = spark.sparkContext
  rdd = sc.parallelize(range(1, 7))
  # TODO: square each value, keep squares > 10, collect into a sorted list `result`
  result = ...
  print(result)
solution_code: |
  sc = spark.sparkContext
  rdd = sc.parallelize(range(1, 7))
  result = sorted(rdd.map(lambda x: x * x).filter(lambda x: x > 10).collect())
  print(result)
checks:
  - type: var_equals
    name: result
    expected: [16, 25, 36]
    message: "result should be [16, 25, 36] — squares of 4, 5, 6"
hints:
  - "rdd.map(lambda x: x * x) squares each element (lazy)."
  - ".filter(lambda x: x > 10) keeps matching elements; .collect() runs it."
  - "Wrap the collected list in sorted(...) for a deterministic order."
