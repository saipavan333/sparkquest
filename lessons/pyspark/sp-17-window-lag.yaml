id: sp-17-window-lag
track: pyspark
order: 17
title: "Window: lag & day-over-day change"
difficulty: 4
concepts: ["Window", "lag", "time series"]
needs_spark: true
brief: |
  **What & why.** `lag` looks at the **previous** row within an ordered window
  (`lead` looks ahead) — the building block of day-over-day change, running diffs,
  gap detection, and time-series features. It expresses "compare this row to the
  one before it" without a self-join.

  **The essentials:**
  - `F.lag("price").over(w)` returns the prior row's value; `F.lag("price", 2)` goes
    back two; an optional default replaces the boundary `null`.
  - The window **must** be ordered (`orderBy`) for lag/lead to be meaningful, and
    usually `partitionBy` the entity (per ticker) so you don't bleed across groups.
  - The first row of each partition has no predecessor → `null` (seen in the
    expected output).

  **Performance note.** Like all `partitionBy` windows this shuffles by the key;
  unbounded ordered windows can be memory-heavy on huge partitions.

  You'll need `from pyspark.sql.window import Window`. `F` is already imported.

  **Mission:** For each ticker ordered by date `d`, compute `change` = today's
  `price` minus the previous day's price (via `lag`). Select `ticker`, `d`,
  `change` into `changes`. The first day has no previous row, so its change is null.
starter_code: |
  from pyspark.sql.window import Window

  prices = spark.createDataFrame(
      [("AAPL", "2026-01-01", 100), ("AAPL", "2026-01-02", 110),
       ("AAPL", "2026-01-03", 105)],
      ["ticker", "d", "price"],
  )
  # TODO: change = price - lag(price) over a window by ticker ordered by d
  changes = ...
  changes.show()
solution_code: |
  from pyspark.sql.window import Window

  prices = spark.createDataFrame(
      [("AAPL", "2026-01-01", 100), ("AAPL", "2026-01-02", 110),
       ("AAPL", "2026-01-03", 105)],
      ["ticker", "d", "price"],
  )
  w = Window.partitionBy("ticker").orderBy("d")
  changes = prices.select(
      "ticker", "d",
      (F.col("price") - F.lag("price").over(w)).alias("change"),
  )
  changes.show()
checks:
  - type: df_equals
    name: changes
    expected:
      - {"ticker": "AAPL", "d": "2026-01-01", "change": null}
      - {"ticker": "AAPL", "d": "2026-01-02", "change": 10}
      - {"ticker": "AAPL", "d": "2026-01-03", "change": -5}
    message: "change should be price minus the previous day's price (null on day 1)"
hints:
  - "Window.partitionBy(\"ticker\").orderBy(\"d\")"
  - "F.lag(\"price\").over(w) returns the previous row's price."
