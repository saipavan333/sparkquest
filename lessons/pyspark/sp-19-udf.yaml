id: sp-19-udf
track: pyspark
order: 19
title: "User-Defined Functions (UDFs)"
difficulty: 4
concepts: ["UDF", "custom logic", "types"]
needs_spark: true
brief: |
  **What & why.** When no built-in expresses your logic, a **UDF** wraps a Python
  function as a column operation. Powerful, but understand the cost — it's a
  guaranteed interview question:

  **The performance story (say this):**
  - A plain Python UDF serializes each row from the JVM to a **Python worker**, runs
    your code, and serializes back. That **JVM↔Python boundary** is slow, and the
    UDF is a **black box to Catalyst** — no pushdown, no codegen.
  - So **prefer built-in `F` functions / `when` / `expr`** whenever possible.
  - When you must run Python, use a **pandas UDF** ([sp-28](sp-28-pandas-udf.yaml)) —
    it processes Arrow batches vectorised, far faster than a row-at-a-time UDF.
  - Always declare the **return type** (`T.StringType()`); a UDF that returns
    `null`/errors silently is a debugging trap.

  `F` and the types module `T` are available.

  **Mission:** Write a UDF `classify` that returns `"big"` when `amount >= 1000`
  else `"small"`, and apply it as a new column `band`. Store the result in `out`.
starter_code: |
  df = spark.createDataFrame([("AAPL", 1200), ("GOOG", 800)], ["ticker", "amount"])
  # TODO: define a string-returning UDF `classify` and add column `band`
  classify = ...
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame([("AAPL", 1200), ("GOOG", 800)], ["ticker", "amount"])
  classify = F.udf(lambda amount: "big" if amount >= 1000 else "small", T.StringType())
  out = df.withColumn("band", classify(F.col("amount")))
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "amount": 1200, "band": "big"}
      - {"ticker": "GOOG", "amount": 800, "band": "small"}
    message: "band should come from your UDF: 'big' if amount >= 1000 else 'small'"
hints:
  - "F.udf(lambda amount: ..., T.StringType()) wraps your function."
  - "Apply it like any function: classify(F.col(\"amount\"))."
