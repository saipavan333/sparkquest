id: sp-19-udf
track: pyspark
order: 19
title: "User-Defined Functions (UDFs)"
difficulty: 4
concepts: ["UDF", "custom logic", "types"]
needs_spark: true
brief: |
  A **UDF** ("user-defined function") lets you run your **own Python function** on a
  column, for the times none of the built-in `F` functions do what you need.

  It's handy, but it has a real cost worth knowing (and a favourite interview
  question): a plain Python UDF makes Spark hand each value over to Python one at a
  time, which is **much slower** than the built-in functions that run inside Spark
  itself. So:
  - **Prefer built-in functions** (like `F.when(...)`) whenever they can do the job.
  - Reach for a UDF only when you genuinely need custom Python.
  - When you do, there's a faster kind — a **pandas UDF** — that works on whole
    batches at once ([sp-28](sp-28-pandas-udf.yaml)).
  - Always tell Spark what type your UDF returns (e.g. `T.StringType()`).

  `F` and the types module `T` are available.

  **Mission:** Write a UDF `classify` that returns `"big"` when `amount >= 1000`
  else `"small"`, and apply it as a new column `band`. Store the result in `out`.
starter_code: |
  df = spark.createDataFrame([("AAPL", 1200), ("GOOG", 800)], ["ticker", "amount"])
  # TODO: define a string-returning UDF `classify` and add column `band`
  classify = ...
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame([("AAPL", 1200), ("GOOG", 800)], ["ticker", "amount"])
  classify = F.udf(lambda amount: "big" if amount >= 1000 else "small", T.StringType())
  out = df.withColumn("band", classify(F.col("amount")))
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "amount": 1200, "band": "big"}
      - {"ticker": "GOOG", "amount": 800, "band": "small"}
    message: "band should come from your UDF: 'big' if amount >= 1000 else 'small'"
hints:
  - "F.udf(lambda amount: ..., T.StringType()) wraps your function."
  - "Apply it like any function: classify(F.col(\"amount\"))."
