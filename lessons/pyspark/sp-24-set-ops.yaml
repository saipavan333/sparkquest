id: sp-24-set-ops
track: pyspark
order: 24
title: "Set Operations"
difficulty: 3
concepts: ["exceptAll", "union", "intersect", "set difference"]
needs_spark: true
brief: |
  These combine two tables **top-to-bottom** (by stacking rows), unlike a join which
  joins **side-to-side** (by columns). They're the toolkit for comparing two
  snapshots — "what's in A but not B?", "what's in both?".

  - **`a.unionByName(b)`** — stack B's rows under A's, lining columns up by **name**.
    (Use this rather than plain `union`, which lines them up by *position* and can
    silently mix up columns.)
  - **`a.intersect(b)`** — keep only rows that appear in **both**.
  - **`a.exceptAll(b)`** (or `subtract`) — keep rows in A that are **not** in B — the
    difference.

  ```
   A: {AAPL, GOOG, MSFT}
   B: {GOOG, JPM}
   A.exceptAll(B)  ─►  {AAPL, MSFT}   (in A, not in B)
  ```

  The two tables need the same columns for this to work.

  **Mission:** Find the tickers present in `a` but **not** in `b`, using
  `exceptAll`. Store the result in `only_in_a`.

  Expected: AAPL and MSFT (GOOG is in both; JPM is only in b).
starter_code: |
  a = spark.createDataFrame([("AAPL",), ("GOOG",), ("MSFT",)], ["ticker"])
  b = spark.createDataFrame([("GOOG",), ("JPM",)], ["ticker"])
  # TODO: rows in a but not in b -> only_in_a
  only_in_a = ...
  only_in_a.show()
solution_code: |
  a = spark.createDataFrame([("AAPL",), ("GOOG",), ("MSFT",)], ["ticker"])
  b = spark.createDataFrame([("GOOG",), ("JPM",)], ["ticker"])
  only_in_a = a.exceptAll(b)
  only_in_a.show()
checks:
  - type: df_equals
    name: only_in_a
    expected:
      - {"ticker": "AAPL"}
      - {"ticker": "MSFT"}
    message: "only_in_a should hold tickers in a that are absent from b"
hints:
  - "a.exceptAll(b) returns rows of a not in b (subtract is similar)."
  - "intersect would give the common rows; unionByName would stack them."
