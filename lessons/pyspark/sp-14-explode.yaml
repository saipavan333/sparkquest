id: sp-14-explode
track: pyspark
order: 14
title: "Arrays & explode"
difficulty: 4
concepts: ["arrays", "explode", "complex types"]
needs_spark: true
brief: |
  **What & why.** Real data is often **nested** — a JSON record holds an array of
  line items, tags, or events. `F.explode` turns each element of an array column
  into its **own row** (one-to-many), flattening the structure so you can group,
  join, and aggregate normally. It's the standard first step after parsing nested
  JSON/Kafka payloads.

  **The essentials:**
  - `F.explode(arr)` drops rows whose array is empty/null; `F.explode_outer(arr)`
    keeps them with a `null` (use it when you must not lose those records).
  - `F.posexplode` also gives the element's index.
  - The inverse is `groupBy(...).agg(F.collect_list(...))` — re-nest after
    processing.

  **Gotcha (interview-relevant).** Exploding **multiplies** row count — a 1 KB row
  with a 10k-element array becomes 10k rows. It can balloon data and memory, so
  filter/aggregate soon after.

  **Mission:** Each ticker has an array of `actions`. Explode it so every action
  becomes its own row with column `action`, keeping `ticker`. Store it in `flat`.

  Expected 3 rows: AAPL/buy, AAPL/sell, GOOG/buy.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", ["buy", "sell"]), ("GOOG", ["buy"])],
      ["ticker", "actions"],
  )
  # TODO: explode actions into one row each -> `flat` (columns ticker, action)
  flat = ...
  flat.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", ["buy", "sell"]), ("GOOG", ["buy"])],
      ["ticker", "actions"],
  )
  flat = df.select("ticker", F.explode("actions").alias("action"))
  flat.show()
checks:
  - type: df_equals
    name: flat
    expected:
      - {"ticker": "AAPL", "action": "buy"}
      - {"ticker": "AAPL", "action": "sell"}
      - {"ticker": "GOOG", "action": "buy"}
    message: "each array element should become its own row"
hints:
  - "F.explode(\"actions\") creates one row per array element."
  - "Select ticker alongside the exploded column and alias it 'action'."
