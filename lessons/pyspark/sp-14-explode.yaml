id: sp-14-explode
track: pyspark
order: 14
title: "Arrays & explode"
difficulty: 4
concepts: ["arrays", "explode", "complex types"]
needs_spark: true
brief: |
  Sometimes one cell holds a **list** of things — like a trade row whose `actions`
  column is `["buy", "sell"]`. `F.explode` unpacks that list, turning each item into
  its **own row**, so you can count and group them normally.

  ```
   ┌────────┬─────────────┐             ┌────────┬────────┐
   │ ticker │ actions     │   explode   │ ticker │ action │
   │ AAPL   │ [buy, sell] │  ─────────► │ AAPL   │ buy    │
   │ GOOG   │ [buy]       │   one row   │ AAPL   │ sell   │
   └────────┴─────────────┘   per item  │ GOOG   │ buy    │
                                        └────────┴────────┘
  ```

  - `F.explode("actions")` makes one row per item in the list. (A row whose list is
    empty disappears; `F.explode_outer` keeps it instead.)
  - Heads-up: exploding **multiplies** rows — a row with a 1,000-item list becomes
    1,000 rows — so your data can grow quickly.

  **Mission:** Each ticker has an array of `actions`. Explode it so every action
  becomes its own row with column `action`, keeping `ticker`. Store it in `flat`.

  Expected 3 rows: AAPL/buy, AAPL/sell, GOOG/buy.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", ["buy", "sell"]), ("GOOG", ["buy"])],
      ["ticker", "actions"],
  )
  # TODO: explode actions into one row each -> `flat` (columns ticker, action)
  flat = ...
  flat.show()
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", ["buy", "sell"]), ("GOOG", ["buy"])],
      ["ticker", "actions"],
  )
  flat = df.select("ticker", F.explode("actions").alias("action"))
  flat.show()
checks:
  - type: df_equals
    name: flat
    expected:
      - {"ticker": "AAPL", "action": "buy"}
      - {"ticker": "AAPL", "action": "sell"}
      - {"ticker": "GOOG", "action": "buy"}
    message: "each array element should become its own row"
hints:
  - "F.explode(\"actions\") creates one row per array element."
  - "Select ticker alongside the exploded column and alias it 'action'."
