id: sp-35-orderby
track: pyspark
order: 2
title: "Sorting: orderBy / sort"
difficulty: 2
concepts: ["orderBy", "sort", "asc", "desc", "ordering"]
needs_spark: true
brief: |
  `orderBy` (also called `sort`) puts the rows of a table in order — by one column or
  several. You'll use it for ranked reports and for showing the "top" rows.

  - `df.orderBy("qty")` sorts smallest-to-largest. For largest-first, use
    `df.orderBy(F.col("qty").desc())` (`desc` = descending).
  - You can sort by more than one column: `df.orderBy("sector", F.col("qty").desc())`
    sorts by sector, then by qty within each sector.

  Two things worth knowing: a table has **no order of its own** until you `orderBy`
  it (Spark may store rows in any order), and sorting *everything* is a bit expensive
  on huge data because Spark has to compare rows across all the machines — so if you
  only want the top few, sorting then taking a `limit` is fine, but there are cheaper
  ways for "top-N per group" ([sp-07](sp-07-window.yaml)).

  **Mission:** Sort `trades` by `qty` **descending** into `ranked` (largest first).

  Expected order: GOOG 250, AAPL 100, MSFT 80.
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 250), ("MSFT", 80)], ["ticker", "qty"]
  )
  # TODO: order by qty descending -> `ranked`
  ranked = ...
  ranked.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", 250), ("MSFT", 80)], ["ticker", "qty"]
  )
  ranked = trades.orderBy(F.col("qty").desc())
  ranked.show()
checks:
  - type: df_equals
    name: ranked
    ordered: true
    expected:
      - {"ticker": "GOOG", "qty": 250}
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "MSFT", "qty": 80}
    message: "ranked should be ordered by qty, largest first"
hints:
  - "trades.orderBy(F.col(\"qty\").desc()) sorts descending."
  - "F.col(\"qty\").desc() or F.desc(\"qty\") both work."
