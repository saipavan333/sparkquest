id: sp-01-create-df
track: pyspark
order: 1
title: "Your First DataFrame"
difficulty: 2
concepts: ["SparkSession", "createDataFrame", "DataFrame"]
needs_spark: true
brief: |
  A Spark **DataFrame** is just a **table** — rows and named columns — like a
  spreadsheet. The clever part: Spark can spread that table across many computers,
  yet still let you work with it as if it were one tidy table on your screen.

  ```
   ┌────────┬─────┐
   │ ticker │ qty │   ← named columns
   ├────────┼─────┤
   │ AAPL   │ 100 │   ← each row is one record
   │ GOOG   │  50 │
   │ MSFT   │  30 │
   └────────┴─────┘
  ```

  - `spark` (already set up for you) is your starting point.
  - `spark.createDataFrame(data, ["ticker", "qty"])` builds a table from a Python
    list. (In a real job you'd read a file or a database instead.)
  - Spark is **lazy**: building or changing a DataFrame does no real work until you
    ask for a result with something like `.show()`. That "wait until it's actually
    needed" habit is part of how Spark stays fast on huge data.

  **Mission:** Create a DataFrame named `df` from the list below, with columns
  `ticker` and `qty`.

  ```
  [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  ```
starter_code: |
  data = [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  # TODO: create a DataFrame named `df` with columns "ticker" and "qty"
  df = ...
  df.show()
solution_code: |
  data = [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  df = spark.createDataFrame(data, ["ticker", "qty"])
  df.show()
checks:
  - type: df_columns
    name: df
    expected: ["ticker", "qty"]
    message: "df should have columns ticker and qty"
  - type: df_row_count
    name: df
    expected: 3
    message: "df should have 3 rows"
hints:
  - "spark.createDataFrame(data, [\"col1\", \"col2\"]) builds a DataFrame."
  - "Pass the column names as a list of strings."
