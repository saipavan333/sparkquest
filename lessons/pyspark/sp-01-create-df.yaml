id: sp-01-create-df
track: pyspark
order: 1
title: "Your First DataFrame"
difficulty: 2
concepts: ["SparkSession", "createDataFrame", "DataFrame"]
needs_spark: true
brief: |
  **What & why.** A Spark **DataFrame** is a distributed table — rows and named
  columns spread across many machines, but you program it as if it were one tidy
  table. Behind that simple API, **Catalyst** optimizes your query and **Tungsten**
  runs it on compact binary memory ([Handbook ch.1](../../docs/handbook/01-spark-architecture-and-execution.md)),
  which is why DataFrames beat hand-written RDD code.

  **The essentials:**
  - The `SparkSession` (`spark`) is your entry point — already created for you here.
  - `spark.createDataFrame(data, schema)` builds one from a Python collection;
    in production you'd read Parquet/Kafka/JDBC instead.
  - DataFrames are **immutable** and **lazy** — operations return a *new* DataFrame
    and nothing runs until an **action** like `.show()`/`.count()`.

  **Mission:** Create a DataFrame named `df` from the list below, with columns
  `ticker` and `qty`.

  ```
  [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  ```
starter_code: |
  data = [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  # TODO: create a DataFrame named `df` with columns "ticker" and "qty"
  df = ...
  df.show()
solution_code: |
  data = [("AAPL", 100), ("GOOG", 50), ("MSFT", 30)]
  df = spark.createDataFrame(data, ["ticker", "qty"])
  df.show()
checks:
  - type: df_columns
    name: df
    expected: ["ticker", "qty"]
    message: "df should have columns ticker and qty"
  - type: df_row_count
    name: df
    expected: 3
    message: "df should have 3 rows"
hints:
  - "spark.createDataFrame(data, [\"col1\", \"col2\"]) builds a DataFrame."
  - "Pass the column names as a list of strings."
