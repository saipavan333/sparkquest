id: sp-32-rdd-mappartitions
track: pyspark
order: 32
title: "RDDs: mapPartitions (amortize setup)"
difficulty: 3
concepts: ["mapPartitions", "RDD", "per-partition", "optimization"]
needs_spark: true
brief: |
  `map` runs your function **once for every row**. `mapPartitions` runs it **once per
  chunk** of rows (Spark splits data into chunks called *partitions*), handing your
  function all the rows in that chunk together.

  Why that helps: some setup is expensive — opening a database connection, loading a
  model. With `map` you'd do it for every single row; with `mapPartitions` you do it
  **once per chunk** and reuse it for all the rows in that chunk. Your function takes
  the chunk's rows and returns its results.

  **Mission:** Using `mapPartitions`, emit the **sum of each partition**, then add
  them up into `total`. (Summing partials per partition, then combining, is the
  shape of every efficient aggregation.)
starter_code: |
  sc = spark.sparkContext
  rdd = sc.parallelize(range(1, 11), 4)   # 1..10 across 4 partitions
  # TODO: use mapPartitions to yield each partition's sum, then sum those into `total`
  total = ...
  print(total)
solution_code: |
  sc = spark.sparkContext
  rdd = sc.parallelize(range(1, 11), 4)
  partial_sums = rdd.mapPartitions(lambda it: [sum(it)])
  total = partial_sums.sum()
  print(total)
checks:
  - type: var_equals
    name: total
    expected: 55
    message: "total should be 55 (sum of 1..10), combined from per-partition sums"
hints:
  - "mapPartitions takes a function of one iterator and returns an iterable."
  - "lambda it: [sum(it)] yields a single partial sum per partition."
  - ".sum() on the partial sums RDD combines them (1..10 sums to 55)."
