id: sp-26-selectexpr
track: pyspark
order: 26
title: "selectExpr & SQL expressions"
difficulty: 3
concepts: ["selectExpr", "expr", "SQL expressions"]
needs_spark: true
brief: |
  `selectExpr` lets you write little **SQL snippets as text** instead of building
  column expressions with `F`. If you think in SQL, it's often shorter and clearer —
  and it runs exactly the same way underneath, so it's purely about the style you
  prefer.

  - `df.selectExpr("price * qty AS total", "upper(ticker) AS sym")` — each piece is a
    small SQL expression, and `AS name` labels the new column.
  - `F.expr("price * qty")` does the same for a single column inside the normal
    DataFrame style (e.g. inside `withColumn`), if you want to mix the two.

  (Tip: a typo in the text only shows up when you run it, so read the expressions
  back carefully.)

  **Mission:** From `df`, produce `out` with: `ticker`, `total` = `price * qty`,
  and `sym` = the uppercased ticker — all via `selectExpr`.
starter_code: |
  df = spark.createDataFrame(
      [("aapl", 190, 100), ("goog", 142, 50)],
      ["ticker", "price", "qty"],
  )
  # TODO: use selectExpr to build ticker, total (price*qty), sym (upper(ticker))
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("aapl", 190, 100), ("goog", 142, 50)],
      ["ticker", "price", "qty"],
  )
  out = df.selectExpr("ticker", "price * qty AS total", "upper(ticker) AS sym")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "aapl", "total": 19000, "sym": "AAPL"}
      - {"ticker": "goog", "total": 7100, "sym": "GOOG"}
    message: "out should have total = price*qty and sym = upper(ticker)"
hints:
  - "df.selectExpr(\"ticker\", \"price * qty AS total\", \"upper(ticker) AS sym\")"
  - "Each string is a SQL expression with an optional AS alias."
