id: sp-26-selectexpr
track: pyspark
order: 26
title: "selectExpr & SQL expressions"
difficulty: 3
concepts: ["selectExpr", "expr", "SQL expressions"]
needs_spark: true
brief: |
  **What & why.** `selectExpr` lets you write **SQL expression strings** instead of
  building column objects — often far more concise for arithmetic, casts, `CASE`,
  and function calls, especially if you think in SQL. It's the same Catalyst engine
  underneath, so there's **no performance difference** — purely a readability choice.

  **The essentials:**
  - `df.selectExpr("price * qty AS total", "upper(ticker) AS sym")` — each string is
    a SQL expression with an optional `AS` alias.
  - `F.expr("price * qty")` does the same for a single column inside `withColumn`/
    `filter` — handy for mixing string expressions into the DataFrame API.
  - Full SQL function vocabulary is available: `CASE WHEN`, `CAST(... AS ...)`,
    `coalesce`, date functions, etc.

  **Tip.** Great for parameterising transforms from config (build the expression
  string), but validate the strings — a typo becomes a runtime `AnalysisException`.

  **Mission:** From `df`, produce `out` with: `ticker`, `total` = `price * qty`,
  and `sym` = the uppercased ticker — all via `selectExpr`.
starter_code: |
  df = spark.createDataFrame(
      [("aapl", 190, 100), ("goog", 142, 50)],
      ["ticker", "price", "qty"],
  )
  # TODO: use selectExpr to build ticker, total (price*qty), sym (upper(ticker))
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame(
      [("aapl", 190, 100), ("goog", 142, 50)],
      ["ticker", "price", "qty"],
  )
  out = df.selectExpr("ticker", "price * qty AS total", "upper(ticker) AS sym")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "aapl", "total": 19000, "sym": "AAPL"}
      - {"ticker": "goog", "total": 7100, "sym": "GOOG"}
    message: "out should have total = price*qty and sym = upper(ticker)"
hints:
  - "df.selectExpr(\"ticker\", \"price * qty AS total\", \"upper(ticker) AS sym\")"
  - "Each string is a SQL expression with an optional AS alias."
