id: sp-08-schema
track: pyspark
order: 8
title: "Explicit Schemas"
difficulty: 3
concepts: ["StructType", "StructField", "types"]
needs_spark: true
brief: |
  A **schema** is the list of a table's columns and what type each one holds (text,
  whole number, decimal, and so on). Spark can *guess* the schema by peeking at your
  data, but in real jobs you usually **state it yourself**. That's faster (Spark
  doesn't have to scan the data just to figure out the types) and safer (a column
  that should be a number can't quietly turn into text if the source changes).

  - You build a schema as a list of fields:
    `T.StructType([T.StructField("ticker", T.StringType()), ...])`.
  - Common types: `StringType` (text), `LongType`/`IntegerType` (whole numbers),
    `DoubleType` (decimals), `BooleanType` (true/false), `TimestampType` (date+time).
  - `T` is the types toolbox (`pyspark.sql.types`), already available to you.

  **Mission:** Build `df` from `data` using an explicit schema: `ticker` as
  `StringType`, `qty` as `LongType`, `price` as `DoubleType`.
starter_code: |
  data = [("AAPL", 100, 190.0), ("GOOG", 50, 142.5)]
  # TODO: define a StructType schema and create df with it
  schema = ...
  df = spark.createDataFrame(data, schema)
  df.printSchema()
solution_code: |
  data = [("AAPL", 100, 190.0), ("GOOG", 50, 142.5)]
  schema = T.StructType([
      T.StructField("ticker", T.StringType()),
      T.StructField("qty", T.LongType()),
      T.StructField("price", T.DoubleType()),
  ])
  df = spark.createDataFrame(data, schema)
  df.printSchema()
checks:
  - type: df_columns
    name: df
    expected: ["ticker", "qty", "price"]
    message: "df should have columns ticker, qty, price"
  - type: df_equals
    name: df
    expected:
      - {"ticker": "AAPL", "qty": 100, "price": 190.0}
      - {"ticker": "GOOG", "qty": 50, "price": 142.5}
    message: "df rows should match the input under the declared schema"
hints:
  - "Build T.StructType([...]) with one T.StructField(name, T.SomeType()) each."
  - "Pass the schema as the second arg to spark.createDataFrame(data, schema)."
