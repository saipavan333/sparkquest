id: sp-16-join-types
track: pyspark
order: 16
title: "Join Types: left & anti"
difficulty: 4
concepts: ["left join", "left_anti", "unmatched rows"]
needs_spark: true
brief: |
  **What & why.** Beyond inner joins, the join *type* (`how`) decides which rows
  survive — and picking the right one is a common interview discriminator:
  - **`inner`** — only matching keys (default).
  - **`left`/`right`/`full` outer** — keep all rows of one/both sides, `null` where
    no match.
  - **`left_semi`** — keep left rows that **have** a match (a filter; no right
    columns added).
  - **`left_anti`** — keep left rows with **no** match — perfect for finding orphans,
    reconciling datasets, and "which ids are missing?".

  **The essentials:**
  - `semi`/`anti` add **no columns** from the right and can't duplicate left rows —
    cleaner and cheaper than an outer join + null-filter.
  - Outer joins introduce nulls you must then handle ([sp-12](sp-12-null-handling.yaml)).

  **Gotcha.** Watch for **fan-out**: if the right side has duplicate keys, an
  inner/left join multiplies left rows — a classic cause of inflated counts.

  **Mission:** Find trades whose ticker has **no** sector in the lookup, using a
  `left_anti` join. Store them in `unmatched`.

  Expected: only XYZ (it isn't in `sectors`).
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("JPM", 75), ("XYZ", 10)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Fin")], ["ticker", "sector"]
  )
  # TODO: keep only trades with no matching sector (left_anti) -> unmatched
  unmatched = ...
  unmatched.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("JPM", 75), ("XYZ", 10)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Fin")], ["ticker", "sector"]
  )
  unmatched = trades.join(sectors, "ticker", "left_anti")
  unmatched.show()
checks:
  - type: df_equals
    name: unmatched
    expected:
      - {"ticker": "XYZ", "qty": 10}
    message: "unmatched should hold only trades with no sector (XYZ)"
hints:
  - "trades.join(sectors, \"ticker\", \"left_anti\")"
  - "left_anti returns left rows with no match and keeps only the left columns."
