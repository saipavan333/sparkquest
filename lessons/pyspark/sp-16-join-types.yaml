id: sp-16-join-types
track: pyspark
order: 16
title: "Join Types: left & anti"
difficulty: 4
concepts: ["left join", "left_anti", "unmatched rows"]
needs_spark: true
brief: |
  A join ([sp-05](sp-05-join.yaml)) can keep different rows depending on the **kind**
  of join you pick with `how=...`. Choosing the right one is a common interview
  question:

  - **`inner`** (the default) — keep only rows that match in **both** tables.
  - **`left`** — keep **every** left-table row; where there's no match, the new
    columns are left blank (`null`).
  - **`left_anti`** — keep only the left rows with **no** match. Great for "which of
    these aren't in the other table?" (finding missing or orphan records).
  - **`left_semi`** — keep left rows that **do** have a match, but add no new columns
    (it acts like a filter).

  One thing to watch: if the right table has the same key more than once, an inner or
  left join will **repeat** the matching left rows — a frequent reason counts come
  out higher than expected.

  **Mission:** Find trades whose ticker has **no** sector in the lookup, using a
  `left_anti` join. Store them in `unmatched`.

  Expected: only XYZ (it isn't in `sectors`).
starter_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("JPM", 75), ("XYZ", 10)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Fin")], ["ticker", "sector"]
  )
  # TODO: keep only trades with no matching sector (left_anti) -> unmatched
  unmatched = ...
  unmatched.show()
solution_code: |
  trades = spark.createDataFrame(
      [("AAPL", 100), ("JPM", 75), ("XYZ", 10)], ["ticker", "qty"]
  )
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Fin")], ["ticker", "sector"]
  )
  unmatched = trades.join(sectors, "ticker", "left_anti")
  unmatched.show()
checks:
  - type: df_equals
    name: unmatched
    expected:
      - {"ticker": "XYZ", "qty": 10}
    message: "unmatched should hold only trades with no sector (XYZ)"
hints:
  - "trades.join(sectors, \"ticker\", \"left_anti\")"
  - "left_anti returns left rows with no match and keeps only the left columns."
