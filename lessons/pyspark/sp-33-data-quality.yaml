id: sp-33-data-quality
track: pyspark
order: 33
title: "Data Quality: validate & quarantine"
difficulty: 3
concepts: ["data quality", "validation", "quarantine", "filter"]
needs_spark: true
brief: |
  The grown-up way to handle messy data isn't to quietly throw bad rows away with
  `dropna()`. It's to **validate and quarantine**: keep the good rows moving, and set
  the bad ones aside somewhere you can see them (with a reason) — so nothing is lost
  silently. Here you build the **good** half.

  A row counts as **valid** when `amount >= 0` **and** `customer_id` is present (not
  null).

  **Mission:** From `df`, select only the valid rows into `valid`.
starter_code: |
  data = [
      (1, 100, "C1"),
      (2, -5, "C2"),     # negative amount -> invalid
      (3, 50, None),     # missing customer -> invalid
      (4, 30, "C4"),
  ]
  df = spark.createDataFrame(data, ["id", "amount", "customer_id"])
  # TODO: keep only rows where amount >= 0 AND customer_id is not null -> `valid`
  valid = ...
  valid.show()
solution_code: |
  data = [
      (1, 100, "C1"),
      (2, -5, "C2"),
      (3, 50, None),
      (4, 30, "C4"),
  ]
  df = spark.createDataFrame(data, ["id", "amount", "customer_id"])
  valid = df.filter((F.col("amount") >= 0) & F.col("customer_id").isNotNull())
  valid.show()
checks:
  - type: df_equals
    name: valid
    expected:
      - {"id": 1, "amount": 100, "customer_id": "C1"}
      - {"id": 4, "amount": 30, "customer_id": "C4"}
    message: "valid should keep only ids 1 and 4 (non-negative amount, non-null customer)"
hints:
  - "Combine conditions with & and wrap each in parentheses."
  - "F.col(\"customer_id\").isNotNull() filters out missing customers."
  - "The two bad rows (negative amount, null customer) would go to a quarantine table."
