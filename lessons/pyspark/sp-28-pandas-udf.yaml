id: sp-28-pandas-udf
track: pyspark
order: 28
title: "pandas UDFs (vectorized)"
difficulty: 4
concepts: ["pandas_udf", "Arrow", "vectorized UDF"]
needs_spark: true
brief: |
  A plain Python UDF ([sp-19](sp-19-udf.yaml)) is slow because Spark sends values to
  Python **one at a time**. A **pandas UDF** is the fast version: Spark hands your
  function a whole **batch** of values at once, so there's far less back-and-forth.
  It's usually much faster, and it's the right choice when you really do need Python
  (for example, to run a machine-learning model on each row).

  - You mark it with `@pandas_udf(returnType)`; your function receives a batch of
    values and returns a batch of the same size.
  - A built-in `F` function is still fastest of all, so the order of preference is:
    **built-in functions first, pandas UDF next, plain Python UDF last.**

  `F` and the types module `T` are available.

  **Mission:** Define a `pandas_udf` named `double` that returns each value times
  two, and apply it to `qty` as a new column `doubled`. Store the result in `out`.
starter_code: |
  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  # TODO: a vectorized pandas_udf that doubles a Series; apply to qty -> doubled
  double = ...
  out = ...
  out.show()
solution_code: |
  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  double = F.pandas_udf(lambda s: s * 2, T.LongType())
  out = df.withColumn("doubled", double(F.col("qty")))
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"ticker": "AAPL", "qty": 100, "doubled": 200}
      - {"ticker": "GOOG", "qty": 50, "doubled": 100}
    message: "doubled should be qty * 2, computed by the vectorized pandas UDF"
hints:
  - "F.pandas_udf(lambda s: s * 2, T.LongType()) — the lambda gets a pandas Series."
  - "Apply it like any column function: double(F.col(\"qty\"))."
