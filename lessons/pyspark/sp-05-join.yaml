id: sp-05-join
track: pyspark
order: 5
title: "Joining Datasets"
difficulty: 3
concepts: ["join", "keys"]
needs_spark: true
brief: |
  A **join** glues two tables together using a shared column (the **key**) вҖ” for
  example, adding each trade's `sector` by matching on `ticker`. It's one of the most
  common things you'll do with data.

  ```
     trades              sectors                  joined
   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
   в”Ӯ ticker в”Ӯ qty в”Ӯ +  в”Ӯ ticker в”Ӯ sector в”Ӯ =  в”Ӯ ticker в”Ӯ qty в”Ӯ sector в”Ӯ
   в”Ӯ AAPL   в”Ӯ 100 в”Ӯ    в”Ӯ AAPL   в”Ӯ Tech   в”Ӯ    в”Ӯ AAPL   в”Ӯ 100 в”Ӯ Tech   в”Ӯ
   в”Ӯ JPM    в”Ӯ  75 в”Ӯ    в”Ӯ JPM    в”Ӯ Fin    в”Ӯ    в”Ӯ JPM    в”Ӯ  75 в”Ӯ Fin    в”Ӯ
   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
                        matched on ticker
  ```

  - `trades.join(sectors, on="ticker", how="inner")`. `inner` (the default) keeps
    only rows that match in **both** tables.
  - Other kinds: `left` keeps every left-table row (leaving blanks where there's no
    match), and `left_anti` keeps the left rows with **no** match вҖ” see
    [sp-16](sp-16-join-types.yaml).

  Speed note: matching two big tables means Spark moves (shuffles) data between
  machines. If one table is small, you can **broadcast** it вҖ” send a copy to every
  machine вҖ” to skip that move ([perf-03](../performance/perf-03-broadcast-join.yaml)).

  **Mission:** Join `trades` with the `sectors` lookup on `ticker` so each trade
  gains its `sector`. Store the result in `joined`.

  Expected columns: ticker, qty, sector.
starter_code: |
  trades = spark.createDataFrame([("AAPL", 100), ("JPM", 75)], ["ticker", "qty"])
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Financials")], ["ticker", "sector"]
  )
  # TODO: join trades with sectors on "ticker" -> `joined`
  joined = ...
  joined.show()
solution_code: |
  trades = spark.createDataFrame([("AAPL", 100), ("JPM", 75)], ["ticker", "qty"])
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Financials")], ["ticker", "sector"]
  )
  joined = trades.join(sectors, on="ticker", how="inner")
  joined.show()
checks:
  - type: df_equals
    name: joined
    expected:
      - {"ticker": "AAPL", "qty": 100, "sector": "Tech"}
      - {"ticker": "JPM", "qty": 75, "sector": "Financials"}
    message: "joined should attach each trade's sector"
    fail_detail: "Use trades.join(sectors, on=\"ticker\")."
hints:
  - "df_a.join(df_b, on=\"ticker\") joins on a shared column name."
  - "The default join type is inner, which keeps only matching keys."
