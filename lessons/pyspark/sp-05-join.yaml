id: sp-05-join
track: pyspark
order: 5
title: "Joining Datasets"
difficulty: 3
concepts: ["join", "keys"]
needs_spark: true
brief: |
  **What & why.** Joins combine two DataFrames on a shared key — enriching trades
  with reference data, stitching fact and dimension tables. It's the bread and
  butter of DE, and the **#1 performance topic** in Spark interviews.

  **The essentials:**
  - `a.join(b, on="ticker", how="inner")`. Joining on a shared column **name**
    (string or list) auto-dedupes the key column; joining on an expression
    (`a.k == b.k`) leaves both.
  - `how`: `inner` (default), `left`/`right`/`full` outer, `left_semi` (filter to
    matches), `left_anti` (find non-matches) — see [sp-16](sp-16-join-types.yaml).

  **Performance (the part interviews probe):** a big⋈big join **shuffles both
  sides** (sort-merge join). If one side is small, **broadcast** it to skip the
  shuffle ([perf-03](../performance/perf-03-broadcast-join.yaml), [Handbook ch.9](../../docs/handbook/09-joins-shuffle-aqe.md)).

  **Mission:** Join `trades` with the `sectors` lookup on `ticker` so each trade
  gains its `sector`. Store the result in `joined`.

  Expected columns: ticker, qty, sector.
starter_code: |
  trades = spark.createDataFrame([("AAPL", 100), ("JPM", 75)], ["ticker", "qty"])
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Financials")], ["ticker", "sector"]
  )
  # TODO: join trades with sectors on "ticker" -> `joined`
  joined = ...
  joined.show()
solution_code: |
  trades = spark.createDataFrame([("AAPL", 100), ("JPM", 75)], ["ticker", "qty"])
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("JPM", "Financials")], ["ticker", "sector"]
  )
  joined = trades.join(sectors, on="ticker", how="inner")
  joined.show()
checks:
  - type: df_equals
    name: joined
    expected:
      - {"ticker": "AAPL", "qty": 100, "sector": "Tech"}
      - {"ticker": "JPM", "qty": 75, "sector": "Financials"}
    message: "joined should attach each trade's sector"
    fail_detail: "Use trades.join(sectors, on=\"ticker\")."
hints:
  - "df_a.join(df_b, on=\"ticker\") joins on a shared column name."
  - "The default join type is inner, which keeps only matching keys."
