id: sp-18-parquet
track: pyspark
order: 18
title: "Reading & Writing Parquet"
difficulty: 3
concepts: ["parquet", "read", "write", "columnar"]
needs_spark: true
brief: |
  **Parquet** is the standard file format for big data, and it's worth knowing why
  it beats a plain CSV for analytics. Instead of storing data row by row, Parquet
  stores it **column by column**.

  ```
   CSV (row by row):       AAPL,100   GOOG,50   MSFT,30
   Parquet (by column):    [AAPL, GOOG, MSFT]   [100, 50, 30]
  ```

  Why that layout helps:
  - If you only need the `ticker` column, Spark reads just that block and skips the
    rest — far less data to load.
  - Values in a column are alike, so they **squash down** (compress) really well,
    making the files much smaller.
  - It also remembers its own column types, so you don't have to re-declare them.

  - **Write:** `df.write.mode("overwrite").parquet(path)`.
  - **Read:** `spark.read.parquet(path)`.

  (Delta and Iceberg, coming later, are basically Parquet files plus a logbook that
  records every change.)

  **Mission:** Write `df` to Parquet at `path`, then read it back into `loaded`.
  (`path` is a fresh temp directory, already set up for you.)
starter_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  # TODO: write df to Parquet at `path` (overwrite), then read it into `loaded`
  loaded = ...
  loaded.show()
solution_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  df.write.mode("overwrite").parquet(path)
  loaded = spark.read.parquet(path)
  loaded.show()
checks:
  - type: df_equals
    name: loaded
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "loaded should round-trip the same rows back from Parquet"
hints:
  - "df.write.mode(\"overwrite\").parquet(path) writes it."
  - "spark.read.parquet(path) reads it back."
