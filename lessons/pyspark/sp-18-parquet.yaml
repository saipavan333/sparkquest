id: sp-18-parquet
track: pyspark
order: 18
title: "Reading & Writing Parquet"
difficulty: 3
concepts: ["parquet", "read", "write", "columnar"]
needs_spark: true
brief: |
  **Parquet** is the default file format of data engineering — columnar, compressed,
  splittable, and schema-aware. Writing and reading it is a one-liner.

  **Mission:** Write `df` to Parquet at `path`, then read it back into `loaded`.
  (`path` is a fresh temp directory, already set up for you.)
starter_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  # TODO: write df to Parquet at `path` (overwrite), then read it into `loaded`
  loaded = ...
  loaded.show()
solution_code: |
  import os, tempfile

  df = spark.createDataFrame([("AAPL", 100), ("GOOG", 50)], ["ticker", "qty"])
  path = os.path.join(tempfile.mkdtemp(), "trades")
  df.write.mode("overwrite").parquet(path)
  loaded = spark.read.parquet(path)
  loaded.show()
checks:
  - type: df_equals
    name: loaded
    expected:
      - {"ticker": "AAPL", "qty": 100}
      - {"ticker": "GOOG", "qty": 50}
    message: "loaded should round-trip the same rows back from Parquet"
hints:
  - "df.write.mode(\"overwrite\").parquet(path) writes it."
  - "spark.read.parquet(path) reads it back."
