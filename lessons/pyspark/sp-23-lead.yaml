id: sp-23-lead
track: pyspark
order: 23
title: "Window: lead (next row)"
difficulty: 4
concepts: ["Window", "lead", "time series"]
needs_spark: true
brief: |
  `lead` is the mirror image of `lag` ([sp-17](sp-17-window-lag.yaml)): instead of
  the row *before*, it looks at the row **after** the current one. Use it for
  forward-looking questions like "what was the price the next day?" or "how long
  until this customer's next order?".

  - `F.lead("price").over(w)` gives the next row's price within the ordered window.
  - The **last** row of each group has nothing after it, so its `lead` is `null`.
  - Together, `lag` (look back) and `lead` (look ahead) let a row compare itself to
    both of its neighbours — without any complicated self-join.

  **Mission:** For each ticker ordered by date `d`, add `next_price` = the
  following day's `price` (null on the last day). Select `ticker`, `d`,
  `next_price` into `nxt`.
starter_code: |
  from pyspark.sql.window import Window

  prices = spark.createDataFrame(
      [("AAPL", "2026-01-01", 100), ("AAPL", "2026-01-02", 110), ("AAPL", "2026-01-03", 105)],
      ["ticker", "d", "price"],
  )
  # TODO: next_price = lead(price) over (partition ticker, order d) -> `nxt`
  nxt = ...
  nxt.show()
solution_code: |
  from pyspark.sql.window import Window

  prices = spark.createDataFrame(
      [("AAPL", "2026-01-01", 100), ("AAPL", "2026-01-02", 110), ("AAPL", "2026-01-03", 105)],
      ["ticker", "d", "price"],
  )
  w = Window.partitionBy("ticker").orderBy("d")
  nxt = prices.select("ticker", "d", F.lead("price").over(w).alias("next_price"))
  nxt.show()
checks:
  - type: df_equals
    name: nxt
    expected:
      - {"ticker": "AAPL", "d": "2026-01-01", "next_price": 110}
      - {"ticker": "AAPL", "d": "2026-01-02", "next_price": 105}
      - {"ticker": "AAPL", "d": "2026-01-03", "next_price": null}
    message: "next_price should be the following day's price, null on the last day"
hints:
  - "F.lead(\"price\").over(w) returns the next row's value."
  - "The last row in each partition has no next row -> null."
