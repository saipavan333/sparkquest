id: cap-03-streaming-pipeline
track: capstone
order: 3
title: "Streaming Pipeline Capstone"
difficulty: 5
concepts: ["streaming ETL", "filter", "join", "aggregation"]
needs_spark: true
brief: |
  The real-time finale: a full streaming pipeline that **filters → adds details →
  summarises**, all on a live stream — using the same DataFrame steps you'd use for
  batch. It pulls together everything from the Streaming track into the shape of a
  real job.

  ```
   live events ─► filter (amount >= 500) ─► join sectors ─► count per sector ─► out
  ```

  Stage by stage:
  1. **Filter** early (`amount >= 500`) to drop noise before the heavier steps.
  2. **Add details** by joining the fixed `sectors` lookup
     ([st-06](../streaming/st-06-stream-static-join.yaml)).
  3. **Summarise** by counting per sector. (An aggregation like this, with no
     watermark, sends results out in `complete` mode.)

  In a real system you'd swap the file source for Kafka and the memory output for a
  Delta table — but the shape of the pipeline stays exactly the same.

  **Mission:** Stream `data/sample/stream_events`, keep only events with
  `amount >= 500`, join the static `sectors` table, then count events per sector
  (complete mode). Land it in a memory table and load `out`.

  Sectors: AAPL & GOOG are `Tech`, MSFT is `Software`. Expected: Tech 4, Software 1.
