id: cap-03-streaming-pipeline
track: capstone
order: 3
title: "Streaming Pipeline Capstone"
difficulty: 5
concepts: ["streaming ETL", "filter", "join", "aggregation"]
needs_spark: true
brief: |
  **What & why.** The real-time finale: a complete streaming pipeline that
  **filters → enriches (stream-static join) → aggregates**, all on a live stream
  with the *same* DataFrame API as batch. It ties together everything from the
  Streaming track into the shape of a production job.

  **The pipeline, stage by stage:**
  1. **Filter** early (`amount >= 500`) — drop noise before the expensive steps.
  2. **Enrich** via a **stream-static join** to the `sectors` dimension
     ([st-06](../streaming/st-06-stream-static-join.yaml)) — no watermark needed.
  3. **Aggregate** per sector; an aggregation without a watermark uses
     `outputMode("complete")` ([st-02](../streaming/st-02-streaming-agg.yaml)).

  **From here to production:** swap the file source for **Kafka**, the memory sink
  for **`foreachBatch` + Delta `MERGE`**, add a **checkpoint** for exactly-once, and
  a data-quality gate — the architecture in [Handbook ch.13](../../docs/handbook/13-kafka-and-streaming-io.md).
  `trigger(availableNow=True)` keeps this lesson deterministic for grading.

  **Mission:** Stream `data/sample/stream_events`, keep only events with
  `amount >= 500`, join the static `sectors` table, then count events per sector
  (complete mode). Land it in a memory table and load `out`.

  Sectors: AAPL & GOOG are `Tech`, MSFT is `Software`. Expected: Tech 4, Software 1.
