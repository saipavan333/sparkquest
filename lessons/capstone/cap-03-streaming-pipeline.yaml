solution_code: |
  from pyspark.sql.types import (StructType, StructField, StringType,
                                 LongType, TimestampType)

  schema = StructType([
      StructField("ticker", StringType()),
      StructField("amount", LongType()),
      StructField("ts", TimestampType()),
  ])
  sectors = spark.createDataFrame(
      [("AAPL", "Tech"), ("GOOG", "Tech"), ("MSFT", "Software")],
      ["ticker", "sector"],
  )
  stream = spark.readStream.schema(schema).json("data/sample/stream_events")
  pipeline = (
      stream.filter(F.col("amount") >= 500)
      .join(sectors, "ticker")
      .groupBy("sector")
      .count()
  )
  query = (
      pipeline.writeStream.format("memory").queryName("pipeline_out")
      .outputMode("complete").trigger(availableNow=True).start()
  )
  query.awaitTermination()
  out = spark.table("pipeline_out")
  out.show()
checks:
  - type: df_equals
    name: out
    expected:
      - {"sector": "Tech", "count": 4}
      - {"sector": "Software", "count": 1}
    message: "after filtering amount >= 500 and joining sectors, count per sector"
hints:
  - "Filter first, then join sectors on ticker, then groupBy(\"sector\").count()."
  - "Use outputMode(\"complete\") with trigger(availableNow=True)."
