id: cap-05-incremental
track: capstone
order: 5
title: "Incremental Processing (high-water mark)"
difficulty: 4
concepts: ["incremental", "idempotency", "high-water mark", "CDC", "backfill"]
needs_spark: true
brief: |
  Re-reading the entire table on every run is slow and wasteful. **Incremental
  processing** means only handling the data that's **new since last time**. The usual
  trick is a **high-water mark**: you remember the largest id (or latest timestamp)
  you've already handled, and next time you take only the rows beyond it.

  ```
   already processed: ────────────► id 100   (the high-water mark)
   this run takes only:               id 101, 102, ...   (id > 100)
  ```

  - The whole idea is one filter: `source.filter(F.col("id") > last_processed_id)`.
  - A nice bonus: if a run fails and you re-run it, you reprocess the same new slice
    and get the same result — no duplicates, no gaps.

  **Mission:** Given the source and `last_processed_id = 100`, select only the rows
  **newer than the high-water mark** (id > 100) into `new_rows`.
starter_code: |
  data = [(99, "old"), (100, "boundary"), (101, "new"), (102, "new")]
  source = spark.createDataFrame(data, ["id", "note"])
  last_processed_id = 100
  # TODO: keep only rows newer than the high-water mark -> `new_rows`
  new_rows = ...
  new_rows.show()
solution_code: |
  data = [(99, "old"), (100, "boundary"), (101, "new"), (102, "new")]
  source = spark.createDataFrame(data, ["id", "note"])
  last_processed_id = 100
  new_rows = source.filter(F.col("id") > last_processed_id)
  new_rows.show()
checks:
  - type: df_equals
    name: new_rows
    expected:
      - {"id": 101, "note": "new"}
      - {"id": 102, "note": "new"}
    message: "new_rows should contain only ids 101 and 102 (strictly above the watermark)"
hints:
  - "The high-water mark is exclusive: use > (not >=), so id 100 isn't reprocessed."
  - "F.col(\"id\") > last_processed_id filters to the new slice."
  - "Persisting max(id) back for next run is what makes the job idempotent."
