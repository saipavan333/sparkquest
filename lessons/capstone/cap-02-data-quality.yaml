id: cap-02-data-quality
track: capstone
order: 2
title: "Data-Quality Checks"
difficulty: 4
concepts: ["data quality", "validation", "quarantine"]
needs_spark: true
brief: |
  **What & why.** Never trust raw data. A production pipeline **measures** quality
  every run — counting the **valid** rows it keeps and **quarantining** the rest with
  a reason — so silent corruption surfaces as a metric and an alert, not a wrong
  dashboard a month later. This is the operational half of the six DQ dimensions
  ([Handbook ch.15](../../docs/handbook/15-testing-and-data-quality.md)).

  **The essentials:**
  - Encode each rule as a column predicate: `F.col("qty").isNotNull() & (F.col("qty")
    > 0)`. Validity = completeness (not null) + a domain rule (> 0).
  - **Don't `dropna()` silently** — split valid vs quarantine so bad rows are visible
    (the pattern from [sp-33](../pyspark/sp-33-data-quality.yaml)).
  - Emit counts (`n_valid`, `n_bad`) as run metrics; alert when `n_bad` spikes
    versus history (anomaly detection).

  **Interview soundbite:** "Where did the missing revenue go?" — a good answer points
  at the quarantine table and the DQ metrics, not a shrug.

  **Mission:** A row is valid only if `qty` is **not null** and **greater than 0**.
  Compute `n_valid` (count of valid rows) and `n_bad` (everything else).

  Expected: `n_valid == 2`, `n_bad == 2`.
starter_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", -5), ("JPM", 75)],
      ["ticker", "qty"],
  )
  # TODO: n_valid = rows with qty not null and > 0; n_bad = the rest
  n_valid = ...
  n_bad = ...
  print(n_valid, n_bad)
solution_code: |
  df = spark.createDataFrame(
      [("AAPL", 100), ("GOOG", None), ("MSFT", -5), ("JPM", 75)],
      ["ticker", "qty"],
  )
  n_valid = df.filter(F.col("qty").isNotNull() & (F.col("qty") > 0)).count()
  n_bad = df.count() - n_valid
  print(n_valid, n_bad)
checks:
  - type: var_equals
    name: n_valid
    expected: 2
    message: "n_valid should count rows with qty not null and > 0"
  - type: var_equals
    name: n_bad
    expected: 2
    message: "n_bad should be the remaining (quarantined) rows"
hints:
  - "Combine conditions with &: F.col(\"qty\").isNotNull() & (F.col(\"qty\") > 0)."
  - "n_bad = total count minus valid count."
