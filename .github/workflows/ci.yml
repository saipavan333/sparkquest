name: CI

on:
  push:
    branches: [ main, ai-projects ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11 (for Spark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests scripts benchmarks

      - name: Validate every lesson solution (Delta excluded)
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: python scripts/validate_lessons.py --skip-delta

      - name: Run test suite (Spark; Delta excluded)
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest -m "not delta and not iceberg" --cov=app --cov-report=term-missing

  delta:
    name: Delta + Iceberg lessons (Maven-gated)
    runs-on: ubuntu-latest
    continue-on-error: true   # Delta needs a Maven JAR fetch; never blocks the main check
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Validate Delta + Iceberg lessons (Maven JARs)
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: pytest -m "delta or iceberg" -q
