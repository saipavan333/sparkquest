# Fly.io config.  Deploy with:  fly launch --copy-config --no-deploy  &&  fly deploy
app = "sparkquest"
primary_region = "iad"

[build]
  dockerfile = "../Dockerfile"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb"             # Spark JVM + driver need headroom

[env]
  SPARKQUEST_ENV = "production"
  SPARK_LOCAL_IP = "127.0.0.1"
